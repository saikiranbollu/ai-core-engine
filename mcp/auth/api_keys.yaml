# API Key Registry
# ================
# Maps API keys to principals with per-workspace role assignments.
#
# Roles: public, developer, admin
# Role hierarchy (enforced in Cerbos policies):
#   admin ⊃ developer ⊃ public
#
# Workspace scoping: a principal can hold different roles per workspace.
# Use "*" as a wildcard workspace for global access.
#
# SECURITY: In production, replace this file with a secrets-manager
# backed store. Rotate keys regularly.
#
# SECURITY: In production, replace this file with a secrets-manager
# backed store. Rotate keys regularly.

keys:
  # ── Embedded Driver Assistant (iLLD workspace) ──
  # EDA is the only assistant with iLLD access; every other DA is MCAL-only.
  "key-eda-001":
    principal_id: "eda_assistant"        # EDA — Embedded Driver Assistant
    roles:
      illd: ["public", "developer"]

  # ── Domain Assistants (canonical AI Assistants — Confluence MCSWAI) ──
  # MCAL workspace only (iLLD access reserved for EDA).
  "key-gest-001":
    principal_id: "gest_assistant"
    roles:
      mcal: ["public"]

  "key-reva-001":
    principal_id: "reva_assistant"
    roles:
      mcal: ["public"]

  "key-acra-001":
    principal_id: "acra_assistant"
    roles:
      mcal: ["public"]

  "key-triplea-001":
    principal_id: "triplea_assistant"
    roles:
      mcal: ["developer"]

  "key-prqgen-001":
