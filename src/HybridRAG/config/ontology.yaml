      # =====================================================================
      #  EA DIAGRAM Node Types  (from ea_diagram_extractor.py)
      # =====================================================================
      # Structural diagram data extracted from the QEAX model's t_diagram,
      # t_diagramobjects, and t_diagramlinks tables.  Provides traversable
      # graph representation of Activity, Sequence, Statechart, and
      # Logical diagrams.
      # =====================================================================

      # -- EA_Diagram  —  Diagram container ----------------------------------
      - name: "EA_Diagram"
        jama_item_type: null
        description: >
          Diagram container from the QEAX model.  Represents Activity,
          Sequence, Statechart, or Logical diagrams.  Each diagram has
          structural child nodes (EA_ActivityNode, EA_SeqParticipant,
          EA_State) connected via PART_OF, and references to existing
          EA_* element nodes via APPEARS_IN.
        extraction_strategy: "qeax_extraction"
        source_formats: ["qeax"]
        properties:
          - name: "ea_id"
            data_type: "integer"
            required: true
            unique: true
            description: "EA Diagram_ID"
          - name: "name"
            data_type: "string"
            required: true
            description: "Diagram name"
          - name: "diagram_type"
            data_type: "string"
            required: true
            description: "One of: Activity, Sequence, Statechart, Logical"
          - name: "package_id"
            data_type: "integer"
            required: false
          - name: "width"
            data_type: "integer"
            required: false
          - name: "height"
            data_type: "integer"
            required: false
          - name: "element_count"
            data_type: "integer"
            required: false
            description: "Number of elements (diagram objects) in this diagram"
          - name: "link_count"
            data_type: "integer"
            required: false
            description: "Number of links (connectors) in this diagram"
          - name: "module"
            data_type: "string"
            required: false

      # -- EA_ActivityNode  —  Activity diagram nodes ------------------------
      - name: "EA_ActivityNode"
        jama_item_type: null
        description: >
          Node in an Activity diagram.  Includes actions, decisions,
          merge nodes, initial/final states, activity partitions, loop
          nodes, and conditional nodes.  Connected by EA_CONTROL_FLOW
          edges with optional Yes/No labels for decision branches.
          Replaces SWA_CallSequence (which stored activity flows as flat text).
        extraction_strategy: "qeax_extraction"
        source_formats: ["qeax"]
        properties:
          - name: "ea_id"
            data_type: "integer"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: false
            description: "Node label (e.g. activity action text)"
          - name: "node_type"
            data_type: "string"
            required: true
            description: "One of: Action, Decision, MergeNode, StateNode, ActivityPartition, LoopNode, Activity, ConditionalNode"
          - name: "sequence"
            data_type: "integer"
            required: false
            description: "Display ordering sequence"
          - name: "diagram_id"
            data_type: "integer"
            required: false
            description: "Parent EA_Diagram ea_id"
          - name: "module"
            data_type: "string"
            required: false

      # -- EA_SeqParticipant  —  Sequence diagram participants ---------------
      - name: "EA_SeqParticipant"
        jama_item_type: null
        description: >
          Participant (lifeline) in a Sequence diagram.  Connected to
          other participants via EA_SEQ_MESSAGE edges that carry message
          text and sequence ordering numbers.
        extraction_strategy: "qeax_extraction"
        source_formats: ["qeax"]
        properties:
          - name: "ea_id"
            data_type: "integer"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
            description: "Participant / lifeline name"
          - name: "participant_type"
            data_type: "string"
            required: false
            description: "EA Object_Type of the participant element"
          - name: "stereotype"
            data_type: "string"
            required: false
          - name: "sequence"
            data_type: "integer"
            required: false
          - name: "diagram_id"
            data_type: "integer"
            required: false
            description: "Parent EA_Diagram ea_id"
          - name: "module"
            data_type: "string"
            required: false

      # -- EA_State  —  Statechart diagram states ----------------------------
      - name: "EA_State"
        jama_item_type: null
        description: >
          State in a Statechart diagram.  Includes regular states,
          initial/final pseudo-states, and composite state machines.
          Connected by EA_STATE_TRANSITION edges.
        extraction_strategy: "qeax_extraction"
        source_formats: ["qeax"]
        properties:
          - name: "ea_id"
            data_type: "integer"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: false
            description: "State name"
          - name: "state_type"
            data_type: "string"
            required: true
            description: "One of: State, StateNode, StateMachine"
          - name: "sequence"
            data_type: "integer"
            required: false
          - name: "diagram_id"
            data_type: "integer"
            required: false
            description: "Parent EA_Diagram ea_id"
          - name: "module"
            data_type: "string"
            required: false

      # ================================================================
      # TEST SPECIFICATION  (V-Model right side – Verification)
      # ================================================================
      # Source : Excel test spec workbook  (TC4xx_SW_MCAL_TS_<Module>.xlsx)
      # Sheets : "Test cases", "Configuration tests",
      #          "Static source code IF tests", "WCET analysis"
      # ================================================================

      # -- TS_FunctionalTestCase  —  Sheet "Test cases" ---------------------
      - name: "TS_FunctionalTestCase"
        jama_item_type: null
        description: >
          A functional / behavioural test case from the main "Test cases"
          sheet of the MCAL test specification.  Each row verifies one or
          more product requirements (PRQ) and/or EA elements through a
          concrete test procedure that exercises the driver API on HW.
          Test categories include Unit, Integration, and Software-level
          tests as defined by ASPICE SWE.4 / SWE.5 / SWE.6.
        extraction_strategy: "testspec_excel_ingestion"
        source_formats: ["xlsx"]
        properties:
          - name: "test_case_id"
            data_type: "string"
            required: true
            unique: true
            description: "Unique test ID (e.g. 'Adc_Tc_Fn_001')"
          - name: "test_category"
            data_type: "list"
            required: true
            description: >
              Test level(s): subset of ['UnitTest', 'IntegrationTest',
              'SoftwareTest'].  A test may apply to more than one level.
          - name: "test_design_techniques"
            data_type: "text"
            required: false
            description: >
              Comma-separated test design techniques used (e.g.
              'Analysis of the requirements, Analysis of boundary values').
          - name: "test_objective"
            data_type: "text"
            required: true
            description: >
              What the test verifies – the functional behaviour under test.
              Maps to column 'Test functionality / Objective'.
          - name: "configuration_plan"
            data_type: "text"
            required: false
            description: >
              Description of the ADC / module configuration set(s) used by
              the test (groups, channels, DMA settings, DET flags, etc.).
              Maps to column 'Configuration Plan'.
          - name: "test_procedure"
            data_type: "text"
            required: true
            description: >
              Step-by-step procedure (P01, P02, …) describing API calls,
              waits, and verifications to execute on target HW.
          - name: "expected_results"
            data_type: "text"
            required: true
            description: >
              Expected behaviour / pass criteria (E01, E02, …) for each
              procedure step.
          - name: "automation_method"
            data_type: "string"
            required: false
            description: "'Manual' or 'Automation'"
            validation_rules:
              allowed_values: ["Manual", "Automation"]
          - name: "traceability_tags"
            data_type: "text"
            required: false
            description: >
              Raw traceability markup containing [req featureID=…
              parentID=…][/req] tags linking to PRQ / SWA IDs.
          - name: "prq_references"
            data_type: "list"
            required: false
            description: >
              Extracted AU3GM-PRQ-* identifiers from the traceability
              column.  Used to create VERIFIES edges to ProductRequirement.
          - name: "swa_references"
            data_type: "list"
            required: false
            description: >
              Extracted SWA feature IDs / GUIDs from the traceability
              column.  Used to create VALIDATES_SWA edges.
          - name: "status"
            data_type: "string"
            required: false
            description: "Test case status (e.g. 'Released', 'Draft')"
          - name: "comments"
            data_type: "text"
            required: false
            description: "Free-form reviewer / author comments"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source Excel filename (e.g. 'TC4xx_SW_MCAL_TS_Adc.xlsx')"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- TS_ConfigTestCase  —  Sheet "Configuration tests" -----------------
      - name: "TS_ConfigTestCase"
        jama_item_type: null
        description: >
          A configuration-validation test case from the "Configuration
          tests" sheet.  These verify that the AUTOSAR ECUC configuration
          tool (Tresos) correctly validates parameter ranges, multiplicity,
          default values, dependencies, and post-build variability for
          each configuration container / parameter in the module.
        extraction_strategy: "testspec_excel_ingestion"
        source_formats: ["xlsx"]
        properties:
          - name: "test_case_id"
            data_type: "string"
            required: true
            unique: true
            description: "Unique test ID (e.g. 'Adc_Tc_Conf_001')"
          - name: "test_category"
            data_type: "list"
            required: true
            description: >
              Test level(s): subset of ['UnitTest', 'IntegrationTest'].
          - name: "config_path"
            data_type: "string"
            required: true
            description: >
              AUTOSAR ECUC configuration path under test (e.g.
              '/Adc/AdcConfigSet/AdcHwUnit/AdcChannel/AdcChannelId').
          - name: "element_type"
            data_type: "string"
            required: false
            description: >
              ECUC element type (e.g. 'EcucIntegerParamDef',
              'EcucEnumerationParamDef', 'EcucParamConfContainerDef',
              'EcucBooleanParamDef', 'EcucReferenceDef').
          - name: "multiplicity_min"
            data_type: "string"
            required: false
            description: "Minimum multiplicity of the element"
          - name: "multiplicity_max"
            data_type: "string"
            required: false
            description: "Maximum multiplicity of the element"
          - name: "value_range"
            data_type: "text"
            required: false
            description: >
              Combined value range information: min, max, default, enum
              literals, reference target.
          - name: "is_editable"
            data_type: "string"
            required: false
            description: "Whether user can edit ('YES' / 'NO')"
          - name: "parameter_dependency"
            data_type: "text"
            required: false
            description: >
              Other config parameters this element depends on (e.g.
              'AdcEnableDiagnostics').
          - name: "test_procedure"
            data_type: "text"
            required: true
            description: >
              Step-by-step procedure using config-tool commands (SETVAL,
              CHKDEFVAL, ADD, DEL, CHKRANGE, etc.).
          - name: "expected_results"
            data_type: "text"
            required: true
            description: >
              Expected tool responses: NO_ERROR, ERROR with message,
              WARNING with message for each procedure step.
          - name: "automation_method"
            data_type: "string"
            required: false
            description: "'Manual' or 'Automation'"
            validation_rules:
              allowed_values: ["Manual", "Automation"]
          - name: "traceability_tags"
            data_type: "text"
            required: false
            description: >
              Raw traceability markup with [req featureID=… parentID=…]
              tags linking to PRQ and SWA configuration element IDs.
          - name: "prq_references"
            data_type: "list"
            required: false
            description: >
              Extracted AU3GM-PRQ-* identifiers from traceability column.
          - name: "swa_references"
            data_type: "list"
            required: false
            description: >
              Extracted SWA feature IDs / GUIDs from traceability column.
          - name: "status"
            data_type: "string"
            required: false
            description: "Test case status (e.g. 'Released', 'Draft')"
          - name: "comments"
            data_type: "text"
            required: false
            description: "Free-form reviewer / author comments"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source Excel filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- TS_StaticInterfaceTestCase  —  Sheet "Static source code IF tests"
      - name: "TS_StaticInterfaceTestCase"
        jama_item_type: null
        description: >
          A static-analysis test case from the "Static source code IF
          tests" sheet.  These verify that the compiled driver code matches
          the architectural specification: type definitions, file
          inclusions, error codes, function prototypes, property files,
          BSWMD templates, and const-correctness of pointer arguments.
          Typically automated via code-analysis tools.
        extraction_strategy: "testspec_excel_ingestion"
        source_formats: ["xlsx"]
        properties:
          - name: "test_case_id"
            data_type: "string"
            required: true
            unique: true
            description: "Unique test ID (e.g. 'Adc_Tc_SI_001')"
          - name: "test_category"
            data_type: "list"
            required: true
            description: >
              Test level(s): subset of ['UnitTest', 'IntegrationTest'].
          - name: "test_objective"
            data_type: "text"
            required: true
            description: >
              What the static analysis verifies (type defs, prototypes,
              error codes, file inclusions, property files, BSWMD, etc.).
          - name: "test_procedure"
            data_type: "text"
            required: true
            description: >
              Procedure – typically: run code-analysis tool, extract
              elements from architecture, compare against driver code.
          - name: "expected_results"
            data_type: "text"
            required: true
            description: >
              Expected outcome – typically: no difference between
              architecture specification and compiled code.
          - name: "automation_method"
            data_type: "string"
            required: false
            description: "'Manual' or 'Automation'"
            validation_rules:
              allowed_values: ["Manual", "Automation"]
          - name: "traceability_tags"
            data_type: "text"
            required: false
            description: >
              Raw traceability markup with [req featureID=… parentID=…]
              tags for PRQ and SWA IDs.
          - name: "prq_references"
            data_type: "list"
            required: false
            description: "Extracted AU3GM-PRQ-* identifiers"
          - name: "swa_references"
            data_type: "list"
            required: false
            description: "Extracted SWA feature IDs / GUIDs"
          - name: "status"
            data_type: "string"
            required: false
            description: "Test case status"
          - name: "comments"
            data_type: "text"
            required: false
            description: "Free-form comments"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source Excel filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- TS_WCETTestCase  —  Sheet "WCET analysis" -------------------------
      - name: "TS_WCETTestCase"
        jama_item_type: null
        description: >
          A Worst-Case Execution Time (WCET) analysis test case from the
          "WCET analysis" sheet.  Each row measures the execution time of
          a specific API under two data points: a nominal ET configuration
          and a worst-case (max kernels, max channels, max samples)
          configuration.  Used for timing budget verification per
          ASPICE SWE.4 and ISO 26262 timing constraints.
        extraction_strategy: "testspec_excel_ingestion"
        source_formats: ["xlsx"]
        properties:
          - name: "test_case_id"
            data_type: "string"
            required: true
            description: "Test case ID (e.g. 'Adc_Tc_RU_072')"
          - name: "api_name"
            data_type: "string"
            required: true
            description: >
              API / function under timing measurement (e.g. 'Adc_Init',
              'Adc_StartGroupConversion').
          - name: "configuration_description"
            data_type: "text"
            required: true
            description: >
              Full configuration description: DET/SE/RTE/DEM flags,
              frequencies, kernel count, channels, samples, etc.
          - name: "scenario"
            data_type: "text"
            required: true
            description: >
              How the API is executed for the measurement (e.g. 'Execute
              the Adc_Init API for the configuration mentioned').
          - name: "config_name"
            data_type: "string"
            required: false
            description: "Configuration file name (e.g. 'Adc_Config214')"
          - name: "data_point"
            data_type: "string"
            required: false
            description: >
              Which data point: 'Data Point 1 (ET)' for nominal,
              'Data Point 2 (WCET)' for worst-case.
          - name: "autosar_version"
            data_type: "string"
            required: false
            description: "Applicable AUTOSAR version (e.g. 'AS460')"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source Excel filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- TS_TestSpecDocument  —  Overall test spec metadata -----------------
      - name: "TS_TestSpecDocument"
        jama_item_type: null
        description: >
          A test specification document node representing the overall
          Excel workbook for a module.  Acts as a grouping hub for all
          test cases extracted from the workbook, analogous to how
          MCALModule groups requirements.
        extraction_strategy: "testspec_excel_ingestion"
        source_formats: ["xlsx"]
        properties:
          - name: "document_name"
            data_type: "string"
            required: true
            unique: true
            description: >
              Document identifier (e.g.
              'TC4xx_SW_MCAL_TS_Adc').
          - name: "description"
            data_type: "text"
            required: false
            description: "Brief description of the test spec scope"
          - name: "total_functional_tests"
            data_type: "integer"
            required: false
            description: "Count of functional test cases in the workbook"
          - name: "total_config_tests"
            data_type: "integer"
            required: false
            description: "Count of configuration test cases"
          - name: "total_static_tests"
            data_type: "integer"
            required: false
            description: "Count of static interface test cases"
          - name: "total_wcet_tests"
            data_type: "integer"
            required: false
            description: "Count of WCET analysis entries"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Excel filename"

      # =====================================================================
      #  SOURCE CODE  –  C Implementation Artefacts
      # =====================================================================
      # These node types capture the actual C source code that implements
      # the MCAL driver.  They sit between EA (architecture/design) and
      # Test Specification in the V-Model, representing the **implementation**
      # layer.  Extracted from .c/.h files in the module source repo using
      # the C parser (regex or clang backend).
      # =====================================================================

      # -- Source File -------------------------------------------------------
      - name: "SRC_SourceFile"
        jama_item_type: null
        description: >
          A C source or header file belonging to a MCAL module source repo.
          Represents the physical file container for functions, types, and
          macros.  Two sub-trees are expected per module: ssc/ (static
          source code) and Plugins/ (code-generation templates).
        extraction_strategy: "c_source_ingestion"
        source_formats: ["c", "h"]
        properties:
          - name: "file_id"
            data_type: "string"
            required: true
            unique: true
            description: >
              Unique identifier derived from the relative path within the
              module repo (e.g. 'ssc/src/Adc.c').
          - name: "file_name"
            data_type: "string"
            required: true
            description: "Base filename (e.g. Adc.c)"
          - name: "relative_path"
            data_type: "string"
            required: true
            description: >
              Path relative to module repo root
              (e.g. 'ssc/src/Adc.c' or 'Plugins/Adc_Aurix3G/generate/template/src/Adc_PBcfg.c')
          - name: "file_type"
            data_type: "string"
            required: true
            description: "File category: 'source' (.c) or 'header' (.h)"
          - name: "subtree"
            data_type: "string"
            required: true
            description: "Repository sub-tree: 'ssc' or 'plugins'"
          - name: "line_count"
            data_type: "integer"
            required: false
            description: "Total number of lines in the file"
          - name: "size_bytes"
            data_type: "integer"
            required: false
            description: "File size in bytes"
          - name: "version"
            data_type: "string"
            required: false
            description: "Software version extracted from file header (e.g. '22.0.0')"
          - name: "date"
            data_type: "string"
            required: false
            description: "Date from file header (e.g. '2025-09-03')"
          - name: "autosar_release"
            data_type: "string"
            required: false
            description: "AUTOSAR release version (e.g. '4.6.0')"
          - name: "includes"
            data_type: "list[string]"
            required: false
            description: "List of #include directives in this file"
          - name: "traceability_ids"
            data_type: "list[string]"
            required: false
            description: "GUIDs from [cover parentID={...}] tags in the file header"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"

      # -- Source Function ---------------------------------------------------
      - name: "SRC_Function"
        jama_item_type: null
        description: >
          A C function definition extracted from a MCAL module source file.
          Captures both public API functions (e.g. Adc_Init) and internal
          static helper functions (e.g. Adc_lInit).  Linked to EA_Function
          nodes when name matches, and to ProductRequirement via traceability
          GUIDs embedded in the documentation block.
        extraction_strategy: "c_source_ingestion"
        source_formats: ["c", "h"]
        properties:
          - name: "function_id"
            data_type: "string"
            required: true
            unique: true
            description: >
              Unique identifier: '<relative_path>::<function_name>'
              (e.g. 'ssc/src/Adc.c::Adc_Init')
          - name: "name"
            data_type: "string"
            required: true
            description: "Function name (e.g. Adc_Init)"
          - name: "return_type"
            data_type: "string"
            required: false
            description: "Return type (e.g. 'void', 'Std_ReturnType')"
          - name: "parameters"
            data_type: "list[string]"
            required: false
            description: >
              List of parameter strings in 'type name' format
              (e.g. ['const Adc_ConfigType * ConfigPtr'])
          - name: "signature"
            data_type: "string"
            required: false
            description: "Full function signature as a single string"
          - name: "description"
            data_type: "text"
            required: false
            description: "Description from the Doxygen documentation block"
          - name: "service_id"
            data_type: "string"
            required: false
            description: "AUTOSAR service ID (e.g. '0x00' for Adc_Init)"
          - name: "sync_async"
            data_type: "string"
            required: false
            description: "Synchronous or Asynchronous"
          - name: "reentrancy"
            data_type: "string"
            required: false
            description: "Reentrancy classification (Reentrant, Non Reentrant, Conditionally Reentrant)"
          - name: "is_static"
            data_type: "boolean"
            required: false
            description: "Whether the function is declared static (internal)"
          - name: "is_inline"
            data_type: "boolean"
            required: false
            description: "Whether the function is declared inline"
          - name: "start_line"
            data_type: "integer"
            required: false
            description: "Starting line number in the source file"
          - name: "end_line"
            data_type: "integer"
            required: false
            description: "Ending line number in the source file"
          - name: "compile_condition"
            data_type: "string"
            required: false
            description: >
              Enclosing #if condition if the function is conditionally
              compiled (e.g. 'ADC_DEINIT_API == STD_ON')
          - name: "traceability_ids"
            data_type: "list[string]"
            required: false
            description: "GUIDs from [cover parentID={...}] tags in the doc block"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"

      # -- Source Struct / Union / Typedef -----------------------------------
      - name: "SRC_DataType"
        jama_item_type: null
        description: >
          A C struct, union, enum, or typedef definition extracted from a
          MCAL module source file.  Covers both public types (in .h files)
          and internal types (static in .c files).
        extraction_strategy: "c_source_ingestion"
        source_formats: ["c", "h"]
        properties:
          - name: "type_id"
            data_type: "string"
            required: true
            unique: true
            description: >
              Unique identifier: '<relative_path>::<type_name>'
              (e.g. 'ssc/inc/Adc.h::Adc_StatusType')
          - name: "name"
            data_type: "string"
            required: true
            description: "Type name (e.g. Adc_StatusType)"
          - name: "kind"
            data_type: "string"
            required: true
            description: "Type kind: 'struct', 'union', 'enum', or 'typedef'"
          - name: "members"
            data_type: "list[string]"
            required: false
            description: >
              List of member definitions for struct/union
              (e.g. ['uint16 GrpIndex', 'uint8 GrpHwUnitId'])
              or enumerator names for enums
          - name: "base_type"
            data_type: "string"
            required: false
            description: "For typedefs, the underlying type (e.g. 'uint32')"
          - name: "description"
            data_type: "text"
            required: false
            description: "Description from preceding Doxygen comment"
          - name: "traceability_ids"
            data_type: "list[string]"
            required: false
            description: "GUIDs from [cover parentID={...}] tags"
          - name: "start_line"
            data_type: "integer"
            required: false
            description: "Starting line number in the source file"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"

      # -- Source Macro ------------------------------------------------------
      - name: "SRC_Macro"
        jama_item_type: null
        description: >
          A C preprocessor #define macro extracted from a MCAL module source
          file.  Includes configuration switches (e.g. ADC_DEINIT_API),
          hardware register reset values, bit-field offsets, and service IDs.
        extraction_strategy: "c_source_ingestion"
        source_formats: ["c", "h"]
        properties:
          - name: "macro_id"
            data_type: "string"
            required: true
            unique: true
            description: >
              Unique identifier: '<relative_path>::<macro_name>'
              (e.g. 'ssc/inc/Adc.h::ADC_MODULE_ID')
          - name: "name"
            data_type: "string"
            required: true
            description: "Macro name (e.g. ADC_MODULE_ID)"
          - name: "value"
            data_type: "string"
            required: false
            description: "Macro value / replacement text"
          - name: "macro_category"
            data_type: "string"
            required: false
            description: >
              Categorisation: 'version', 'service_id', 'error_code',
              'config_switch', 'register_value', 'bit_offset', 'general'
          - name: "description"
            data_type: "text"
            required: false
            description: "Description from preceding comment"
          - name: "traceability_ids"
            data_type: "list[string]"
            required: false
            description: "GUIDs from [cover parentID={...}] tags"
          - name: "start_line"
            data_type: "integer"
            required: false
            description: "Line number of the #define"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"

      # -- Source Global Variable --------------------------------------------
      - name: "SRC_GlobalVariable"
        jama_item_type: null
        description: >
          A global (file-scope) variable declaration in a MCAL module source
          file.  Includes static module-level variables, extern declarations,
          and configuration data arrays.  Captures AUTOSAR memory section
          placement (ASIL level, alignment) from surrounding MemMap markers.
        extraction_strategy: "c_source_ingestion"
        source_formats: ["c", "h"]
        properties:
          - name: "variable_id"
            data_type: "string"
            required: true
            unique: true
            description: >
              Unique identifier: '<relative_path>::<variable_name>'
              (e.g. 'ssc/src/Adc_Data.c::Adc_kPartition0_ConfigPtr')
          - name: "name"
            data_type: "string"
            required: true
            description: "Variable name (e.g. Adc_kPartition0_ConfigPtr)"
          - name: "data_type"
            data_type: "string"
            required: false
            description: "C type of the variable (e.g. 'const Adc_ConfigType *')"
          - name: "is_static"
            data_type: "boolean"
            required: false
            description: "Whether declared static (file-internal linkage)"
          - name: "is_const"
            data_type: "boolean"
            required: false
            description: "Whether declared const"
          - name: "is_extern"
            data_type: "boolean"
            required: false
            description: "Whether this is an extern declaration"
          - name: "is_array"
            data_type: "boolean"
            required: false
            description: "Whether the variable is an array"
          - name: "array_size"
            data_type: "string"
            required: false
            description: "Array dimension expression if applicable"
          - name: "initializer"
            data_type: "string"
            required: false
            description: "Initializer expression (truncated to 500 chars)"
          - name: "memory_section"
            data_type: "string"
            required: false
            description: >
              AUTOSAR memory section from surrounding MemMap markers
              (e.g. 'VAR_CLEARED_ASIL_D_LOCAL_32')
          - name: "compile_condition"
            data_type: "string"
            required: false
            description: "Enclosing #if condition if conditionally compiled"
          - name: "description"
            data_type: "text"
            required: false
            description: "Comment text preceding the declaration"
          - name: "traceability_ids"
            data_type: "list[string]"
            required: false
            description: "GUIDs from [cover parentID={...}] tags"
          - name: "start_line"
            data_type: "integer"
            required: false
            description: "Line number of the declaration"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"

      # -- Source Local Variable (per-function) ------------------------------
      - name: "SRC_LocalVariable"
        jama_item_type: null
        description: >
          A local variable declared inside a C function body.  Captures
          parameter-like stack variables, loop counters, and configuration
          pointers local to function scope.
        extraction_strategy: "c_source_ingestion"
        source_formats: ["c"]
        properties:
          - name: "variable_id"
            data_type: "string"
            required: true
            unique: true
            description: >
              Unique identifier: '<function_id>::<variable_name>'
              (e.g. 'ssc/src/Adc.c::Adc_Init::ExecutionIndex')
          - name: "name"
            data_type: "string"
            required: true
            description: "Variable name (e.g. ExecutionIndex)"
          - name: "data_type"
            data_type: "string"
            required: false
            description: "C type (e.g. 'uint32', 'const Adc_ConfigType *')"
          - name: "initializer"
            data_type: "string"
            required: false
            description: "Initializer expression if present"
          - name: "is_const"
            data_type: "boolean"
            required: false
            description: "Whether declared const"
          - name: "is_pointer"
            data_type: "boolean"
            required: false
            description: "Whether the variable is a pointer"
          - name: "compile_condition"
            data_type: "string"
            required: false
            description: "Enclosing #if condition if conditionally compiled"
          - name: "start_line"
            data_type: "integer"
            required: false
            description: "Line number within the source file"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"

      # =====================================================================
      # SFR (Special Function Register) Node Types
      # =====================================================================

      - name: "SFR_File"
        jama_item_type: null
        description: >
          An SFR header file from the AURIX TC4xx infrastructure SFR
          repository.  Each device/module combination produces up to three
          files: _regdef.h (struct bitfield definitions), _bf.h (mask/offset
          defines), and _reg.h (base addresses).
        extraction_strategy: "sfr_header_ingestion"
        source_formats: ["h"]
        properties:
          - name: "file_id"
            data_type: "string"
            required: true
            unique: true
            description: "Unique ID: 'SFR:<device>:<filename>'"
          - name: "file_name"
            data_type: "string"
            required: true
            description: "Header file name (e.g. IfxAdc_regdef.h)"
          - name: "file_type"
            data_type: "string"
            required: true
            description: "One of: regdef, bf, reg"
          - name: "device"
            data_type: "string"
            required: true
            description: "AURIX device variant (e.g. TC49xN)"
          - name: "module"
            data_type: "string"
            required: true
            description: "Peripheral module name (e.g. ADC)"
          - name: "version"
            data_type: "string"
            required: false
            description: "HSI version string from file header"

      - name: "SFR_Register"
        jama_item_type: null
        description: >
          A hardware register defined as a typedef struct of bitfields in
          the _regdef.h file.  Each register belongs to a device+module
          combination, e.g. ADC_ACCEN_PRS on TC49xN.
        extraction_strategy: "sfr_header_ingestion"
        source_formats: ["h"]
        properties:
          - name: "register_id"
            data_type: "string"
            required: true
            unique: true
            description: "Unique ID: 'SFR:<device>:<register_name>'"
          - name: "name"
            data_type: "string"
            required: true
            description: "Register name (e.g. ADC_ACCEN_PRS)"
          - name: "description"
            data_type: "string"
            required: false
            description: "Doxygen brief from the header comment"
          - name: "struct_name"
            data_type: "string"
            required: false
            description: "C typedef name (e.g. Ifx_ADC_ACCEN_PRS_Bits)"
          - name: "device"
            data_type: "string"
            required: true
            description: "AURIX device variant (e.g. TC49xN)"
          - name: "module"
            data_type: "string"
            required: true
            description: "Peripheral module name (e.g. ADC)"
          - name: "version"
            data_type: "string"
            required: false
            description: "HSI version string"

      - name: "SFR_BitField"
        jama_item_type: null
        description: >
          A single bitfield within a register struct.  Captures the field
          name, bit range, width, access mode (rw/rh/w), and optional
          mask/offset defines from the _bf.h companion file.
        extraction_strategy: "sfr_header_ingestion"
        source_formats: ["h"]
        properties:
          - name: "bitfield_id"
            data_type: "string"
            required: true
            unique: true
            description: "Unique ID: 'SFR:<device>:<register>:<field>'"
          - name: "name"
            data_type: "string"
            required: true
            description: "Bitfield name (e.g. RD00, DISR)"
          - name: "description"
            data_type: "string"
            required: false
            description: "Doxygen brief"
          - name: "bits"
            data_type: "string"
            required: true
            description: "Bit range string (e.g. '[0:0]', '[31:16]')"
          - name: "width"
            data_type: "integer"
            required: true
            description: "Number of bits"
          - name: "msb"
            data_type: "integer"
            required: true
            description: "Most significant bit position"
          - name: "lsb"
            data_type: "integer"
            required: true
            description: "Least significant bit position"
          - name: "access"
            data_type: "string"
            required: true
            description: "Access type (rw, rh, w, etc.)"
          - name: "mask"
            data_type: "string"
            required: false
            description: "Bitmask from _bf.h (e.g. 0x1u)"
          - name: "offset_define"
            data_type: "string"
            required: false
            description: "Bit offset define value from _bf.h"
          - name: "device"
            data_type: "string"
            required: true
            description: "AURIX device variant"
          - name: "module"
            data_type: "string"
            required: true
            description: "Peripheral module name"

      - name: "SFR_BaseAddress"
        jama_item_type: null
        description: >
          A base address or memory-mapped region defined in the _reg.h file.
          Captures the MODULE_ADC macro and peripheral memory region addresses.
        extraction_strategy: "sfr_header_ingestion"
        source_formats: ["h"]
        properties:
          - name: "base_address_id"
            data_type: "string"
            required: true
            unique: true
            description: "Unique ID: 'SFR:<device>:<macro_name>'"
          - name: "name"
            data_type: "string"
            required: true
            description: "Macro name (e.g. MODULE_ADC)"
          - name: "address"
            data_type: "string"
            required: true
            description: "Hex address (e.g. 0xF5000000)"
          - name: "address_type"
            data_type: "string"
            required: true
            description: "One of: module_base, memory_region"
          - name: "device"
            data_type: "string"
            required: true
            description: "AURIX device variant"
          - name: "module"
            data_type: "string"
            required: true
            description: "Peripheral module name"

    # -------------------------------------------------------------------------
    # RELATIONSHIP TYPES
    # -------------------------------------------------------------------------
    relationship_types:

      # ASPICE V-Model Traceability
      - name: "DERIVES_FROM"
        description: "PRQ is derived from / refines a SHRQ"
        from_types: ["ProductRequirement"]
        to_types: ["StakeholderRequirement"]
        extraction_source: "jama_relationships"
        properties:
          - name: "derivation_type"
            data_type: "string"
            validation_rules:
              allowed_values: ["Refinement", "Decomposition", "Derivation"]

      - name: "VERIFIED_BY"
        description: "PRQ is verified by a verification step"
        from_types: ["ProductRequirement"]
        to_types: ["VerificationStep"]
        extraction_source: "jama_relationships"
        properties: []

      - name: "HAS_RESULT"
        description: "Verification step has an execution report"
        from_types: ["VerificationStep"]
        to_types: ["VerificationReport"]
        extraction_source: "jama_relationships"
        properties: []

      - name: "ASSUMES"
        description: "Requirement depends on an architectural assumption"
        from_types: ["ProductRequirement", "StakeholderRequirement"]
        to_types: ["ArchitecturalAssumption"]
        extraction_source: "jama_relationships"
        properties: []

      # Stakeholder & Source Traceability
      - name: "RAISED_BY"
        description: "Requirement was raised / submitted by a stakeholder"
        from_types: ["StakeholderRequirement"]
        to_types: ["Stakeholder"]
        extraction_source: "jama_relationships"
        properties: []

      - name: "SOURCED_FROM"
        description: "Requirement sourced from an external document"
        from_types: ["StakeholderRequirement"]
        to_types: ["DocumentReference"]
        extraction_source: "jama_relationships"
        properties: []

      # Organisational / Structural
      - name: "BELONGS_TO_MODULE"
        description: "Entity belongs to a MCAL module"
        from_types: ["ProductRequirement", "StakeholderRequirement", "VerificationStep", "ArchitecturalAssumption"]
        to_types: ["MCALModule"]
        extraction_source: "derived_from_name_prefix"
        properties: []

      - name: "BELONGS_TO_FOLDER"
        description: >
          Links a requirement to its immediate parent folder in the Jama
          hierarchy.  Enables queries like 'all API PRQs for ADC' or
          'all Configuration PRQs for SPI'.
        from_types: ["ProductRequirement", "StakeholderRequirement", "VerificationStep", "TextItem"]
        to_types: ["Folder"]
        extraction_source: "jama_api_hierarchy"
        properties: []

      - name: "CHILD_OF"
        description: "Hierarchical parent-child relationship in the Jama tree"
        from_types: ["Folder", "StakeholderRequirement", "ProductRequirement", "TextItem", "VerificationStep", "Set"]
        to_types: ["Folder", "Set", "Component"]
        extraction_source: "jama_location"
        properties:
          - name: "sequence"
            data_type: "string"
            description: "Position within parent"

      - name: "GROUPED_IN"
        description: "Requirement is part of a logical group"
        from_types: ["ProductRequirement"]
        to_types: ["RequirementGroup"]
        extraction_source: "jama_relationships"
        properties: []

      - name: "TARGETED_FOR"
        description: "Requirement is targeted for a specific release"
        from_types: ["ProductRequirement", "StakeholderRequirement"]
        to_types: ["SoftwareRelease"]
        extraction_source: "release_field"
        properties: []

      # Verification Domain Assignment
      - name: "VERIFIED_IN_DOMAIN"
        description: "PRQ verification is assigned to a verification domain"
        from_types: ["ProductRequirement"]
        to_types: ["VerificationDomain"]
        extraction_source: "jama_relationships"
        properties:
          - name: "rationale"
            data_type: "text"

      # Context / Reference
      - name: "PROVIDES_CONTEXT"
        description: "Text item provides context/guidance for requirements"
        from_types: ["TextItem"]
        to_types: ["StakeholderRequirement", "ProductRequirement", "Folder"]
        extraction_source: "jama_location"
        properties: []

      - name: "DEFINES_TERM"
        description: "Glossary term provides definition used in requirements"
        from_types: ["GlossaryTerm"]
        to_types: ["ProductRequirement", "StakeholderRequirement"]
        extraction_source: "semantic_similarity"
        properties:
          - name: "confidence"
            data_type: "float"

      # ================================================================
      #  EA (Enterprise Architect) — QEAX-Extracted Relationships
      # ================================================================
      # Connector-based relationships from ea_graph_builder.py
      # (CONNECTOR_MAP) and structural diagram relationships from
      # ea_diagram_extractor.py.
      #
      # Replaces all SWA_* and SWUD_* relationship types.
      # ================================================================

      # -- EA element → EA_Requirement traceability --

      - name: "EA_IMPLEMENTS"
        description: >
          An EA element (typically EA_Function) implements an EA_Requirement.
          Extracted from Dependency connectors with 'implements' stereotype
          in the QEAX model.  This is the primary in-model traceability
          link, replacing ARCHITECTURALLY_REALIZES and SWUD_TRACES_TO.
        from_types:
          - "EA_Function"
          - "EA_DataType"
          - "EA_ConfigMacro"
          - "EA_ConfigParameter"
          - "EA_ConfigContainer"
        to_types: ["EA_Requirement"]
        extraction_source: "qeax_connector"
        properties:
          - name: "name"
            data_type: "string"
          - name: "seq_no"
            data_type: "integer"
          - name: "connector_stereotype"
            data_type: "string"

      # -- EA function calls --

      - name: "EA_CALLS"
        description: >
          An EA_Function calls another EA_Function.
          From Dependency connectors with 'call' stereotype.
          Replaces SWUD_CALLS.
        from_types: ["EA_Function"]
        to_types: ["EA_Function"]
        extraction_source: "qeax_connector"
        properties:
          - name: "name"
            data_type: "string"
          - name: "seq_no"
            data_type: "integer"
          - name: "connector_stereotype"
            data_type: "string"

      # -- EA general dependency --

      - name: "EA_DEPENDS_ON"
        description: >
          General dependency between EA elements.
          From Dependency connectors with no stereotype.
          Covers type usage, configuration gating, and other
          unstereotyped dependencies.
        from_types:
          - "EA_Function"
          - "EA_DataType"
          - "EA_ConfigParameter"
          - "EA_ConfigContainer"
          - "EA_ConfigMacro"
          - "EA_GlobalVariable"
        to_types:
          - "EA_DataType"
          - "EA_ConfigParameter"
          - "EA_ConfigContainer"
          - "EA_ErrorCode"
          - "EA_GlobalVariable"
          - "EA_MemorySection"
        extraction_source: "qeax_connector"
        properties:
          - name: "name"
            data_type: "string"
          - name: "seq_no"
            data_type: "integer"
          - name: "connector_stereotype"
            data_type: "string"

      # -- EA external dependency (cross-module) --

      - name: "EA_EXTERNAL_DEP"
        description: >
          Cross-module external dependency.
          From Dependency connectors with 'external' stereotype.
          Replaces SWA_SwDependency nodes and SWA_CALLS_EXTERNAL rel.
        from_types: ["EA_Function"]
        to_types: ["EA_Function"]
        extraction_source: "qeax_connector"
        properties:
          - name: "name"
            data_type: "string"
          - name: "seq_no"
            data_type: "integer"
          - name: "connector_stereotype"
            data_type: "string"

      # -- EA optional dependency --

      - name: "EA_OPTIONAL_DEP"
        description: >
          Optional dependency between EA elements.
          From Dependency connectors with 'optional' stereotype.
        from_types:
          - "EA_Function"
          - "EA_ConfigParameter"
          - "EA_ConfigContainer"
        to_types:
          - "EA_Function"
          - "EA_ConfigParameter"
          - "EA_ConfigContainer"
          - "EA_DataType"
        extraction_source: "qeax_connector"
        properties:
          - name: "name"
            data_type: "string"
          - name: "seq_no"
            data_type: "integer"
          - name: "connector_stereotype"
            data_type: "string"

      # -- EA file includes --

      - name: "EA_INCLUDES"
        description: >
          File include relationship.
          From Dependency connectors with 'includes' stereotype.
        from_types: ["EA_SourceFile"]
        to_types: ["EA_SourceFile"]
        extraction_source: "qeax_connector"
        properties:
          - name: "name"
            data_type: "string"
          - name: "seq_no"
            data_type: "integer"
          - name: "connector_stereotype"
            data_type: "string"

      # -- EA register access --

      - name: "EA_ACCESSES_REGISTER"
        description: >
          An EA_Function accesses an EA_Register (HW register).
          From Dependency connectors with 'sw_access' stereotype.
        from_types: ["EA_Function"]
        to_types: ["EA_Register"]
        extraction_source: "qeax_connector"
        properties:
          - name: "name"
            data_type: "string"
          - name: "seq_no"
            data_type: "integer"
          - name: "connector_stereotype"
            data_type: "string"

      # -- EA threat/information flow --

      - name: "EA_THREAT_REACHES"
        description: >
          Information flow from an untrusted domain.
          From InformationFlow connectors in the QEAX model.
        from_types: ["EA_TrustDomain"]
        to_types:
          - "EA_Function"
          - "EA_DataType"
          - "EA_ConfigParameter"
        extraction_source: "qeax_connector"
        properties:
          - name: "name"
            data_type: "string"
          - name: "seq_no"
            data_type: "integer"
          - name: "connector_stereotype"
            data_type: "string"

      # -- EA realisation --

      - name: "EA_REALISES"
        description: >
          Realisation (implementation) relationship between EA elements.
          From Realisation connectors in the QEAX model.
        from_types:
          - "EA_Function"
          - "EA_DataType"
          - "EA_ConfigContainer"
        to_types:
          - "EA_Function"
          - "EA_DataType"
          - "EA_Requirement"
          - "EA_DesignDecision"
        extraction_source: "qeax_connector"
        properties:
          - name: "name"
            data_type: "string"
          - name: "seq_no"
            data_type: "integer"
          - name: "connector_stereotype"
            data_type: "string"

      # -- EA aggregation --

      - name: "EA_AGGREGATES"
        description: >
          Aggregation (composition) relationship between EA elements.
          Typically: EA_ConfigContainer aggregates EA_ConfigParameter,
          EA_HwPeripheral aggregates EA_Register.
        from_types:
          - "EA_ConfigContainer"
          - "EA_HwPeripheral"
          - "EA_DataType"
        to_types:
          - "EA_ConfigParameter"
          - "EA_ConfigContainer"
          - "EA_Register"
          - "EA_DataType"
        extraction_source: "qeax_connector"
        properties:
          - name: "name"
            data_type: "string"
          - name: "seq_no"
            data_type: "integer"
          - name: "connector_stereotype"
            data_type: "string"

      # -- EA generalisation --

      - name: "EA_GENERALISES"
        description: >
          Generalisation (inheritance) between EA_DataType elements.
        from_types: ["EA_DataType"]
        to_types: ["EA_DataType"]
        extraction_source: "qeax_connector"
        properties:
          - name: "name"
            data_type: "string"
          - name: "seq_no"
            data_type: "integer"
          - name: "connector_stereotype"
            data_type: "string"

      # -- EA module grouping --

      - name: "EA_BELONGS_TO_MODULE"
        description: >
          Any EA_* element or diagram belongs to a MCAL module.
          Replaces SWA_BELONGS_TO_MODULE, SWUD_BELONGS_TO_MODULE,
          and SWA_*_BELONGS_TO_MODULE variants.
        from_types:
          - "EA_Function"
          - "EA_DataType"
          - "EA_ConfigParameter"
          - "EA_ConfigContainer"
          - "EA_ConfigMacro"
          - "EA_ErrorCode"
          - "EA_Requirement"
          - "EA_DesignDecision"
          - "EA_Information"
          - "EA_CoverTag"
          - "EA_GlobalVariable"
          - "EA_PropertyVariable"
          - "EA_MemorySection"
          - "EA_SourceFile"
          - "EA_TrustDomain"
          - "EA_Register"
          - "EA_HwPeripheral"
          - "EA_Diagram"
        to_types: ["MCALModule"]
        extraction_source: "qeax_module_context"
        properties: []

      # ================================================================
      #  EA DIAGRAM Relationships
      # ================================================================

      # -- Activity diagram control flow --

      - name: "EA_CONTROL_FLOW"
        description: >
          Control flow edge in an Activity diagram.  Connects
          EA_ActivityNode elements.  Decision branches carry
          Yes/No labels.
        from_types: ["EA_ActivityNode"]
        to_types: ["EA_ActivityNode"]
        extraction_source: "qeax_diagram"
        properties:
          - name: "label"
            data_type: "string"
            description: "Branch label (e.g. 'Yes', 'No') for decision nodes"

      # -- Sequence diagram messages --

      - name: "EA_SEQ_MESSAGE"
        description: >
          Message between participants in a Sequence diagram.
          Carries the message text and sequence ordering number.
        from_types: ["EA_SeqParticipant"]
        to_types: ["EA_SeqParticipant"]
        extraction_source: "qeax_diagram"
        properties:
          - name: "message"
            data_type: "string"
            description: "Message text on the sequence arrow"
          - name: "seq_no"
            data_type: "integer"
            description: "Sequence ordering number for message ordering"

      # -- Statechart diagram transitions --

      - name: "EA_STATE_TRANSITION"
        description: >
          State transition in a Statechart diagram.
          Connects EA_State nodes with optional guard/trigger labels.
        from_types: ["EA_State"]
        to_types: ["EA_State"]
        extraction_source: "qeax_diagram"
        properties:
          - name: "label"
            data_type: "string"
            description: "Transition guard or trigger label"

      # -- Diagram membership: structural child → diagram --

      - name: "PART_OF"
        description: >
          A diagram-internal node (EA_ActivityNode, EA_SeqParticipant,
          EA_State) is part of an EA_Diagram.
        from_types:
          - "EA_ActivityNode"
          - "EA_SeqParticipant"
          - "EA_State"
        to_types: ["EA_Diagram"]
        extraction_source: "qeax_diagram"
        properties: []

      # -- Diagram appearance: existing element → diagram --

      - name: "APPEARS_IN"
        description: >
          An existing EA_* element node appears in a Logical or other
          diagram.  This links the element-level graph to the
          diagram-level graph.
        from_types:
          - "EA_Function"
          - "EA_DataType"
          - "EA_ConfigParameter"
          - "EA_ConfigContainer"
          - "EA_ConfigMacro"
          - "EA_ErrorCode"
          - "EA_Requirement"
          - "EA_DesignDecision"
          - "EA_Information"
          - "EA_GlobalVariable"
          - "EA_SourceFile"
          - "EA_Register"
          - "EA_HwPeripheral"
        to_types: ["EA_Diagram"]
        extraction_source: "qeax_diagram"
        properties: []

      # ================================================================
      # TEST SPECIFICATION  Relationships
      # ================================================================

      # -- Test Spec → PRQ traceability (V-Model right side) --

      - name: "TS_VERIFIES"
        description: >
          A test case verifies a product requirement (PRQ).  Extracted
          from the [req featureID=…_PRQ_… parentID=AU3GM-PRQ-*] tags
          in the Traceability column of the test spec Excel.  This is
          the primary V-Model traceability link from the test
          specification to the requirements baseline.
        from_types:
          - "TS_FunctionalTestCase"
          - "TS_ConfigTestCase"
          - "TS_StaticInterfaceTestCase"
        to_types: ["ProductRequirement"]
        extraction_source: "testspec_traceability_tags"
        properties:
          - name: "feature_id"
            data_type: "string"
            description: >
              The TS feature tag from the traceability markup (e.g.
              'TS_ADC_AS460_PRQ_FT_001').

      # -- Test Spec → EA architecture traceability --

      - name: "TS_VALIDATES_EA"
        description: >
          A test case validates an EA architectural element (function,
          data type, config param, etc.).  Extracted from the
          [req featureID=…_SWA_… parentID={GUID}] tags in the
          Traceability column.  Links the right side of the V-Model
          (test spec) to the left side (architecture).
          Replaces TS_VALIDATES_SWA.
        from_types:
          - "TS_FunctionalTestCase"
          - "TS_ConfigTestCase"
          - "TS_StaticInterfaceTestCase"
        to_types:
          - "EA_Function"
          - "EA_DataType"
          - "EA_ConfigMacro"
          - "EA_ConfigContainer"
          - "EA_ConfigParameter"
          - "EA_SourceFile"
          - "EA_HwPeripheral"
        extraction_source: "testspec_traceability_tags"
        properties:
          - name: "feature_id"
            data_type: "string"
            description: >
              The TS feature tag (e.g. 'TS_ADC_AS460_SWA_FT_001').

      # -- Config Test → EA_ConfigParameter / EA_ConfigContainer --

      - name: "TS_TESTS_CONFIG_ELEMENT"
        description: >
          A configuration test case directly tests an EA configuration
          parameter or container.  Derived by matching the config_path
          property of TS_ConfigTestCase against EA_ConfigParameter.name
          or EA_ConfigContainer.name.
        from_types: ["TS_ConfigTestCase"]
        to_types: ["EA_ConfigParameter", "EA_ConfigContainer"]
        extraction_source: "testspec_config_path_matching"
        properties: []

      # -- WCET Test → EA_Function --

      - name: "TS_MEASURES_TIMING_OF"
        description: >
          A WCET test case measures the execution time of an EA
          function / API.  Derived by matching TS_WCETTestCase.api_name
          against EA_Function.name.
        from_types: ["TS_WCETTestCase"]
        to_types: ["EA_Function"]
        extraction_source: "testspec_api_name_matching"
        properties:
          - name: "data_point"
            data_type: "string"
            description: >
              'ET' for nominal execution time or 'WCET' for worst-case.

      # -- Test Spec → MCALModule grouping --

      - name: "TS_BELONGS_TO_MODULE"
        description: >
          A test case or test spec document belongs to a MCAL module.
          Derived from the module property of the test case node.
        from_types:
          - "TS_FunctionalTestCase"
          - "TS_ConfigTestCase"
          - "TS_StaticInterfaceTestCase"
          - "TS_WCETTestCase"
          - "TS_TestSpecDocument"
        to_types: ["MCALModule"]
        extraction_source: "testspec_module_field"
        properties: []

      # -- Test Spec Document → individual test cases --

      - name: "TS_CONTAINS_TESTCASE"
        description: >
          A test specification document contains individual test cases.
          Groups all test cases from the same Excel workbook under one
          document node.
        from_types: ["TS_TestSpecDocument"]
        to_types:
          - "TS_FunctionalTestCase"
          - "TS_ConfigTestCase"
          - "TS_StaticInterfaceTestCase"
          - "TS_WCETTestCase"
        extraction_source: "testspec_document_grouping"
        properties: []

      # -- Test Spec cross-link to VerificationStep (Jama PVS) --

      - name: "TS_IMPLEMENTS_VERIFICATION"
        description: >
          A test case implements a Jama VerificationStep (PVS).  This
          bridges the Jama-authored verification plan with the detailed
          test spec in the Excel workbook.  Linked when a PVS references
          a test case ID or when both trace to the same PRQ.
        from_types:
          - "TS_FunctionalTestCase"
          - "TS_ConfigTestCase"
          - "TS_StaticInterfaceTestCase"
        to_types: ["VerificationStep"]
        extraction_source: "testspec_pvs_matching"
        properties: []

      # =====================================================================
      #  SOURCE CODE RELATIONSHIPS
      # =====================================================================

      # File containment
      - name: "SRC_DEFINED_IN"
        description: >
          A source function, data type, macro, or variable is defined in a source file.
        from_types:
          - "SRC_Function"
          - "SRC_DataType"
          - "SRC_Macro"
          - "SRC_GlobalVariable"
          - "SRC_LocalVariable"
        to_types: ["SRC_SourceFile"]
        extraction_source: "c_source_ingestion"
        properties: []

      # Function call graph
      - name: "SRC_CALLS"
        description: >
          A source function calls another source function.  Derived from
          the call-graph extraction of the C parser.
        from_types: ["SRC_Function"]
        to_types: ["SRC_Function"]
        extraction_source: "c_source_ingestion"
        properties:
          - name: "call_order"
            data_type: "integer"
            description: "Order of the call within the calling function"
          - name: "case_label"
            data_type: "string"
            description: "Switch-case label if the call is inside a case block"

      # Register access
      - name: "SRC_ACCESSES_REGISTER"
        description: >
          A source function accesses one or more hardware registers (AURIX
          SFR pattern).  Captures both READ and WRITE operations with the
          specific register field.
        from_types: ["SRC_Function"]
        to_types: ["SRC_Function"]
        extraction_source: "c_source_ingestion"
        properties:
          - name: "register_name"
            data_type: "string"
            description: "Register name (e.g. DMAC0, SUPLLEV)"
          - name: "field"
            data_type: "string"
            description: "Register field accessed"
          - name: "access_type"
            data_type: "string"
            description: "READ or WRITE"
          - name: "line"
            data_type: "integer"
            description: "Line number of the access"

      # Module membership
      - name: "SRC_BELONGS_TO_MODULE"
        description: >
          A source code node belongs to a MCAL module.
        from_types:
          - "SRC_SourceFile"
          - "SRC_Function"
          - "SRC_DataType"
          - "SRC_Macro"
          - "SRC_GlobalVariable"
        to_types: ["MCALModule"]
        extraction_source: "c_source_ingestion"
        properties: []

      # Function → local variable containment
      - name: "SRC_HAS_LOCAL_VAR"
        description: >
          A source function declares / contains a local variable.
        from_types: ["SRC_Function"]
        to_types: ["SRC_LocalVariable"]
        extraction_source: "c_source_ingestion"
        properties: []

      # File → global variable containment
      - name: "SRC_HAS_GLOBAL_VAR"
        description: >
          A source file declares a global (file-scope) variable.
        from_types: ["SRC_SourceFile"]
        to_types: ["SRC_GlobalVariable"]
        extraction_source: "c_source_ingestion"
        properties: []

      # Traceability: Source → EA architecture/design
      - name: "SRC_IMPLEMENTS_EA"
        description: >
          A source code function implements an EA (Enterprise Architect)
          function specification.  Linked by matching function name (e.g.
          Adc_Init in source → Adc_Init EA_Function node).
          Replaces SRC_IMPLEMENTS_SWA and SRC_IMPLEMENTS_SWUD.
        from_types: ["SRC_Function"]
        to_types: ["EA_Function"]
        extraction_source: "c_source_name_matching"
        properties: []

      # Traceability: Source → PRQ requirement (via GUIDs)
      # Function uses global variable
      - name: "SRC_USES_GLOBAL"
        description: >
          A source function reads or writes a global variable.
          Derived from reference analysis inside function bodies.
        from_types: ["SRC_Function"]
        to_types: ["SRC_GlobalVariable"]
        extraction_source: "c_source_ingestion"
        properties: []

      # File includes
      - name: "SRC_INCLUDES"
        description: >
          A source file includes another header file via #include.
        from_types: ["SRC_SourceFile"]
        to_types: ["SRC_SourceFile"]
        extraction_source: "c_source_ingestion"
        properties: []

      - name: "SRC_TRACES_TO"
        description: >
          A source code artefact traces to a Jama requirement via a
          [cover parentID={GUID}] traceability tag embedded in the source
          code comments.  The GUID is matched against requirement global IDs.
        from_types:
          - "SRC_SourceFile"
          - "SRC_Function"
          - "SRC_DataType"
          - "SRC_Macro"
          - "SRC_GlobalVariable"
        to_types:
          - "ProductRequirement"
          - "StakeholderRequirement"
        extraction_source: "c_source_guid_matching"
        properties:
          - name: "guid"
            data_type: "string"
            description: "The traceability GUID linking source to requirement"

      # =====================================================================
      # SFR (Special Function Register) Relationships
      # =====================================================================

      - name: "SFR_DEFINED_IN"
        description: >
          A register or base address is defined in an SFR header file.
        from_types: ["SFR_Register", "SFR_BaseAddress"]
        to_types: ["SFR_File"]
        extraction_source: "sfr_header_ingestion"
        properties: []

      - name: "SFR_HAS_BITFIELD"
        description: >
          A register contains a bitfield member.
        from_types: ["SFR_Register"]
        to_types: ["SFR_BitField"]
        extraction_source: "sfr_header_ingestion"
        properties: []

      - name: "SFR_BELONGS_TO_MODULE"
        description: >
          An SFR node belongs to a MCAL module.
        from_types: ["SFR_File", "SFR_Register", "SFR_BitField", "SFR_BaseAddress"]
        to_types: ["MCALModule"]
        extraction_source: "sfr_header_ingestion"
        properties: []

      - name: "SRC_ACCESSES_SFR"
        description: >
          A source code function accesses a specific SFR register.
          Cross-links the implementation layer to the hardware register
          model.  Derived by matching register names found in source code
          against ingested SFR_Register nodes.
        from_types: ["SRC_Function"]
        to_types: ["SFR_Register"]
        extraction_source: "sfr_cross_reference"
        properties:
          - name: "access_type"
            data_type: "string"
            description: "READ or WRITE"

    # -------------------------------------------------------------------------
    # EXTRACTION RULES
    # -------------------------------------------------------------------------
    extraction_rules:

      module_prefix_from_name:
        description: >
          Extract the MCAL module prefix from the requirement name.
          Requirement names follow several naming conventions:
            SWS_<Module>_<nnnnn>       – Software Specification requirement
            ECUC_<Module>_<nnnnn>      – ECUC Configuration parameter
            SWS_<Module>_CONSTR_<nnnnn>– Constraint requirement
            TPS_ECUC_<nnnnn>           – ECUC Template requirement
          The legacy colon pattern ("Module: title") is also supported.
        patterns:
          sws:   "^SWS_(?P<module>[A-Za-z]+)_(?:CONSTR_)?\\d+"
          ecuc:  "^ECUC_(?P<module>[A-Za-z]+)_\\d+"
          tps:   "^TPS_ECUC_\\d+"
          colon: "^(?P<module>[A-Za-z]+):\\s+"
        known_prefixes:
          - "Adc"
          - "Bfx"
          - "Bmc"
          - "BSW"
          - "Can"
          - "COMPILER"
          - "Crc"
          - "Cybersecurity"
          - "Dio"
          - "DMA"
          - "DSADC"
          - "Eth"
          - "Fee"
          - "Fr"
          - "General"
          - "Gpt"
          - "Icu"
          - "Lin"
          - "Mcu"
          - "Mem"
          - "MemAcc"
          - "MemMap"
          - "Ocu"
          - "Platform"
          - "Port"
          - "Pwm"
          - "SMU"
          - "Spi"
          - "Std"
          - "Wdg"
        naming_categories:
          - prefix: "SWS"
            description: "Software Specification requirement"
            pattern_example: "SWS_Adc_00350"
          - prefix: "ECUC"
            description: "ECUC Configuration parameter requirement"
            pattern_example: "ECUC_Adc_00001"
          - prefix: "SWS_*_CONSTR"
            description: "Constraint requirement for a module"
            pattern_example: "SWS_Adc_CONSTR_00001"
          - prefix: "TPS_ECUC"
            description: "ECUC Template parameter specification"
            pattern_example: "TPS_ECUC_08011"

      html_to_text:
        description: "Strip HTML tags from Jama description fields"
        apply_to: ["description", "internal_remark", "rationale", "ifx_feedback"]

      jama_relationships:
        description: >
          Use the Jama REST API relationship endpoints
          (upstream/downstream) to extract edges between items.
        api_endpoints:
          - "/items/{id}/upstreamrelationships"
          - "/items/{id}/downstreamrelationships"

    # -------------------------------------------------------------------------
    # JAMA ITEM TYPE REFERENCE
    # -------------------------------------------------------------------------
    # Quick lookup for Jama numeric item type IDs used in this project:
    #
    #   22 → Attachment (not modelled as node – metadata only)
    #   30 → Component (CMP)
    #   31 → Set (SET)
    #   32 → Folder (FLD)
    #   33 → Text (TXT)
    #   42 → Stakeholder (SH)
    #   50 → Verification Domain (VD)
    #   57 → Product Requirement (PRQ)
    #   58 → Stakeholder Requirement (SHRQ)
    #   59 → Architectural Assumption (AA)
    #   60 → Product Assurance (PASC/HSI) – 6 items, template only
    #   62 → Product Verification Step (PVS)
    #   63 → Product Verification Report (PVR)
    #   71 → Software Variant (SW_VAR)
    #   78 → Document (DOC)
    #   82 → Glossary (GLS)
    #   95 → Group (GRP)

    # -------------------------------------------------------------------------
    # VALIDATION RULES
    # -------------------------------------------------------------------------
    validation_rules:
      requirement_completeness:
        required_fields: ["requirement_id", "name"]
        warning_if_missing: ["description", "status", "asil"]

      traceability:
        shrq_must_have_prq: true
        prq_must_have_pvs: true
        pvs_should_have_pvr: false

      status_consistency:
        approved_prq_needs_approved_shrq: true

    # -------------------------------------------------------------------------
    # QUERY TEMPLATES (Cypher for Neo4j)
    # -------------------------------------------------------------------------
    query_templates:

      full_traceability:
        description: "Complete V-model traceability for a SHRQ"
        cypher: |
          MATCH path = (shrq:StakeholderRequirement {requirement_id: $shrq_id})
            <-[:DERIVES_FROM]-(prq:ProductRequirement)
            -[:VERIFIED_BY]->(pvs:VerificationStep)
            -[:HAS_RESULT]->(pvr:VerificationReport)
          RETURN path

      prqs_for_shrq: |
        MATCH (prq:ProductRequirement)-[:DERIVES_FROM]->(shrq:StakeholderRequirement {requirement_id: $shrq_id})
        RETURN prq

      uncovered_prqs: |
        MATCH (prq:ProductRequirement)
        WHERE NOT EXISTS {
          MATCH (prq)-[:VERIFIED_BY]->(:VerificationStep)
        }
        RETURN prq

      module_requirements: |
        MATCH (n)-[:BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        RETURN n

      safety_requirements: |
        MATCH (r)
        WHERE (r:StakeholderRequirement OR r:ProductRequirement)
          AND r.asil IS NOT NULL
          AND r.asil <> 348
        RETURN r

      stakeholder_requirements: |
        MATCH (shrq:StakeholderRequirement)-[:RAISED_BY]->(sh:Stakeholder)
        WHERE sh.name CONTAINS $stakeholder_name
        RETURN shrq, sh

      release_scope: |
        MATCH (r)-[:TARGETED_FOR]->(rel:SoftwareRelease {name: $version})
        RETURN r

      # ================================================================
      # EA (Enterprise Architect) Query Templates
      # ================================================================

      ea_functions_for_module: |
        MATCH (f:EA_Function)-[:EA_BELONGS_TO_MODULE]->(m:MCALModule {name: \})
        RETURN f ORDER BY f.kind, f.name

      ea_function_detail: |
        MATCH (f:EA_Function {name: \})
        OPTIONAL MATCH (f)-[:EA_IMPLEMENTS]->(req:EA_Requirement)
        OPTIONAL MATCH (f)-[:EA_DEPENDS_ON]->(dep)
        OPTIONAL MATCH (f)-[:EA_CALLS]->(callee:EA_Function)
        OPTIONAL MATCH (f)-[:EA_ACCESSES_REGISTER]->(reg:EA_Register)
        RETURN f, collect(DISTINCT req.name) AS requirements,
               collect(DISTINCT dep.name) AS dependencies,
               collect(DISTINCT callee.name) AS calls,
               collect(DISTINCT reg.name) AS registers_accessed

      ea_function_error_codes: |
        MATCH (f:EA_Function {name: \})-[:EA_DEPENDS_ON]->(e:EA_ErrorCode)
        RETURN e.name AS error_code, e.note AS description

      ea_datatypes_for_module: |
        MATCH (dt:EA_DataType)-[:EA_BELONGS_TO_MODULE]->(m:MCALModule {name: \})
        RETURN dt.name AS type_name, dt.kind AS type_kind,
               dt.attributes AS members, dt.note AS description
        ORDER BY dt.kind, dt.name

      ea_config_for_module: |
        MATCH (cc:EA_ConfigContainer)-[:EA_BELONGS_TO_MODULE]->(m:MCALModule {name: \})
        OPTIONAL MATCH (cc)-[:EA_AGGREGATES]->(cp:EA_ConfigParameter)
        RETURN cc.name AS container, collect(DISTINCT cp.name) AS parameters
        ORDER BY cc.name

      ea_config_parameter_detail: |
        MATCH (cp:EA_ConfigParameter {name: \})
        OPTIONAL MATCH (cc)-[:EA_AGGREGATES]->(cp)
        OPTIONAL MATCH (cp)-[:EA_IMPLEMENTS]->(req:EA_Requirement)
        RETURN cp, cc.name AS parent_container,
               collect(DISTINCT req.name) AS requirements

      ea_design_decisions_for_module: |
        MATCH (dd:EA_DesignDecision)-[:EA_BELONGS_TO_MODULE]->(m:MCALModule {name: \})
        RETURN dd.name AS decision, dd.note AS description
        ORDER BY dd.name

      ea_files_for_module: |
        MATCH (sf:EA_SourceFile)-[:EA_BELONGS_TO_MODULE]->(m:MCALModule {name: \})
        RETURN sf.name AS file, sf.kind AS file_kind
        ORDER BY sf.kind, sf.name

      ea_memory_sections_for_module: |
        MATCH (ms:EA_MemorySection)-[:EA_BELONGS_TO_MODULE]->(m:MCALModule {name: \})
        RETURN ms.name AS section, ms.note AS description
        ORDER BY ms.name

      ea_hw_peripherals_for_module: |
        MATCH (m:MCALModule {name: \})<-[:EA_BELONGS_TO_MODULE]-(hw:EA_HwPeripheral)
        OPTIONAL MATCH (hw)-[:EA_AGGREGATES]->(reg:EA_Register)
        RETURN hw.name AS peripheral, collect(DISTINCT reg.name) AS registers
        ORDER BY hw.name

      ea_call_graph: |
        MATCH (caller:EA_Function)-[:EA_CALLS]->(callee:EA_Function)
        WHERE caller.module =         RETURN caller.name AS caller, callee.name AS callee,
               caller.kind AS caller_kind, callee.kind AS callee_kind

      ea_external_dependencies: |
        MATCH (f:EA_Function)-[:EA_EXTERNAL_DEP]->(ext:EA_Function)
        WHERE f.module =         RETURN f.name AS function_name, ext.name AS external_dep,
               ext.module AS provider_module
        ORDER BY ext.module, ext.name

      ea_requirement_traceability: |
        MATCH (n)-[:EA_IMPLEMENTS]->(req:EA_Requirement)
        WHERE n.module =         RETURN labels(n)[0] AS element_type, n.name AS element_name,
               req.name AS requirement
        ORDER BY req.name

      ea_module_overview: |
        MATCH (m:MCALModule {name: \})
        OPTIONAL MATCH (f:EA_Function)-[:EA_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (dt:EA_DataType)-[:EA_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (cp:EA_ConfigParameter)-[:EA_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (cc:EA_ConfigContainer)-[:EA_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (dd:EA_DesignDecision)-[:EA_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (sf:EA_SourceFile)-[:EA_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (ms:EA_MemorySection)-[:EA_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (diag:EA_Diagram)-[:EA_BELONGS_TO_MODULE]->(m)
        RETURN m.name AS module,
               count(DISTINCT f) AS functions,
               count(DISTINCT dt) AS data_types,
               count(DISTINCT cp) AS config_parameters,
               count(DISTINCT cc) AS config_containers,
               count(DISTINCT dd) AS design_decisions,
               count(DISTINCT sf) AS source_files,
               count(DISTINCT ms) AS memory_sections,
               count(DISTINCT diag) AS diagrams

      # EA Diagram Query Templates

      ea_diagrams_for_module: |
        MATCH (d:EA_Diagram)-[:EA_BELONGS_TO_MODULE]->(m:MCALModule {name: \})
        RETURN d.name AS diagram, d.diagram_type AS type,
               d.element_count AS elements, d.link_count AS links
        ORDER BY d.diagram_type, d.name

      ea_activity_diagram_flow: |
        MATCH (d:EA_Diagram {name: \})
        MATCH (node:EA_ActivityNode)-[:PART_OF]->(d)
        OPTIONAL MATCH (node)-[cf:EA_CONTROL_FLOW]->(next:EA_ActivityNode)
        RETURN node.name AS node_name, node.node_type AS node_type,
               node.sequence AS seq,
               collect({target: next.name, label: cf.label}) AS flows
        ORDER BY node.sequence

      ea_sequence_diagram: |
        MATCH (d:EA_Diagram {name: \})
        MATCH (p:EA_SeqParticipant)-[:PART_OF]->(d)
        OPTIONAL MATCH (p)-[msg:EA_SEQ_MESSAGE]->(target:EA_SeqParticipant)
        RETURN p.name AS participant, p.participant_type AS type,
               collect({to: target.name, message: msg.message, seq: msg.seq_no}) AS messages
        ORDER BY p.sequence

      ea_statechart_diagram: |
        MATCH (d:EA_Diagram {name: \})
        MATCH (s:EA_State)-[:PART_OF]->(d)
        OPTIONAL MATCH (s)-[t:EA_STATE_TRANSITION]->(next:EA_State)
        RETURN s.name AS state, s.state_type AS type,
               collect({target: next.name, label: t.label}) AS transitions
        ORDER BY s.sequence

      ea_diagram_elements: |
        MATCH (elem)-[:APPEARS_IN]->(d:EA_Diagram {name: \})
        RETURN labels(elem)[0] AS label, elem.name AS name,
               elem.stereotype AS stereotype
        ORDER BY labels(elem)[0], elem.name

      # ================================================================
      # Test Specification Query Templates
      # ================================================================

      # All test cases for a module
      ts_all_tests_for_module: |
        MATCH (tc)-[:TS_BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        RETURN labels(tc)[0] AS test_type,
               tc.test_case_id AS test_id,
               tc.test_objective AS objective,
               tc.automation_method AS method,
               tc.status AS status
        ORDER BY tc.test_case_id

      # Functional test detail with full traceability
      ts_functional_test_detail: |
        MATCH (tc:TS_FunctionalTestCase {test_case_id: $test_id})
        OPTIONAL MATCH (tc)-[:TS_VERIFIES]->(prq:ProductRequirement)
        OPTIONAL MATCH (tc)-[:TS_VALIDATES_EA]->(ea)
        RETURN tc, collect(DISTINCT prq.requirement_id) AS verified_prqs,
               collect(DISTINCT ea.name) AS validated_ea_elements

      # Which test cases verify a given PRQ
      ts_tests_for_prq: |
        MATCH (tc)-[:TS_VERIFIES]->(prq:ProductRequirement {requirement_id: $prq_id})
        RETURN labels(tc)[0] AS test_type, tc.test_case_id AS test_id,
               tc.test_objective AS objective,
               tc.automation_method AS method
        ORDER BY tc.test_case_id

      # PRQs with no test coverage (untested requirements)
      ts_untested_prqs: |
        MATCH (prq:ProductRequirement)-[:BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        WHERE NOT EXISTS {
          MATCH (tc)-[:TS_VERIFIES]->(prq)
        }
        RETURN prq.requirement_id AS prq_id, prq.name AS name,
               prq.status AS status
        ORDER BY prq.requirement_id

      # Config test with linked EA config element
      ts_config_test_traceability: |
        MATCH (tc:TS_ConfigTestCase {test_case_id: $test_id})
        OPTIONAL MATCH (tc)-[:TS_TESTS_CONFIG_ELEMENT]->(cfg)
        OPTIONAL MATCH (tc)-[:TS_VERIFIES]->(prq:ProductRequirement)
        RETURN tc.config_path AS config_path, tc.element_type AS element_type,
               collect(DISTINCT prq.requirement_id) AS verified_prqs,
               collect(DISTINCT cfg.name) AS tested_config

      # WCET measurements for a function
      ts_wcet_for_function: |
        MATCH (wc:TS_WCETTestCase)-[:TS_MEASURES_TIMING_OF]->(f:EA_Function {name: $func_name})
        RETURN wc.test_case_id AS test_id, wc.config_name AS config,
               wc.data_point AS data_point,
               wc.configuration_description AS config_desc,
               wc.scenario AS scenario

      # Complete V-Model traceability: SHRQ → PRQ → Test
      ts_full_v_model_traceability: |
        MATCH (shrq:StakeholderRequirement {requirement_id: $shrq_id})
          <-[:DERIVES_FROM]-(prq:ProductRequirement)
        OPTIONAL MATCH (tc)-[:TS_VERIFIES]->(prq)
        RETURN shrq.requirement_id AS shrq_id,
               prq.requirement_id AS prq_id,
               prq.name AS prq_name,
               collect(DISTINCT {test_id: tc.test_case_id,
                       test_type: labels(tc)[0]}) AS test_cases
        ORDER BY prq.requirement_id

      # Test spec document overview
      ts_testspec_overview: |
        MATCH (doc:TS_TestSpecDocument {module: $module})
        OPTIONAL MATCH (doc)-[:TS_CONTAINS_TESTCASE]->(tc)
        RETURN doc.document_name AS document,
               doc.total_functional_tests AS functional,
               doc.total_config_tests AS config,
               doc.total_static_tests AS static,
               doc.total_wcet_tests AS wcet,
               count(tc) AS total_linked

      # Test coverage summary — how many PRQs are covered
      ts_coverage_summary: |
        MATCH (prq:ProductRequirement)-[:BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        OPTIONAL MATCH (tc)-[:TS_VERIFIES]->(prq)
        WITH prq, count(tc) AS test_count
        RETURN count(prq) AS total_prqs,
               sum(CASE WHEN test_count > 0 THEN 1 ELSE 0 END) AS covered_prqs,
               sum(CASE WHEN test_count = 0 THEN 1 ELSE 0 END) AS uncovered_prqs,
               toFloat(sum(CASE WHEN test_count > 0 THEN 1 ELSE 0 END)) /
                 count(prq) * 100 AS coverage_pct

  # ===========================================================================
  #  ILLD PROFILE  –  Reference Software (Low-Level Drivers)
  # ===========================================================================
  illd:
    metadata:
      name: "Automotive Embedded LLD Ontology"
      version: "3.0.0"
      domain: "automotive_embedded_lld"
      description: >
        Comprehensive ontology for low-level driver development lifecycle.
        Node labels and relationship types match the live ILLD Neo4j
        database (bolt-passthrough-neo4j-mcswai-legato).

        Version 3.0.0 changes
        ---------------------
        * Collapsed dual labels:
            - SFR ``Register``   ⟶ unified into ``HardwareRegister``
            - SFR ``BitField``   ⟶ unified into ``RegisterField``
          Origin is preserved via the ``sfr_source_file`` and
          ``hwa_source_doc`` properties.  The old labels remain declared
          (``deprecated: true``) so historical Cypher queries keep parsing
          until re-ingestion completes.
        * Architecture header ``Ifx<FB>_swa.h`` and the published
          implementation header ``Ifx<FB>.h`` in ``_inc/`` are merged
          into a single ``Function`` / ``Struct`` / ``Enum`` node per
          C signature.  Provenance is captured by
          ``Function.source_files`` (list) and ``Function.origin``
          (``arch_only`` | ``impl_only`` | ``both``).
        * New labels for HW-spec semantics:
            - ``HwConstraint``       (timing / ordering / wait_loop / …)
            - ``ProgrammingSequence`` (Init / Tx / Rx / Shutdown / …)
            - ``SequenceStep``       (ordered step inside a sequence)
            - ``HardwareSubModule``  (now with a full property block)
        * New traceability edges (previously declared but empty):
          ``ACCESSES_REGISTER``, ``BITFIELD_CONTROLS``, ``IMPLEMENTS``,
          ``IMPLEMENTED_BY``, ``PARENT_REQUIREMENT``, ``RELATES_TO``,
          ``PART_OF_SUBMODULE``, ``TRACES_TO``, ``VERIFIES``,
          ``HAS_CASE``, ``HAS_CONSTRAINT``, ``HAS_STEP``, ``NEXT_STEP``,
          ``STEP_OPERATION``, ``STEP_USES_REGISTER``,
          ``REALIZES_SEQUENCE``.
      supported_modules:
        - "CXPI"
        - "CAN"
        - "LIN"
        - "SPI"
        - "I2C"
        - "UART"
        - "ADC"
        - "PWM"
        - "GPIO"
        - "Timer"
        - "DMA"
        - "Interrupt"

    # -------------------------------------------------------------------------
    # NODE TYPES
    # -------------------------------------------------------------------------
    # Label names match Neo4j exactly (case-sensitive).
    # -------------------------------------------------------------------------
    node_types:

      # -- Requirement -------------------------------------------------------
      - name: "Requirement"
        description: "Product/software requirement from Jama or requirements tool"
        extraction_strategy: "hybrid"
        source_formats: ["json", "csv", "xlsx"]
        properties:
          - name: "requirement_id"
            data_type: "string"
            required: true
            unique: true
            description: "Unique requirement identifier (e.g., AURC1-REQA-286)"
            extraction_pattern: "^[A-Z0-9]+-[A-Z]+-\\d+$"
          - name: "global_id"
            data_type: "string"
            required: false
            description: "Global identifier from requirements tool"
          - name: "name"
            data_type: "string"
            required: true
            description: "Short descriptive name"
          - name: "description"
            data_type: "text"
            required: true
            description: "Full requirement description"
          - name: "status"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["Draft", "Work", "Review", "Approved", "Rejected", "Obsolete"]
          - name: "release"
            data_type: "string"
            required: false
            description: "Target release version"
          - name: "item_path"
            data_type: "string"
            required: false
            description: "Hierarchical path in requirements tool"
          - name: "priority"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["Low", "Medium", "High", "Critical"]
          - name: "asil_level"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["QM", "ASIL_A", "ASIL_B", "ASIL_C", "ASIL_D"]
          - name: "verification_method"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["Test", "Review", "Analysis", "Inspection"]
          - name: "last_modified"
            data_type: "datetime"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- HardwareRegister --------------------------------------------------
      # v3.0: Unified label.  Carries both the abstract HW-spec view
      # (RC1_IP_* docs) and the concrete SFR-header view
      # (Ifx<Mod>_regdef.h).  Dedup key is (module, name).
      - name: "HardwareRegister"
        description: >
          Hardware register.  Single source of truth merged from the HW
          specification document (timings, access constraints) and the
          SFR register-definition header (address, width, reset value).
        extraction_strategy: "hybrid"
        source_formats: ["pdf", "md", "h"]
        dedup_key: ["module", "name"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. HWREG_CXPI_CLC)"
          - name: "name"
            data_type: "string"
            required: true
            description: "Register name (e.g. CLC, ID, KRST0)"
          - name: "module"
            data_type: "string"
            required: true
          - name: "description"
            data_type: "text"
            required: false
          - name: "address"
            data_type: "string"
            required: false
            description: "Absolute or base-offset address (hex)"
            extraction_pattern: "^0x[0-9A-Fa-f]+$"
          - name: "offset"
            data_type: "string"
            required: false
            description: "Offset from sub-module base (hex)"
          - name: "width"
            data_type: "integer"
            required: false
            validation_rules:
              allowed_values: [8, 16, 32, 64]
          - name: "reset_value"
            data_type: "string"
            required: false
          - name: "sfr_source_file"
            data_type: "string"
            required: false
            description: "Originating SFR header (e.g. IfxCxpi_regdef.h)"
          - name: "hwa_source_doc"
            data_type: "string"
            required: false
            description: "Originating HW-arch / IP document (e.g. RC1_IP_CXPI.md)"
          - name: "submodule"
            data_type: "string"
            required: false
            description: "HardwareSubModule name (e.g. Cxpi0, Cxpi1)"
          - name: "label"
            data_type: "string"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- RegisterField -----------------------------------------------------
      # v3.0: Unified label — absorbs the former SFR-only :BitField.
      # Dedup key is (module, register, name).
      - name: "RegisterField"
        description: >
          Individual field of a HardwareRegister.  Single source of truth
          merged from the HW spec (access semantics, description) and the
          SFR header (exact bit range, reset value).
        extraction_strategy: "hybrid"
        source_formats: ["pdf", "md", "h"]
        dedup_key: ["module", "register", "name"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. REGFIELD_CXPI_CLC_DISR)"
          - name: "name"
            data_type: "string"
            required: true
            description: "Field name (e.g. DISR, DISS, EDIS)"
          - name: "register"
            data_type: "string"
            required: true
            description: "Parent HardwareRegister name"
          - name: "module"
            data_type: "string"
            required: true
          - name: "bits"
            data_type: "string"
            required: true
            description: "Bit position or range (e.g. '0', '1', '7:4')"
          - name: "bit_range"
            data_type: "string"
            required: false
            description: "Alias of 'bits' kept for SFR-style consumers"
          - name: "width"
            data_type: "string"
            required: false
          - name: "access"
            data_type: "string"
            required: true
            description: "Access type (e.g. rw, rh, r, w)"
          - name: "reset_value"
            data_type: "string"
            required: false
          - name: "description"
            data_type: "text"
            required: false
          - name: "sfr_source_file"
            data_type: "string"
            required: false
          - name: "hwa_source_doc"
            data_type: "string"
            required: false
          - name: "label"
            data_type: "string"
            required: false

      # -- Register (SFR) ---------------------------------------------------
      # DEPRECATED v3.0 — use :HardwareRegister.  Kept for backward-compat
      # so legacy Cypher queries keep parsing until full re-ingestion.
      - name: "Register"
        deprecated: true
        replaced_by: "HardwareRegister"
        description: "DEPRECATED. SFR register from _regdef.h — use HardwareRegister."
        extraction_strategy: "hybrid"
        source_formats: ["h"]
        properties:
          - name: "register_name"
            data_type: "string"
            required: true
            unique: true
          - name: "address"
            data_type: "string"
            required: false
            description: "Register address (hex)"
            extraction_pattern: "^0x[0-9A-Fa-f]+$"
          - name: "width"
            data_type: "integer"
            required: false
            description: "Register width in bits"
            validation_rules:
              allowed_values: [8, 16, 32, 64]
          - name: "access"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["R", "W", "RW", "RW1C", "RW1S", "RO", "WO"]
          - name: "reset_value"
            data_type: "string"
            required: false
            description: "Default reset value (hex)"
          - name: "description"
            data_type: "text"
            required: false
          - name: "module"
            data_type: "string"
            required: true

      # -- BitField ----------------------------------------------------------
      # DEPRECATED v3.0 — use :RegisterField.  Kept for backward-compat.
      - name: "BitField"
        deprecated: true
        replaced_by: "RegisterField"
        description: "DEPRECATED. SFR bitfield — use RegisterField."
        extraction_strategy: "hybrid"
        source_formats: ["h"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. BITFIELD_Ifx_CXPI_CH_CMD_Bits_TX_HEADER)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "bit_range"
            data_type: "string"
            required: true
            description: "Bit range (e.g., '0:0', '7:4')"
          - name: "width"
            data_type: "string"
            required: false
            description: "Width in bits"
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false

      # -- SoftwareArchitecture ----------------------------------------------
      - name: "SoftwareArchitecture"
        description: "Software architecture document/component"
        extraction_strategy: "llm"
        source_formats: ["rst", "md", "docx", "puml"]
        properties:
          - name: "arch_id"
            data_type: "string"
            required: true
            unique: true
          - name: "module_name"
            data_type: "string"
            required: true
          - name: "title"
            data_type: "string"
            required: true
          - name: "description"
            data_type: "text"
            required: true
          - name: "version"
            data_type: "string"
            required: false
          - name: "architectural_decisions"
            data_type: "list[string]"
            required: false
          - name: "hw_sw_interfaces"
            data_type: "text"
            required: false
          - name: "sw_sw_interfaces"
            data_type: "text"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- Function ----------------------------------------------------------
      # v3.0: Single node per C signature.  Arch (_swa.h) and published
      # (.h in _inc/) headers are merged via signature_hash dedup.
      - name: "Function"
        description: >
          C function from driver API.  Merges the architecture header
          (Ifx<FB>_swa.h) and the published implementation header
          (Ifx<FB>.h in _inc/) into one node — see ``source_files`` and
          ``origin`` for provenance.
        extraction_strategy: "hybrid"
        source_formats: ["h", "c"]
        dedup_key: ["name", "signature_hash"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. FUNC_IfxCxpi_Init)"
          - name: "name"
            data_type: "string"
            required: true
            description: "Function name"
            extraction_pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
          - name: "brief"
            data_type: "string"
            required: false
          - name: "purpose"
            data_type: "text"
            required: false
          - name: "return_type"
            data_type: "string"
            required: false
          - name: "signature"
            data_type: "string"
            required: false
            description: "Full function signature, normalised whitespace"
          - name: "signature_hash"
            data_type: "string"
            required: false
            description: "SHA-1 of normalised signature; used for swa/inc merge"
          - name: "source"
            data_type: "string"
            required: false
            description: "Primary source bucket (e.g. SWA_Functions)"
          - name: "origin"
            data_type: "string"
            required: false
            description: "Provenance flag after swa/inc merge"
            validation_rules:
              allowed_values: ["arch_only", "impl_only", "both"]
          - name: "source_files"
            data_type: "list[string]"
            required: false
            description: "All header files that contributed this declaration"
          - name: "module"
            data_type: "string"
            required: false
          - name: "file_path"
            data_type: "string"
            required: false
          - name: "label"
            data_type: "string"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- Struct ------------------------------------------------------------
      - name: "Struct"
        description: "C struct data structure"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. STRUCT_IfxCxpi_Config_t)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "brief"
            data_type: "string"
            required: false
            description: "Brief description from Doxygen"
          - name: "purpose"
            data_type: "text"
            required: false
          - name: "source"
            data_type: "string"
            required: false
          - name: "label"
            data_type: "string"
            required: false
          - name: "module"
            data_type: "string"
            required: false
          - name: "file_path"
            data_type: "string"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- StructMember ------------------------------------------------------
      - name: "StructMember"
        description: "Individual member / field of a C struct"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. MEMBER_IfxCxpi_TxConfig_t_txInitMarker)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "type"
            data_type: "string"
            required: false
            description: "C data type of the member"
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false
            description: "Display label (e.g. 'txInitMarker: bool')"

      # -- Enum --------------------------------------------------------------
      - name: "Enum"
        description: "C enum type definition"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. ENUM_IfxCxpi_Status_t)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "brief"
            data_type: "string"
            required: false
          - name: "purpose"
            data_type: "text"
            required: false
          - name: "source"
            data_type: "string"
            required: false
          - name: "label"
            data_type: "string"
            required: false
          - name: "module"
            data_type: "string"
            required: false
          - name: "file_path"
            data_type: "string"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- Typedef -----------------------------------------------------------
      - name: "Typedef"
        description: "C typedef alias"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. TYPEDEF_IfxCxpi_DataLength_t)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "brief"
            data_type: "string"
            required: false
          - name: "purpose"
            data_type: "text"
            required: false
          - name: "underlying_type"
            data_type: "string"
            required: false
            description: "Underlying C type (e.g. uint8_t, uint16_t)"
          - name: "source"
            data_type: "string"
            required: false
          - name: "label"
            data_type: "string"
            required: false
          - name: "module"
            data_type: "string"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- PrimitiveType -----------------------------------------------------
      - name: "PrimitiveType"
        description: "Primitive C type (uint8_t, uint16_t, void, etc.)"
        extraction_strategy: "hybrid"
        source_formats: ["h"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. PRIMITIVE_uint8_t)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "label"
            data_type: "string"
            required: false

      # -- EnumValue ---------------------------------------------------------
      - name: "EnumValue"
        description: "Individual enumerator within a C enum"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
            description: "Enumerator constant name"
          - name: "value"
            data_type: "string"
            required: false
            description: "Numeric value if explicitly assigned"
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false

      # -- Parameter ---------------------------------------------------------
      - name: "Parameter"
        description: "Parameter of a C function"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
          - name: "type"
            data_type: "string"
            required: false
            description: "C data type (e.g., uint8, IfxCxpi_Config_t*)"
          - name: "direction"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["in", "out", "in_out"]
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false

      # -- ReturnType --------------------------------------------------------
      - name: "ReturnType"
        description: "Return type of a C function (primitive or typedef)"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
            description: "Type name (e.g., Std_ReturnType, void, uint32)"
          - name: "is_pointer"
            data_type: "boolean"
            required: false
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false

      # -- SequenceDiagram ---------------------------------------------------
      - name: "SequenceDiagram"
        description: "PlantUML sequence diagram for API call flows"
        extraction_strategy: "llm"
        source_formats: ["puml", "md"]
        properties:
          - name: "diagram_id"
            data_type: "string"
            required: true
            unique: true
          - name: "title"
            data_type: "string"
            required: true
          - name: "description"
            data_type: "text"
            required: false
          - name: "participants"
            data_type: "list[string]"
            required: true
            description: "List of participants/actors"
          - name: "sequence_steps"
            data_type: "list[object]"
            required: true
            description: "Ordered list of steps with from, to, message, type"
          - name: "puml_content"
            data_type: "text"
            required: true
            description: "Raw PlantUML content"
          - name: "module"
            data_type: "string"
            required: true
          - name: "test_case_id"
            data_type: "string"
            required: false
            description: "Associated test case ID"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- TestSpecification -------------------------------------------------
      - name: "TestSpecification"
        description: "Test specification document"
        extraction_strategy: "hybrid"
        source_formats: ["md", "docx", "json"]
        properties:
          - name: "test_id"
            data_type: "string"
            required: true
            unique: true
          - name: "test_name"
            data_type: "string"
            required: true
          - name: "objective"
            data_type: "text"
            required: true
          - name: "requirement_ids"
            data_type: "list[string]"
            required: true
            description: "List of covered requirement IDs"
          - name: "module"
            data_type: "string"
            required: true
          - name: "priority"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["Low", "Medium", "High", "Critical"]
          - name: "test_type"
            data_type: "string"
            required: true
            validation_rules:
              allowed_values: ["Unit", "Integration", "Functional", "Performance", "Safety"]
          - name: "preconditions"
            data_type: "list[string]"
            required: false
          - name: "test_steps"
            data_type: "list[object]"
            required: true
            description: "List of test steps with action, expected_result, validation"
          - name: "test_data"
            data_type: "text"
            required: false
            description: "Test data configuration"
          - name: "pass_criteria"
            data_type: "list[string]"
            required: true
          - name: "fail_criteria"
            data_type: "list[string]"
            required: false
          - name: "status"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["Draft", "Active", "Obsolete"]
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- TestCode ----------------------------------------------------------
      - name: "TestCode"
        description: "Test implementation code"
        extraction_strategy: "hybrid"
        source_formats: ["c", "h"]
        properties:
          - name: "test_code_id"
            data_type: "string"
            required: true
            unique: true
          - name: "test_function_name"
            data_type: "string"
            required: true
          - name: "file_path"
            data_type: "string"
            required: true
          - name: "source_code"
            data_type: "text"
            required: true
          - name: "module"
            data_type: "string"
            required: true
          - name: "trace_tags"
            data_type: "list[string]"
            required: false
            description: "List of \\trace{} requirement IDs from code"
          - name: "architecture_refs"
            data_type: "list[string]"
            required: false
            description: "List of \\architecture{} references"
          - name: "hwspec_refs"
            data_type: "list[string]"
            required: false
            description: "List of \\hwspec{} references"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- TestResult --------------------------------------------------------
      - name: "TestResult"
        description: "Test execution result"
        extraction_strategy: "hybrid"
        source_formats: ["json", "xml", "csv"]
        properties:
          - name: "result_id"
            data_type: "string"
            required: true
            unique: true
          - name: "test_id"
            data_type: "string"
            required: true
          - name: "execution_date"
            data_type: "datetime"
            required: true
          - name: "status"
            data_type: "string"
            required: true
            validation_rules:
              allowed_values: ["Pass", "Fail", "Blocked", "Skipped", "Error"]
          - name: "execution_time_ms"
            data_type: "integer"
            required: false
          - name: "coverage_percentage"
            data_type: "float"
            required: false
          - name: "failure_reason"
            data_type: "text"
            required: false
          - name: "log_output"
            data_type: "text"
            required: false
          - name: "environment"
            data_type: "object"
            required: false
            description: "Test environment details (HW, SW versions)"

      # -- Module (driver module container) ----------------------------------
      - name: "Module"
        description: "Driver module container"
        extraction_strategy: "regex"
        source_formats: ["h", "c", "rst"]
        properties:
          - name: "module_name"
            data_type: "string"
            required: true
            unique: true
          - name: "description"
            data_type: "text"
            required: false
          - name: "version"
            data_type: "string"
            required: false
          - name: "file_paths"
            data_type: "list[string]"
            required: false
          - name: "hw_peripheral"
            data_type: "string"
            required: false
            description: "Associated HW peripheral name"

      # -- Operation ---------------------------------------------------------
      - name: "Operation"
        description: "HW/SW operation controlled by a bitfield or triggered by an interrupt"
        extraction_strategy: "llm"
        source_formats: ["pdf", "md", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
          - name: "description"
            data_type: "text"
            required: false
          - name: "operation_type"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["Enable", "Disable", "Configure", "Transfer", "Convert", "Reset", "Trigger"]
          - name: "label"
            data_type: "string"
            required: false
          - name: "module"
            data_type: "string"
            required: false

      # -- AccessMode --------------------------------------------------------
      - name: "AccessMode"
        description: "Access mode / permission for a register field"
        extraction_strategy: "hybrid"
        source_formats: ["pdf", "xml", "h"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
            description: "Access type name (e.g. rw, rh, r, w, rwh)"
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false

      # -- MemoryLocation ----------------------------------------------------
      - name: "MemoryLocation"
        description: "Physical memory address where a HW register is mapped"
        extraction_strategy: "hybrid"
        source_formats: ["pdf", "h", "xml"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
            description: "Address label or hex address"
          - name: "address"
            data_type: "string"
            required: false
            description: "Base address in hex (e.g., 0xF0038000)"
            extraction_pattern: "^0x[0-9A-Fa-f]+$"
          - name: "size"
            data_type: "integer"
            required: false
            description: "Size of the memory region in bytes"
          - name: "memory_type"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["SFR", "RAM", "Flash", "MMIO"]
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false

      # -- Interrupt ---------------------------------------------------------
      - name: "Interrupt"
        description: "Hardware interrupt source (IRQ/service request node)"
        extraction_strategy: "hybrid"
        source_formats: ["pdf", "h", "xml"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
          - name: "bit"
            data_type: "string"
            required: false
            description: "Bit position in status register"
          - name: "register"
            data_type: "string"
            required: false
            description: "Associated status register name"
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false
          - name: "module"
            data_type: "string"
            required: false

      # -- Error -------------------------------------------------------------
      - name: "Error"
        description: "Error condition or fault detectable via hardware registers"
        extraction_strategy: "hybrid"
        source_formats: ["pdf", "h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
          - name: "type"
            data_type: "string"
            required: false
            description: "Error type (e.g. protocol, hardware, overflow)"
          - name: "register"
            data_type: "string"
            required: false
            description: "Register that reports this error"
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false
          - name: "module"
            data_type: "string"
            required: false

      # -- Condition ---------------------------------------------------------
      - name: "Condition"
        description: "Status condition indicated by an enum value or register state"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c", "pdf"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. CONDITION_OperationSuccess)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "category"
            data_type: "string"
            required: false
            description: "Category (e.g. status, error, guard)"
          - name: "label"
            data_type: "string"
            required: false

      # -- Event -------------------------------------------------------------
      - name: "Event"
        description: "Hardware event (transmit, receive, error event)"
        extraction_strategy: "hybrid"
        source_formats: ["pdf", "h"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. EVENT_TransmitEvent)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "category"
            data_type: "string"
            required: false
            description: "Category (e.g. hardware, software)"
          - name: "label"
            data_type: "string"
            required: false

      # -- Mechanism ---------------------------------------------------------
      - name: "Mechanism"
        description: "Error detection or handling mechanism"
        extraction_strategy: "hybrid"
        source_formats: ["pdf", "h"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. MECHANISM_AutomaticDetection)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "category"
            data_type: "string"
            required: false
            description: "Category (e.g. error_detection)"
          - name: "label"
            data_type: "string"
            required: false

      # -- HardwareSubModule (v3.0) -----------------------------------------
      # A logical sub-instance of an IP block (e.g. Cxpi0, Cxpi1, Spi3).
      # Carries the base address and the parent module name.
      - name: "HardwareSubModule"
        description: >
          Logical sub-instance of an IP (e.g. CXPI0, CXPI1).  Groups
          HardwareRegister nodes and carries the base address.
        extraction_strategy: "hybrid"
        source_formats: ["pdf", "md", "h"]
        dedup_key: ["module", "name"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. HWSUB_CXPI_CXPI0)"
          - name: "name"
            data_type: "string"
            required: true
            description: "Sub-module name (e.g. CXPI0, CXPI1)"
          - name: "module"
            data_type: "string"
            required: true
            description: "Parent IP / module name (e.g. CXPI)"
          - name: "base_address"
            data_type: "string"
            required: false
            extraction_pattern: "^0x[0-9A-Fa-f]+$"
          - name: "description"
            data_type: "text"
            required: false
          - name: "hwa_source_doc"
            data_type: "string"
            required: false
          - name: "label"
            data_type: "string"
            required: false

      # -- HwConstraint (v3.0) ----------------------------------------------
      # Captures HW-spec constraints that are not encodable in a simple
      # access mode: wait loops, timing windows, ordering rules, allowed
      # access widths, frequency limits, setup/hold, etc.
      - name: "HwConstraint"
        description: >
          A hardware constraint extracted from the IP user manual /
          HW-architecture document.  Attaches to HardwareRegister,
          RegisterField, Operation, or ProgrammingSequence / SequenceStep.
        extraction_strategy: "llm"
        source_formats: ["pdf", "md"]
        dedup_key: ["module", "id"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. HWCON_CXPI_CLC_DISS_WAIT)"
          - name: "name"
            data_type: "string"
            required: true
            description: "Short human-readable constraint name"
          - name: "kind"
            data_type: "string"
            required: true
            description: "Constraint category"
            validation_rules:
              allowed_values:
                - "timing"        # e.g. delay/latency between actions
                - "wait_loop"     # poll-until-bit semantics
                - "ordering"      # must happen before / after
                - "access_width"  # 8/16/32-bit access required
                - "frequency"     # max / min clock or update rate
                - "setup_hold"    # signal setup / hold
                - "atomicity"     # word-wise or RMW restrictions
                - "preconditions" # other registers/state required first
                - "side_effect"   # read-clears / write-1-to-clear, etc.
          - name: "value"
            data_type: "string"
            required: false
            description: "Numeric value or bound (e.g. '2', '100', '<= 50')"
          - name: "unit"
            data_type: "string"
            required: false
            description: "Unit of the value (e.g. cycles, ns, us, MHz, bits)"
          - name: "condition"
            data_type: "text"
            required: false
            description: "Triggering or applicability condition (free text)"
          - name: "rationale"
            data_type: "text"
            required: false
          - name: "source_section"
            data_type: "string"
            required: false
            description: "Section/heading in the HW-arch doc (citation)"
          - name: "hwa_source_doc"
            data_type: "string"
            required: false
          - name: "module"
            data_type: "string"
            required: true
          - name: "label"
            data_type: "string"
            required: false

      # -- ProgrammingSequence (v3.0) ---------------------------------------
      # A named programming sequence for a specific use-case
      # (Init / Tx / Rx / Shutdown / SafetyCheck ...).  Made of ordered
      # SequenceStep nodes chained by NEXT_STEP.
      - name: "ProgrammingSequence"
        description: >
          Ordered programming sequence extracted from the HW manual
          (e.g. CXPI Init, BTM Tx-burst).  Contains SequenceStep nodes
          chained by NEXT_STEP.  Bound to a Function via REALIZES_SEQUENCE.
        extraction_strategy: "llm"
        source_formats: ["pdf", "md"]
        dedup_key: ["module", "id"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. PSEQ_CXPI_Init)"
          - name: "name"
            data_type: "string"
            required: true
            description: "Sequence name (e.g. 'Init', 'TxBurst', 'Shutdown')"
          - name: "use_case"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values:
                - "Init"
                - "Configure"
                - "Tx"
                - "Rx"
                - "Shutdown"
                - "SafetyCheck"
                - "ErrorRecovery"
                - "Calibration"
                - "PowerDown"
                - "WakeUp"
                - "Other"
          - name: "description"
            data_type: "text"
            required: false
          - name: "step_count"
            data_type: "integer"
            required: false
          - name: "module"
            data_type: "string"
            required: true
          - name: "hwa_source_doc"
            data_type: "string"
            required: false
          - name: "source_section"
            data_type: "string"
            required: false
          - name: "label"
            data_type: "string"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- SequenceStep (v3.0) ----------------------------------------------
      - name: "SequenceStep"
        description: >
          One ordered step within a ProgrammingSequence.  Linked to the
          Operation it performs and/or the HardwareRegister it touches.
        extraction_strategy: "llm"
        source_formats: ["pdf", "md"]
        dedup_key: ["sequence_id", "order"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. PSTEP_CXPI_Init_03)"
          - name: "sequence_id"
            data_type: "string"
            required: true
            description: "Parent ProgrammingSequence ID"
          - name: "order"
            data_type: "integer"
            required: true
            description: "0-based ordinal position inside the sequence"
          - name: "name"
            data_type: "string"
            required: true
            description: "Short step name (e.g. 'Release reset', 'Poll BUSY=0')"
          - name: "action"
            data_type: "text"
            required: false
            description: "Imperative action text from HW manual"
          - name: "step_type"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values:
                - "WriteRegister"
                - "ReadRegister"
                - "WaitBit"        # poll-until
                - "Delay"          # fixed delay
                - "EnableClock"
                - "ReleaseReset"
                - "AssertReset"
                - "Configure"
                - "Check"
                - "Other"
          - name: "expected_value"
            data_type: "string"
            required: false
          - name: "timeout"
            data_type: "string"
            required: false
            description: "For WaitBit/Delay steps"
          - name: "module"
            data_type: "string"
            required: true
          - name: "label"
            data_type: "string"
            required: false

    # -------------------------------------------------------------------------
    # RELATIONSHIP TYPES
    # -------------------------------------------------------------------------
    # Names match Neo4j exactly (case-sensitive).
    # -------------------------------------------------------------------------
    relationship_types:

      # =================================================================
      # ASPICE V-Model Traceability
      # =================================================================

      - name: "IMPLEMENTS"
        description: "Function implements requirement"
        from_types: ["Function"]
        to_types: ["Requirement"]
        properties:
          - name: "implementation_coverage"
            data_type: "string"
            validation_rules:
              allowed_values: ["Full", "Partial", "None"]

      - name: "IMPLEMENTED_BY"
        description: "Requirement is implemented by function (reverse of IMPLEMENTS)"
        from_types: ["Requirement"]
        to_types: ["Function"]
        properties: []

      - name: "TRACES_TO"
        description: "Test traces to requirement (verification)"
        from_types: ["TestSpecification", "TestCode"]
        to_types: ["Requirement"]
        properties:
          - name: "trace_type"
            data_type: "string"
            validation_rules:
              allowed_values: ["Direct", "Indirect"]

      - name: "VERIFIES"
        description: "Test result verifies requirement"
        from_types: ["TestResult"]
        to_types: ["Requirement"]
        properties:
          - name: "result"
            data_type: "string"
            validation_rules:
              allowed_values: ["Pass", "Fail", "Partial"]
          - name: "coverage"
            data_type: "float"

      - name: "RELATES_TO"
        description: "Requirement relates to another requirement (cross-reference)"
        from_types: ["Requirement"]
        to_types: ["Requirement"]
        properties:
          - name: "relation_note"
            data_type: "text"

      - name: "PARENT_REQUIREMENT"
        description: "Requirement hierarchy"
        from_types: ["Requirement"]
        to_types: ["Requirement"]
        properties: []

      # =================================================================
      # Function-level Relationships
      # =================================================================

      - name: "DEPENDS_ON"
        description: "Function depends on another function"
        from_types: ["Function"]
        to_types: ["Function"]
        properties:
          - name: "dependency_type"
            data_type: "string"
            validation_rules:
              allowed_values: ["Calls", "Requires", "Uses"]

      - name: "CALLS_INTERNALLY"
        description: "Function/EnumValue calls another function within module"
        from_types: ["EnumValue", "Function"]
        to_types: ["Function"]
        properties:
          - name: "call_site_line"
            data_type: "integer"
            description: "Line number where the call occurs"
          - name: "confidence"
            data_type: "float"
            description: "Analysis confidence (0.0-1.0)"

      - name: "CALLS_EXTERNAL"
        description: "Function calls a function from a different module"
        from_types: ["Function"]
        to_types: ["Function"]
        properties:
          - name: "target_module"
            data_type: "string"
            description: "Name of the module containing the called function"
          - name: "confidence"
            data_type: "float"

      - name: "HAS_PARAMETER"
        description: "Function has a parameter"
        from_types: ["Function"]
        to_types: ["Parameter"]
        properties:
          - name: "position"
            data_type: "integer"
            description: "0-based ordinal position in the parameter list"

      - name: "RETURN_TYPE"
        description: "Function has this return type"
        from_types: ["Function"]
        to_types: ["ReturnType"]
        properties: []

      - name: "HAS_CASE"
        description: "Function contains a named switch-case branch (via EnumValue)"
        from_types: ["Function"]
        to_types: ["EnumValue"]
        properties:
          - name: "switch_variable"
            data_type: "string"
            description: "Variable used in the switch expression"

      - name: "USED_BY"
        description: "Struct is used by a function (as parameter, local variable, etc.)"
        from_types: ["Struct"]
        to_types: ["Function"]
        properties:
          - name: "usage_context"
            data_type: "string"
            validation_rules:
              allowed_values: ["Parameter", "LocalVariable", "ReturnValue", "Global"]

      # =================================================================
      # Type-system Relationships
      # =================================================================

      - name: "OF_TYPE"
        description: "Parameter or struct member is of a specific type"
        from_types: ["Parameter", "StructMember"]
        to_types: ["Struct", "Typedef", "Enum", "PrimitiveType"]
        properties: []

      - name: "ALIASES"
        description: "Typedef aliases a primitive or other type"
        from_types: ["Typedef"]
        to_types: ["PrimitiveType", "Struct", "Enum"]
        properties: []

      - name: "USED_IN"
        description: "Typedef is used inside a struct definition"
        from_types: ["Typedef"]
        to_types: ["Struct"]
        properties:
          - name: "member_name"
            data_type: "string"
            description: "Name of the struct member that uses this typedef"

      - name: "HAS_VALUE"
        description: "Enum has an individual enumerator value"
        from_types: ["Enum"]
        to_types: ["EnumValue"]
        properties: []

      - name: "HAS_MEMBER"
        description: "Struct has a struct member"
        from_types: ["Struct"]
        to_types: ["StructMember"]
        properties: []

      # =================================================================
      # HW Register Relationships (SFR from _regdef.h)
      # =================================================================

      - name: "HAS_BITFIELD"
        description: "SFR Register has bitfield"
        from_types: ["Register"]
        to_types: ["BitField"]
        properties: []

      - name: "BITFIELD_CONTROLS"
        description: "Bitfield controls a hardware or software operation"
        from_types: ["BitField"]
        to_types: ["Operation"]
        properties:
          - name: "control_semantics"
            data_type: "string"
            description: "How the bitfield value maps to the operation (e.g., 1=Enable)"

      # =================================================================
      # HW Register Relationships (from HW spec PDF)
      # =================================================================

      - name: "HAS_FIELD"
        description: "HardwareRegister has a register field"
        from_types: ["HardwareRegister"]
        to_types: ["RegisterField"]
        properties: []

      - name: "HAS_ACCESS_TYPE"
        description: "Register field has an access mode (rw, rh, r, w, etc.)"
        from_types: ["RegisterField"]
        to_types: ["AccessMode"]
        properties: []

      - name: "LOCATED_AT"
        description: "Hardware register is mapped at a memory location"
        from_types: ["HardwareRegister"]
        to_types: ["MemoryLocation"]
        properties:
          - name: "offset"
            data_type: "string"
            description: "Offset from module base address (hex)"

      # =================================================================
      # Interrupt / Error / Condition Relationships
      # =================================================================

      - name: "INTERRUPT_TRIGGERS"
        description: "Interrupt triggers a hardware event"
        from_types: ["Interrupt"]
        to_types: ["Event"]
        properties:
          - name: "trigger_condition"
            data_type: "string"
            description: "Condition under which the interrupt fires"

      - name: "DETECTED_BY"
        description: "Error is detected by a mechanism"
        from_types: ["Error"]
        to_types: ["Mechanism"]
        properties:
          - name: "detection_bitfield"
            data_type: "string"
            description: "Specific bitfield that signals this error"

      - name: "INDICATES"
        description: "EnumValue indicates a status condition"
        from_types: ["EnumValue"]
        to_types: ["Condition"]
        properties: []

      # =================================================================
      # Module & Architectural Relationships
      # =================================================================

      - name: "BELONGS_TO"
        description: "Entity belongs to module"
        from_types: ["Function", "Struct", "Enum", "Typedef", "TestSpecification", "TestCode"]
        to_types: ["Module"]
        properties: []

      - name: "DERIVED_FROM"
        description: "Requirement derived from HW spec or architecture"
        from_types: ["Requirement"]
        to_types: ["HardwareRegister", "SoftwareArchitecture"]
        properties:
          - name: "derivation_rationale"
            data_type: "text"

      - name: "FOLLOWS_SEQUENCE"
        description: "Test follows sequence diagram"
        from_types: ["TestSpecification", "TestCode"]
        to_types: ["SequenceDiagram"]
        properties:
          - name: "sequence_coverage"
            data_type: "string"
            validation_rules:
              allowed_values: ["Full", "Partial"]

      - name: "ACCESSES_REGISTER"
        description: "Function accesses hardware register"
        from_types: ["Function"]
        to_types: ["Register"]
        properties:
          - name: "access_type"
            data_type: "string"
            validation_rules:
              allowed_values: ["Read", "Write", "ReadWrite"]

      - name: "CONTROLS"
        description: "Function controls or writes to a hardware register"
        from_types: ["Function"]
        to_types: ["Register"]
        properties:
          - name: "control_type"
            data_type: "string"
            validation_rules:
              allowed_values: ["Enable", "Disable", "Configure", "Reset", "Set", "Clear"]
          - name: "bitfield"
            data_type: "string"
            description: "Specific bitfield being controlled"

      - name: "TRIGGERED_BY"
        description: "Function is triggered by an interrupt or hardware event"
        from_types: ["Function"]
        to_types: ["Register", "HardwareRegister"]
        properties:
          - name: "trigger_type"
            data_type: "string"
            validation_rules:
              allowed_values: ["Interrupt", "Event", "Timer", "DMA", "Hardware"]
          - name: "priority"
            data_type: "integer"

      # =================================================================
      # Verification (N-ary for ASPICE)
      # =================================================================

      - name: "VERIFICATION_EVENT"
        description: "N-ary relationship capturing complete verification chain"
        from_types: ["Function"]
        to_types: ["Requirement"]
        statement_node: true
        properties:
          - name: "tested_by"
            data_type: "string"
            description: "Test ID that tested this"
          - name: "test_result"
            data_type: "string"
            validation_rules:
              allowed_values: ["Pass", "Fail", "NotTested"]
          - name: "coverage"
            data_type: "float"
          - name: "reviewer"
            data_type: "string"
          - name: "review_date"
            data_type: "datetime"
          - name: "evidence_path"
            data_type: "string"

      # =================================================================
      # HW Sub-module / Constraint / Programming-sequence (v3.0)
      # =================================================================

      - name: "PART_OF_SUBMODULE"
        description: "HardwareRegister belongs to a HardwareSubModule"
        from_types: ["HardwareRegister"]
        to_types: ["HardwareSubModule"]
        properties:
          - name: "offset"
            data_type: "string"
            description: "Offset from the sub-module base address (hex)"

      - name: "HAS_CONSTRAINT"
        description: >
          HW-spec constraint attached to a register, field, operation or
          programming sequence (timing, ordering, wait-loop, etc.).
        from_types:
          - "HardwareRegister"
          - "RegisterField"
          - "Operation"
          - "ProgrammingSequence"
          - "SequenceStep"
        to_types: ["HwConstraint"]
        properties:
          - name: "scope"
            data_type: "string"
            description: "Where the constraint applies (read|write|configure|wait|delay)"

      - name: "HAS_STEP"
        description: "ProgrammingSequence has an ordered step"
        from_types: ["ProgrammingSequence"]
        to_types: ["SequenceStep"]
        properties:
          - name: "order"
            data_type: "integer"

      - name: "NEXT_STEP"
        description: "Ordered chain of SequenceStep nodes"
        from_types: ["SequenceStep"]
        to_types: ["SequenceStep"]
        properties: []

      - name: "STEP_OPERATION"
        description: "SequenceStep performs an Operation"
        from_types: ["SequenceStep"]
        to_types: ["Operation"]
        properties: []

      - name: "STEP_USES_REGISTER"
        description: "SequenceStep reads/writes a HardwareRegister or RegisterField"
        from_types: ["SequenceStep"]
        to_types: ["HardwareRegister", "RegisterField"]
        properties:
          - name: "access"
            data_type: "string"
            validation_rules:
              allowed_values: ["Read", "Write", "ReadWrite", "Poll"]
          - name: "expected_value"
            data_type: "string"

      - name: "REALIZES_SEQUENCE"
        description: "Function realizes a HW programming sequence"
        from_types: ["Function"]
        to_types: ["ProgrammingSequence"]
        properties:
          - name: "coverage"
            data_type: "string"
            validation_rules:
              allowed_values: ["Full", "Partial"]

      # =================================================================
      # Legacy alias (v3.0) — used only during the transition window so
      # that any leftover :Register / :BitField nodes can be wired to
      # their unified counterparts.  Re-ingestion eliminates the need.
      # =================================================================

      - name: "MAPS_TO"
        description: "Deprecated alias edge from old SFR labels to unified labels"
        from_types: ["Register", "BitField"]
        to_types: ["HardwareRegister", "RegisterField"]
        properties: []
        deprecated: true

    # -------------------------------------------------------------------------
    # EXTRACTION PATTERNS
    # -------------------------------------------------------------------------
    extraction_patterns:
      c_function_signature: |
        (?P<return_type>[\w\s\*]+)\s+(?P<function_name>[A-Za-z_][A-Za-z0-9_]*)\s*\((?P<params>[^)]*)\)

      doxygen_brief: |
        \\brief\s+(.+?)(?=\\|$|\n\s*\n)

      doxygen_param: |
        \\param\s+(?:\[(?P<direction>in|out|in,out)\])?\s*(?P<name>\w+)\s+(?P<desc>.+?)(?=\\param|\\return|\\retval|$)

      doxygen_return: |
        \\return\s+(.+?)(?=\\|$|\n\s*\n)

      doxygen_retval: |
        \\retval\s+(\w+)\s+(.+?)(?=\\retval|\\|$|\n\s*\n)

      doxygen_trace: |
        \\trace\{([^}]+)\}

      c_enum: |
        typedef\s+enum\s*\{([^}]+)\}\s*(\w+);

      c_struct: |
        typedef\s+struct\s*\{([^}]+)\}\s*(\w+);

      requirement_id: |
        [A-Z0-9]+-[A-Z]+-\d+

    # -------------------------------------------------------------------------
    # VALIDATION RULES
    # -------------------------------------------------------------------------
    validation_rules:
      requirement_completeness:
        required_fields: ["requirement_id", "name", "description"]
        warning_if_missing: ["status", "priority", "asil_level"]

      test_coverage:
        minimum_coverage: 80
        require_test_for_asil: ["ASIL_A", "ASIL_B", "ASIL_C", "ASIL_D"]

      traceability:
        require_implementation: true
        require_verification: true
        require_test_result: false

    # -------------------------------------------------------------------------
    # QUERY TEMPLATES (Cypher for Neo4j)
    # -------------------------------------------------------------------------
    query_templates:

      functions_for_requirement: |
        MATCH (f:Function)-[:IMPLEMENTS]->(r:Requirement {requirement_id: $req_id})
        RETURN f

      uncovered_requirements: |
        MATCH (r:Requirement)
        WHERE NOT EXISTS {
          MATCH (t:TestSpecification)-[:TRACES_TO]->(r)
        }
        RETURN r

      traceability_chain: |
        MATCH path = (t:TestResult)-[:VERIFIES]->(:TestSpecification)-[:TRACES_TO]->(r:Requirement)<-[:IMPLEMENTS]-(f:Function)
        WHERE r.requirement_id = $req_id
        RETURN path

      function_dependencies: |
        MATCH (f:Function {name: $func_name})-[:DEPENDS_ON*1..3]->(dep:Function)
        RETURN DISTINCT dep

      test_sequence: |
        MATCH (t:TestSpecification {test_id: $test_id})-[:FOLLOWS_SEQUENCE]->(s:SequenceDiagram)
        RETURN s.sequence_steps as steps, s.participants as participants

      register_fields: |
        MATCH (hr:HardwareRegister {name: $reg_name})-[:HAS_FIELD]->(rf:RegisterField)-[:HAS_ACCESS_TYPE]->(am:AccessMode)
        RETURN rf.name AS field, rf.bits AS bits, am.name AS access, rf.description AS desc

      function_type_graph: |
        MATCH (f:Function)-[:HAS_PARAMETER]->(p:Parameter)-[:OF_TYPE]->(t)
        WHERE f.name = $func_name
        RETURN p.name AS param, labels(t)[0] AS type_kind, t.name AS type_name

      error_detection: |
        MATCH (e:Error)-[:DETECTED_BY]->(m:Mechanism)
        RETURN e.name AS error, m.name AS mechanism, e.description AS desc

      # ----- v3.0 templates -------------------------------------------------

      hw_constraints_for_register: |
        MATCH (hr:HardwareRegister {module: $module, name: $reg_name})
        OPTIONAL MATCH (hr)-[:HAS_CONSTRAINT]->(c:HwConstraint)
        OPTIONAL MATCH (hr)-[:HAS_FIELD]->(rf:RegisterField)-[:HAS_CONSTRAINT]->(fc:HwConstraint)
        RETURN hr.name AS register,
               collect(DISTINCT {kind: c.kind, value: c.value, unit: c.unit,
                                  condition: c.condition, src: c.source_section}) AS reg_constraints,
               collect(DISTINCT {field: rf.name, kind: fc.kind, value: fc.value,
                                  unit: fc.unit, condition: fc.condition}) AS field_constraints

      programming_sequence_for: |
        MATCH (ps:ProgrammingSequence {module: $module, name: $sequence_name})
        MATCH (ps)-[:HAS_STEP]->(s:SequenceStep)
        OPTIONAL MATCH (s)-[:STEP_OPERATION]->(op:Operation)
        OPTIONAL MATCH (s)-[u:STEP_USES_REGISTER]->(reg)
        OPTIONAL MATCH (s)-[:HAS_CONSTRAINT]->(sc:HwConstraint)
        WITH ps, s, op, reg, u, collect(DISTINCT sc) AS step_constraints
        ORDER BY s.order
        RETURN ps.name AS sequence,
               s.order AS step_order,
               s.name AS step_name,
               s.step_type AS step_type,
               s.action AS action,
               op.name AS operation,
               labels(reg)[0] AS target_label,
               reg.name AS target_name,
               u.access AS access,
               s.expected_value AS expected_value,
               s.timeout AS timeout,
               [c IN step_constraints WHERE c IS NOT NULL | c.kind + ':' + coalesce(c.value, '')] AS constraints

      function_register_access_chain: |
        MATCH (f:Function {name: $func_name})
        OPTIONAL MATCH (f)-[a:ACCESSES_REGISTER]->(hr:HardwareRegister)
        OPTIONAL MATCH (hr)-[:HAS_FIELD]->(rf:RegisterField)-[:BITFIELD_CONTROLS]->(op:Operation)
        RETURN f.name AS function,
               hr.name AS register,
               a.access_type AS access,
               collect(DISTINCT {field: rf.name, operation: op.name}) AS controls

      requirement_to_test_to_code: |
        MATCH (r:Requirement {requirement_id: $req_id})
        OPTIONAL MATCH (r)<-[:IMPLEMENTS]-(f:Function)
        OPTIONAL MATCH (r)<-[:TRACES_TO]-(ts:TestSpecification)
        OPTIONAL MATCH (ts)<-[:VERIFIES]-(tr:TestResult)
        OPTIONAL MATCH (f)-[:REALIZES_SEQUENCE]->(ps:ProgrammingSequence)
        RETURN r.requirement_id AS requirement,
               collect(DISTINCT f.name) AS functions,
               collect(DISTINCT ts.test_id) AS test_specs,
               collect(DISTINCT {test: tr.test_id, status: tr.status}) AS results,
               collect(DISTINCT ps.name) AS sequences

      submodule_register_map: |
        MATCH (sm:HardwareSubModule {module: $module})
        OPTIONAL MATCH (hr:HardwareRegister)-[p:PART_OF_SUBMODULE]->(sm)
        RETURN sm.name AS submodule, sm.base_address AS base,
               collect({register: hr.name, offset: p.offset, address: hr.address}) AS registers
