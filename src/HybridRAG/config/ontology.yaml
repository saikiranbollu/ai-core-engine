      # -- SW_VAR – Software Variant / Release  (Jama item_type 71) ----------
      - name: "SoftwareRelease"
        jama_item_type: 71
        jama_key_prefix: "AU3GM-SW_VAR"
        description: >
          Represents a software release version / variant.  Used to track
          which requirements are targeted for which release.
        count: 14
        extraction_strategy: "direct_mapping"
        source_formats: ["json"]
        properties:
          - name: "release_id"
            data_type: "string"
            required: true
            unique: true
            jama_field: "documentKey"
          - name: "global_id"
            data_type: "string"
            required: false
            jama_field: "globalId"
          - name: "jama_id"
            data_type: "integer"
            required: true
            unique: true
            jama_field: "id"
          - name: "name"
            data_type: "string"
            required: true
            description: "Release version string"
            jama_field: "name"
          - name: "description"
            data_type: "text"
            required: false
            jama_field: "description"
          - name: "status"
            data_type: "integer"
            required: false
            jama_field: "status"

      # -- VD – Verification Domain  (Jama item_type 50) ---------------------
      - name: "VerificationDomain"
        jama_item_type: 50
        jama_key_prefix: "AU3GM-VD"
        description: >
          Classification of verification methods (Testing, Code Analysis,
          Review, Configuration, Not applicable).
        count: 5
        extraction_strategy: "direct_mapping"
        source_formats: ["json"]
        properties:
          - name: "domain_id"
            data_type: "string"
            required: true
            unique: true
            jama_field: "documentKey"
          - name: "global_id"
            data_type: "string"
            required: false
            jama_field: "globalId"
          - name: "jama_id"
            data_type: "integer"
            required: true
            unique: true
            jama_field: "id"
          - name: "name"
            data_type: "string"
            required: true
            description: "Verification method name"
            jama_field: "name"

      # -- FLD – Folder  (Jama item_type 32) ---------------------------------
      - name: "Folder"
        jama_item_type: 32
        jama_key_prefix: "AU3GM-FLD"
        description: >
          Hierarchical organisational container in the Jama project tree.
          During the build, folders are fetched from the Jama API for each
          module to reconstruct the PRQ hierarchy (General, Error, API,
          Configuration, Definitions, Performance, etc.).
        count: 1484
        extraction_strategy: "jama_api_hierarchy"
        source_formats: ["json", "jama_api"]
        properties:
          - name: "folder_id"
            data_type: "string"
            required: true
            unique: true
            jama_field: "documentKey"
          - name: "global_id"
            data_type: "string"
            required: false
            jama_field: "globalId"
          - name: "jama_id"
            data_type: "integer"
            required: true
            unique: true
            jama_field: "id"
          - name: "name"
            data_type: "string"
            required: true
            jama_field: "name"
          - name: "description"
            data_type: "text"
            required: false
            jama_field: "description"
          - name: "visibility"
            data_type: "integer"
            required: false
            jama_field: "visibility$32"
          - name: "folder_level"
            data_type: "integer"
            required: false
            description: >
              Depth in the module folder tree.  0 = module root folder,
              1 = top-level category (General/Error/API/Configuration),
              2+ = sub-folders under the category.
          - name: "requirement_category"
            data_type: "string"
            required: false
            description: >
              The top-level PRQ category this folder belongs to
              (General, Error, API, Configuration, Definitions, etc.).
              Set for the category folder itself and all its descendants.

      # -- SET – Set (Container)  (Jama item_type 31) ------------------------
      - name: "Set"
        jama_item_type: 31
        jama_key_prefix: "AU3GM-SET"
        description: >
          Named container / collection used to organise related items.
        count: 77
        extraction_strategy: "direct_mapping"
        source_formats: ["json"]
        properties:
          - name: "set_id"
            data_type: "string"
            required: true
            unique: true
            jama_field: "documentKey"
          - name: "global_id"
            data_type: "string"
            required: false
            jama_field: "globalId"
          - name: "jama_id"
            data_type: "integer"
            required: true
            unique: true
            jama_field: "id"
          - name: "name"
            data_type: "string"
            required: true
            jama_field: "name"
          - name: "set_key"
            data_type: "string"
            required: false
            jama_field: "setKey"

      # -- CMP – Component  (Jama item_type 30) ------------------------------
      - name: "Component"
        jama_item_type: 30
        jama_key_prefix: "AU3GM-CMP"
        description: >
          Top-level project component (e.g. Hardware, Product Level,
          Project Information).
        count: 20
        extraction_strategy: "direct_mapping"
        source_formats: ["json"]
        properties:
          - name: "component_id"
            data_type: "string"
            required: true
            unique: true
            jama_field: "documentKey"
          - name: "global_id"
            data_type: "string"
            required: false
            jama_field: "globalId"
          - name: "jama_id"
            data_type: "integer"
            required: true
            unique: true
            jama_field: "id"
          - name: "name"
            data_type: "string"
            required: true
            jama_field: "name"

      # -- MCALModule (derived / synthetic node) ------------------------------
      - name: "MCALModule"
        jama_item_type: null
        description: >
          Synthetic node representing a MCAL driver module (ADC, CAN, SPI,
          etc.).  Derived from the module prefix in PRQ/SHRQ/PVS names.
          Acts as a grouping hub in the graph.
        extraction_strategy: "derived"
        properties:
          - name: "module_name"
            data_type: "string"
            required: true
            unique: true
            description: "Canonical module name (e.g. ADC, CAN, SPI)"
          - name: "description"
            data_type: "text"
            required: false
          - name: "autosar_compliant"
            data_type: "boolean"
            required: false
            description: "Whether this module is an AUTOSAR standardised BSW module"

      # =====================================================================
      #  SWA (Software Architecture) — Exported SW Interface Node Types
      # =====================================================================
      # Extracted from SWA PDF/DOCX documents, section "Exported SW interfaces"
      # (e.g. section 3.1.8 in TC4xx_SW_MCAL_SWA_Adc).
      #
      # These capture the *architectural specification* of the module's public
      # interface — data types, macros, API functions, callbacks, and interrupt
      # handlers — as authored in the SWA document.  Each element carries
      # explicit traceability back to PRQ requirements via parentID tags
      # embedded in the source document.
      #
      # Source format: AUTOSAR-style specification tables rendered as
      # structured Markdown after PDF/DOCX conversion.
      # =====================================================================

      # -- SWA_DataType  —  Architectural data-type specification ------------
      - name: "SWA_DataType"
        jama_item_type: null
        description: >
          Data-type definition from the SWA "Exported SW interfaces >
          Data types" section.  Each entry specifies an AUTOSAR / Infineon
          type used in the module's API surface — with its base type,
          declared file, valid range, description, and design decisions.
          Examples: Adc_ChannelType, Adc_GroupType, Adc_StatusType.
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "type_name"
            data_type: "string"
            required: true
            unique: true
            description: "Canonical type name (e.g. Adc_ChannelType)"
          - name: "base_type"
            data_type: "string"
            required: false
            description: "Underlying C type (e.g. uint8, uint16, sint32, Enumeration, Structure)"
          - name: "type_category"
            data_type: "string"
            required: false
            description: "Category of the data type"
            validation_rules:
              allowed_values:
                - "simple_type"       # Scalar typedef (e.g. Adc_ChannelType = uint8)
                - "enumeration"       # Enum with named literals (e.g. Adc_StatusType)
                - "structure"         # C struct (e.g. Adc_ConfigType)
                - "function_pointer"  # Callback typedef (e.g. Adc_NotifyFnPtrType)
          - name: "file"
            data_type: "string"
            required: false
            description: "Header file where the type is declared (e.g. Adc.h)"
          - name: "range_min"
            data_type: "string"
            required: false
            description: "Minimum valid value / label"
          - name: "range_max"
            data_type: "string"
            required: false
            description: "Maximum valid value / label"
          - name: "description"
            data_type: "text"
            required: false
            description: "Full textual description of the type and its semantics"
          - name: "design_decisions"
            data_type: "text"
            required: false
            description: "Architectural design decisions associated with this type"
          - name: "source"
            data_type: "string"
            required: false
            description: "Origin of the type (AUTOSAR, Infineon, etc.)"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: >
              PRQ requirement IDs traced from the SWA document via
              [req parentID=...] tags (e.g. AU3GM-PRQ-39613)
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC, SPI)"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWA document section number (e.g. 3.1.8.1)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- SWA_Macro  —  Architectural macro definition ----------------------
      - name: "SWA_Macro"
        jama_item_type: null
        description: >
          Macro definition from the SWA "Exported SW interfaces > Macros"
          section.  Specifies a preprocessor macro that is part of the
          module's public interface — with its value, declared file,
          description, and design decisions.
          Example: ADC_SR_COUNT (number of service request nodes per kernel).
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "macro_name"
            data_type: "string"
            required: true
            unique: true
            description: "Macro identifier (e.g. ADC_SR_COUNT)"
          - name: "value"
            data_type: "string"
            required: false
            description: "Macro value or expression"
          - name: "file"
            data_type: "string"
            required: false
            description: "Header file where the macro is defined (e.g. Adc.h)"
          - name: "description"
            data_type: "text"
            required: false
            description: "Full textual description of the macro's purpose"
          - name: "design_decisions"
            data_type: "text"
            required: false
            description: "Architectural design decisions related to this macro"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: >
              PRQ requirement IDs traced from the SWA document via
              [req parentID=...] tags
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC, SPI)"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWA document section number (e.g. 3.1.8.2)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- SWA_Function  —  Architectural function specification -------------
      - name: "SWA_Function"
        jama_item_type: null
        description: >
          Function specification from the SWA "Exported SW interfaces"
          section.  Covers four categories of functions — API functions,
          notification/callback handlers, scheduled functions, and interrupt
          handlers — all of which share the same AUTOSAR-style specification
          table format.  Each entry includes the full function signature,
          service ID, ASIL level, sync/async behaviour, reentrancy
          constraints, parameter list, return type, description, design
          decisions, and error handling.
          Examples: Adc_Init, Adc_StartGroupConversion,
          Adc_DmaTransferCompletionHandler, Adc_ValidResultEventHandler.
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "function_name"
            data_type: "string"
            required: true
            unique: true
            description: "Function identifier (e.g. Adc_Init)"
          - name: "function_category"
            data_type: "string"
            required: true
            description: "Functional category within the SWA exported interfaces"
            validation_rules:
              allowed_values:
                - "api"                 # 3.1.8.7   API functions
                - "callback"            # 3.1.8.8   Notifications and callbacks
                - "scheduled"           # 3.1.8.9   Scheduled functions
                - "interrupt_handler"   # 3.1.8.10  Interrupt handlers
          - name: "syntax"
            data_type: "text"
            required: false
            description: >
              Full C function signature as written in the SWA spec table
              (e.g. "void Adc_Init(const Adc_ConfigType * const ConfigPtr)")
          - name: "return_type"
            data_type: "string"
            required: false
            description: "Return type of the function (e.g. void, Std_ReturnType)"
          - name: "parameters_in"
            data_type: "list[object]"
            required: false
            description: >
              List of input parameters, each with name, type, description,
              and optional range [MIN, MAX]
          - name: "parameters_out"
            data_type: "list[object]"
            required: false
            description: "List of output parameters"
          - name: "parameters_inout"
            data_type: "list[object]"
            required: false
            description: "List of in-out parameters"
          - name: "service_id"
            data_type: "string"
            required: false
            description: "AUTOSAR service ID (hex, e.g. 0x00)"
          - name: "asil_level"
            data_type: "string"
            required: false
            description: "ASIL classification (e.g. D, B, QM)"
            validation_rules:
              allowed_values: ["QM", "A", "B", "C", "D"]
          - name: "sync_async"
            data_type: "string"
            required: false
            description: "Synchronous or Asynchronous execution"
            validation_rules:
              allowed_values: ["Synchronous", "Asynchronous"]
          - name: "function_type"
            data_type: "string"
            required: false
            description: "AUTOSAR function type classification"
            validation_rules:
              allowed_values: ["Standard", "Non-Standard"]
          - name: "reentrancy"
            data_type: "string"
            required: false
            description: >
              Reentrancy classification (e.g. Non Reentrant, Reentrant,
              Conditionally Reentrant)
          - name: "description"
            data_type: "text"
            required: false
            description: "Full textual description of the function's behaviour"
          - name: "design_decisions"
            data_type: "text"
            required: false
            description: >
              Architectural design decisions, rationale, and source
              associated with this function
          - name: "error_handling"
            data_type: "text"
            required: false
            description: >
              Error codes reported by this function
              (e.g. ADC_E_UNINIT, ADC_E_PARAM_POINTER)
          - name: "file"
            data_type: "string"
            required: false
            description: "Header/source file where the function is declared"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: >
              PRQ requirement IDs traced from the SWA document via
              [req parentID=...] tags
          - name: "configuration_dependencies"
            data_type: "list[string]"
            required: false
            description: >
              Configuration parameter names that gate this function's
              availability (e.g. AdcDeInitApi, AdcHwTriggerApi)
          - name: "memory_section"
            data_type: "string"
            required: false
            description: "Memory section for the function (e.g. ADC_SEC_CODE_ASIL_D)"
          - name: "user_hints"
            data_type: "text"
            required: false
            description: "Usage hints and preconditions documented in the SWA spec"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC, SPI)"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWA document section number (e.g. 3.1.8.7.1)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- SWA_EnumLiteral  —  Enumeration literal / value -------------------
      - name: "SWA_EnumLiteral"
        jama_item_type: null
        description: >
          Individual enumeration literal belonging to an SWA_DataType of
          category "enumeration".  Each literal has a symbolic name,
          numeric value, and a description of its semantics.
          Examples: ADC_IDLE (0), ADC_BUSY (1), ADC_TRIGG_SRC_SW (0),
          ADC_HW_TRIG_RISING_EDGE (1), ADC_CONV_MODE_ONESHOT (0).
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "literal_name"
            data_type: "string"
            required: true
            description: "Symbolic name of the enum literal (e.g. ADC_IDLE)"
          - name: "value"
            data_type: "string"
            required: false
            description: "Numeric value (e.g. 0, 1, 0x10)"
          - name: "description"
            data_type: "text"
            required: false
            description: "Textual description of the literal's meaning"
          - name: "parent_type"
            data_type: "string"
            required: true
            description: "Name of the parent SWA_DataType (e.g. Adc_StatusType)"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- SWA_DesignDecision  —  Architectural design decision --------------
      - name: "SWA_DesignDecision"
        jama_item_type: null
        description: >
          Inline design decision documented within the SWA specification
          tables for data types, functions, or macros.  Each decision
          carries a featureID (GUID), one or more parentID references
          to PRQ requirements, a title, description, rationale, and
          source (AUTOSAR or Infineon).
          Examples: "ADC: Start-up calibration",
          "ADC: ADC_HW_TRIG_NO_EDGE as an additional literal",
          "ADC: ADC_STREAM_COMPLETED_IDLE internal state".
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "decision_id"
            data_type: "string"
            required: true
            unique: true
            description: "Feature GUID from the [req featureID=...] tag"
          - name: "title"
            data_type: "string"
            required: true
            description: "Short title of the design decision"
          - name: "description"
            data_type: "text"
            required: false
            description: "Full description of the design decision"
          - name: "rationale"
            data_type: "text"
            required: false
            description: "Rationale justifying the decision"
          - name: "source"
            data_type: "string"
            required: false
            description: "Origin (AUTOSAR, Infineon, etc.)"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: >
              PRQ requirement IDs from [req parentID=...] tags
              (e.g. AU3GM-PRQ-39606)
          - name: "parent_element"
            data_type: "string"
            required: false
            description: >
              Name of the SWA element this decision belongs to
              (e.g. Adc_Init, Adc_HwTriggerSignalType)
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- SWA_ErrorCode  —  Error code reported by SWA functions ------------
      - name: "SWA_ErrorCode"
        jama_item_type: null
        description: >
          Error code that can be reported by one or more SWA functions.
          These are development errors (DET) or production / runtime
          errors defined in the module's error handling section.
          Multiple functions may share the same error code, making this a
          reusable node that links to all reporting functions.
          Examples: ADC_E_UNINIT, ADC_E_PARAM_GROUP, ADC_E_BUSY,
          ADC_E_CDSP_RESET_FAILURE, ADC_E_DMA_TRANSFER_FAILURE.
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "error_name"
            data_type: "string"
            required: true
            unique: true
            description: "Error code macro name (e.g. ADC_E_UNINIT)"
          - name: "error_category"
            data_type: "string"
            required: false
            description: "Error category classification"
            validation_rules:
              allowed_values:
                - "development"   # DET errors (e.g. ADC_E_UNINIT)
                - "runtime"       # Runtime / production errors
                - "safety"        # Safety-relevant errors
          - name: "description"
            data_type: "text"
            required: false
            description: "Description of the error condition"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- SWA_ConfigParameter  —  Configuration gating parameter ------------
      - name: "SWA_ConfigParameter"
        jama_item_type: null
        description: >
          Configuration parameter that controls the availability of one
          or more SWA functions.  When configured as TRUE, the gated
          API is available; when FALSE, the API is excluded from the
          build.  These map to ECUC configuration parameters in the
          AUTOSAR configuration tool.
          Examples: AdcDeInitApi, AdcEnableStartStopGroupApi,
          AdcHwTriggerApi, AdcGrpNotifCapability, AdcReadGroupApi,
          AdcInitCheckApi, AdcEnableDiagnostics, AdcEnableMissedHwTrigger.
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "param_name"
            data_type: "string"
            required: true
            unique: true
            description: "Configuration parameter name (e.g. AdcDeInitApi)"
          - name: "description"
            data_type: "text"
            required: false
            description: "Description of the configuration parameter"
          - name: "default_value"
            data_type: "string"
            required: false
            description: "Default value (TRUE / FALSE)"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- SWA_PropertyVariable  —  Property file variable -------------------
      - name: "SWA_PropertyVariable"
        jama_item_type: null
        description: >
          Property file variable from the SWA "Exported SW Interfaces"
          section (typically preceding the data types).  These variables
          are defined in device-specific .properties files and describe
          hardware configuration parameters like available input
          connections, clock sources, etc.
          Example: Eru.InputConnectionErs[x] in AURIX3G_TC4[X]_[Y].properties.
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "variable_name"
            data_type: "string"
            required: true
            unique: true
            description: "Property variable name (e.g. Eru.InputConnectionErs[x])"
          - name: "file"
            data_type: "string"
            required: false
            description: "Properties file (e.g. AURIX3G_TC4[X]_[Y].properties)"
          - name: "range"
            data_type: "string"
            required: false
            description: "Valid range or format pattern"
          - name: "description"
            data_type: "text"
            required: false
            description: "Full description of the variable's purpose"
          - name: "details"
            data_type: "text"
            required: false
            description: "Detailed information about the variable's values and format"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement IDs from [req parentID=...] tags"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC, ERU)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # =====================================================================
      #  SWA Section 3.1.3 — Architectural Decisions
      # =====================================================================
      # Standalone architectural decisions from SWA section 3.1.3.
      # Each decision documents a specific design choice, its rationale,
      # context, and traceability to PRQ requirements.  These are distinct
      # from the inline SWA_DesignDecision nodes extracted from the
      # specification tables in section 3.1.8.
      # =====================================================================

      - name: "SWA_ArchitecturalDecision"
        jama_item_type: null
        description: >
          Standalone architectural decision from SWA section 3.1.3.
          Each entry documents a specific design choice made for the
          module — covering hardware feature support, trigger mechanisms,
          result handling modes, broken wire detection, on-chip signal
          monitoring, configuration structure, and resource sharing.
          Contains a feature GUID, traceability to PRQ requirements,
          a stereotype (design_decision or information), rationale,
          context, and hierarchical sub-decisions.
          Examples: "ADC: Hardware feature support",
          "ADC: DMA based result handling",
          "ADC: On-chip signal monitoring, Core-self diagnostic".
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "decision_id"
            data_type: "string"
            required: true
            unique: true
            description: "Feature GUID from the [req featureID=...] tag"
          - name: "title"
            data_type: "string"
            required: true
            description: "Short title (e.g. 'ADC: Hardware trigger mechanisms')"
          - name: "stereotype"
            data_type: "string"
            required: false
            description: "UML stereotype classifying the entry"
            validation_rules:
              allowed_values:
                - "design_decision"   # Architectural design choice
                - "information"       # Informational / contextual note
                - "context"           # Background context
          - name: "description"
            data_type: "text"
            required: false
            description: "Full description of the architectural decision"
          - name: "rationale"
            data_type: "text"
            required: false
            description: "Rationale justifying the decision"
          - name: "context"
            data_type: "text"
            required: false
            description: "Background context for the decision"
          - name: "benefits"
            data_type: "text"
            required: false
            description: "Listed benefits of the chosen approach"
          - name: "limitations"
            data_type: "text"
            required: false
            description: "Listed limitations or constraints"
          - name: "notes"
            data_type: "text"
            required: false
            description: "Additional notes or caveats"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWA document section number (e.g. 3.1.3.5.2)"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement IDs from [req parentID=...] tags"
          - name: "feature_id_references"
            data_type: "list[string]"
            required: false
            description: "Feature GUID references from parentID (non-PRQ GUIDs)"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # =====================================================================
      #  SWA Section 3.1.5 — HW-SW Interface
      # =====================================================================
      # Hardware peripherals the module depends on, as documented in
      # SWA section 3.1.5.  Each peripheral specifies functional features,
      # users of the hardware, diagnostic features, and HW events used.
      # =====================================================================

      - name: "SWA_HwPeripheral"
        jama_item_type: null
        description: >
          Hardware peripheral dependency from SWA section 3.1.5
          (HW-SW Interface).  Each entry describes a hardware IP block
          that the module depends on — its functional features, which
          driver configures it, diagnostic features (SMU alarms), and
          hardware events consumed by the module.
          Examples: TMADC (primary), CDSP (post-processing),
          ERU (external triggers), DMA (result transfer),
          eGTM/GTM (timer triggers), DSADC (carrier signal trigger).
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "peripheral_name"
            data_type: "string"
            required: true
            unique: true
            description: "Hardware peripheral / IP block name (e.g. TMADC, ERU, CDSP)"
          - name: "peripheral_type"
            data_type: "string"
            required: false
            description: "Classification of the peripheral relationship"
            validation_rules:
              allowed_values:
                - "primary"           # Core peripheral (e.g. TMADC for ADC)
                - "dependent"         # Dependent peripheral (e.g. DMA, ERU)
                - "shared"            # Shared with other drivers
          - name: "functional_features"
            data_type: "text"
            required: false
            description: "Hardware functional features used by the module"
          - name: "unsupported_features"
            data_type: "text"
            required: false
            description: "Hardware features NOT supported by the driver"
          - name: "users_of_hardware"
            data_type: "text"
            required: false
            description: "Which driver(s) configure and access the peripheral"
          - name: "diagnostic_features"
            data_type: "text"
            required: false
            description: "Supported diagnostic features (CSD, BWD, monitoring)"
          - name: "hw_events"
            data_type: "list[string]"
            required: false
            description: "Hardware events consumed (result, boundary, error events)"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWA document section number (e.g. 3.1.5.3)"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement IDs from [req parentID=...] tags"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module that depends on this peripheral"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # =====================================================================
      #  SWA Section 3.1.6 — SW-SW Interface
      # =====================================================================
      # External software dependencies (APIs called by the module),
      # as documented in SWA section 3.1.6.  Each dependency specifies
      # the external function/macro name, provider module, and purpose.
      # =====================================================================

      - name: "SWA_SwDependency"
        jama_item_type: null
        description: >
          External software dependency from SWA section 3.1.6
          (SW-SW Interface).  Each entry represents an API function
          or macro from another module that the current module calls.
          Captures the full dependency graph between MCAL modules.
          Examples: Cdsp_Setup, Dma_ChUpdate, Det_ReportError,
          SchM_Enter_Adc_RuntimeProtWriteSeq, Mcu_GetStmTicks.
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "api_name"
            data_type: "string"
            required: true
            unique: true
            description: "External API/function/macro name (e.g. Cdsp_Setup)"
          - name: "provider_module"
            data_type: "string"
            required: false
            description: "Module that provides this API (e.g. Cdsp, Dma, Det)"
          - name: "description"
            data_type: "text"
            required: false
            description: "Why the module uses this external API"
          - name: "dependency_type"
            data_type: "string"
            required: false
            description: "Type of dependency"
            validation_rules:
              allowed_values:
                - "function_call"     # Direct function call (e.g. Cdsp_Setup)
                - "macro"             # Macro usage (e.g. MCALUTIL_SFRREAD)
                - "callback"          # Callback invocation (e.g. Dem_SetEventStatus)
                - "protection"        # Exclusive area (e.g. SchM_Enter_*)
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement IDs from [req parentID=...] tags"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module that calls this API (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # =====================================================================
      #  SWA Section 3.1.7 — Configuration
      # =====================================================================
      # ECUC configuration containers and parameters from SWA section 3.1.7.
      # The configuration hierarchy follows the AUTOSAR ECUC model:
      #   Module (Adc) → ConfigSet → Containers → Parameters
      # =====================================================================

      - name: "SWA_ConfigContainer"
        jama_item_type: null
        description: >
          ECUC configuration container from SWA section 3.1.7
          (Configuration).  Each container groups related configuration
          parameters in the AUTOSAR ECUC model.  Containers can be
          nested (sub-containers) and carry multiplicity constraints.
          Examples: Adc, AdcGeneral, AdcConfigSet, AdcHwUnit, AdcGroup,
          AdcChannel, AdcTimerTriggerConfig, AdcEruTriggerConfig,
          AdcPostProcessingConfig, AdcCdspConfigSet.
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "container_name"
            data_type: "string"
            required: true
            unique: true
            description: "Container name (e.g. AdcHwUnit, AdcGroup)"
          - name: "container_type"
            data_type: "string"
            required: false
            description: "ECUC container type"
            validation_rules:
              allowed_values:
                - "EcucModuleDef"
                - "EcucParamConfContainerDef"
                - "EcucChoiceContainerDef"
          - name: "description"
            data_type: "text"
            required: false
            description: "Description of the configuration container"
          - name: "multiplicity_min"
            data_type: "integer"
            required: false
            description: "Lower multiplicity (e.g. 0, 1)"
          - name: "multiplicity_max"
            data_type: "integer"
            required: false
            description: "Upper multiplicity (e.g. 1, 7, 1024)"
          - name: "post_build_variant_multiplicity"
            data_type: "boolean"
            required: false
            description: "Whether multiplicity is variant-dependent"
          - name: "multiplicity_config_class"
            data_type: "string"
            required: false
            description: "Configuration class for multiplicity (Pre-Compile / Post-Build)"
          - name: "origin"
            data_type: "string"
            required: false
            description: "Origin of the container definition (AUTOSAR_ECUC, Infineon)"
          - name: "scope"
            data_type: "string"
            required: false
            description: "Scope of the container (Local, ECU)"
          - name: "dependencies"
            data_type: "list[string]"
            required: false
            description: "Dependencies on other containers or modules"
          - name: "sub_containers"
            data_type: "list[string]"
            required: false
            description: "Names of child sub-containers"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWA document section number (e.g. 3.1.7.1.1)"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement IDs from [req parentID=...] tags"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      - name: "SWA_ConfigParam"
        jama_item_type: null
        description: >
          ECUC configuration parameter from SWA section 3.1.7
          (Configuration).  Each parameter has a full AUTOSAR-style
          specification: name, type, range, default value, multiplicity,
          post-build variant support, origin, and dependencies.
          Covers boolean, enumeration, integer, float, string, and
          reference parameter types.
          Examples: AdcDeInitApi (boolean), AdcPriorityImplementation
          (enum), AdcSamplingTime (float), AdcGroupConversionMode (enum).
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "param_name"
            data_type: "string"
            required: true
            unique: true
            description: "Configuration parameter name (e.g. AdcDeInitApi)"
          - name: "param_type"
            data_type: "string"
            required: false
            description: "ECUC parameter type definition"
            validation_rules:
              allowed_values:
                - "EcucBooleanParamDef"
                - "EcucEnumerationParamDef"
                - "EcucIntegerParamDef"
                - "EcucFloatParamDef"
                - "EcucStringParamDef"
                - "EcucReferenceDef"
                - "EcucFunctionNameDef"
                - "EcucLinkerSymbolDef"
          - name: "description"
            data_type: "text"
            required: false
            description: "Description of the parameter and its effect"
          - name: "range_min"
            data_type: "string"
            required: false
            description: "Minimum value or enumeration list"
          - name: "range_max"
            data_type: "string"
            required: false
            description: "Maximum value"
          - name: "range_values"
            data_type: "text"
            required: false
            description: "Enumeration values or valid range description"
          - name: "default_value"
            data_type: "string"
            required: false
            description: "Default value (e.g. TRUE, FALSE, 0, enum literal)"
          - name: "multiplicity_min"
            data_type: "integer"
            required: false
            description: "Lower multiplicity"
          - name: "multiplicity_max"
            data_type: "integer"
            required: false
            description: "Upper multiplicity"
          - name: "multiplicity"
            data_type: "string"
            required: false
            description: >
              Raw multiplicity string from the specification table
              (e.g. '0..8', '1', '0..1').  Stored alongside the parsed
              multiplicity_min / multiplicity_max integer fields.
          - name: "post_build_variant_value"
            data_type: "boolean"
            required: false
            description: "Whether the value can vary across post-build variants"
          - name: "value_config_class"
            data_type: "string"
            required: false
            description: "Configuration class (Pre-Compile / Post-Build / Link)"
          - name: "origin"
            data_type: "string"
            required: false
            description: "Origin (AUTOSAR_ECUC, Infineon)"
          - name: "scope"
            data_type: "string"
            required: false
            description: "Scope (LOCAL, ECU)"
          - name: "dependencies"
            data_type: "list[string]"
            required: false
            description: "Dependencies on other parameters or containers"
          - name: "design_decisions"
            data_type: "text"
            required: false
            description: "Inline design decisions from specification table"
          - name: "parent_container"
            data_type: "string"
            required: false
            description: "Name of the parent SWA_ConfigContainer"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWA document section number (e.g. 3.1.7.1.5.3)"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement IDs from [req parentID=...] tags"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # =====================================================================
      #  SWA Section 3.1.9 — File Structure
      # =====================================================================
      # Source files (C sources, headers, generated files, plugin files)
      # from SWA section 3.1.9.  Each file carries a description,
      # traceability to PRQ requirements, and classification.
      # =====================================================================

      - name: "SWA_SourceFile"
        jama_item_type: null
        description: >
          Source file specification from SWA section 3.1.9
          (File Structure).  Each entry describes a C source file,
          header file, or code generator plugin file that belongs to
          the module — with its description, classification (static,
          generated, plugin), and PRQ traceability.
          Examples: Adc.h (static header), Adc.c (static source),
          Adc_Cfg.h (generated), Adc_PBcfg.c (generated post-build),
          Adc.m (plugin macro), Adc.xdm (plugin schema).
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "file_name"
            data_type: "string"
            required: true
            unique: true
            description: "File name (e.g. Adc.h, Adc_PBcfg.c)"
          - name: "file_category"
            data_type: "string"
            required: false
            description: "Classification of the file"
            validation_rules:
              allowed_values:
                - "header_static"     # Static header (e.g. Adc.h)
                - "header_generated"  # Generated header (e.g. Adc_Cfg.h)
                - "source_static"     # Static source (e.g. Adc.c)
                - "source_generated"  # Generated source (e.g. Adc_Data.c)
                - "plugin"            # Code generator plugin (e.g. Adc.m)
                - "sfr_header"        # SFR register header (e.g. IfxAdc_bf.h)
                - "external_header"   # External dependency header (e.g. Dem.h)
          - name: "description"
            data_type: "text"
            required: false
            description: "Description of the file's purpose and contents"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWA document section number (e.g. 3.1.9.1)"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement IDs from [req parentID=...] tags"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # =====================================================================
      #  SWA Section 3.2 — Call Sequence Diagrams
      # =====================================================================
      # Call sequence (sequence diagram) descriptions from SWA section 3.2.
      # Each entry documents the interaction flow between software
      # components (Application, Adc, DMA, CDSP, etc.) for a specific
      # operational scenario — initialization, conversion modes, result
      # handling, diagnostics, and error paths.  The diagrams show the
      # ordered sequence of API calls, callbacks, and internal operations
      # that occur during each scenario.
      #
      # Source: SWA PDF section 3.2, LLM-extracted Markdown
      # =====================================================================

      - name: "SWA_CallSequence"
        jama_item_type: null
        description: >
          Call sequence diagram from SWA section 3.2.  Each entry
          documents the step-by-step interaction flow between software
          components for a specific operational scenario such as
          initialization, de-initialization, SW/HW triggered conversions,
          DMA result handling modes, CDSP post-processing, and
          broken-wire detection.  Captures the ordered sequence of API
          calls, callbacks, notifications, and internal operations that
          occur during the scenario.
          Examples: "Initialization", "SW triggered one-shot conversion",
          "HW triggered conversion linear streaming",
          "DMA result handling for single access HW triggered conversion",
          "Post-processing using CDSP", "Broken-wire detection".
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "sequence_name"
            data_type: "string"
            required: true
            unique: true
            description: >
              Name of the call sequence scenario
              (e.g. "Initialization", "SW triggered one-shot conversion")
          - name: "scenario_category"
            data_type: "string"
            required: false
            description: "High-level category of the call sequence"
            validation_rules:
              allowed_values:
                - "initialization"          # Init / DeInit flows
                - "sw_triggered_conversion" # Software-triggered conversions
                - "hw_triggered_conversion" # Hardware-triggered conversions
                - "dma_result_handling"     # DMA-based result transfer flows
                - "post_processing"         # CDSP post-processing flows
                - "diagnostics"            # Diagnostic / broken-wire flows
                - "error_handling"         # Error and recovery flows
          - name: "description"
            data_type: "text"
            required: false
            description: >
              Full textual description of the call sequence scenario,
              including the sequence of steps, participating components,
              and the flow of control between them
          - name: "actors"
            data_type: "list[string]"
            required: false
            description: >
              Software components / modules participating in the
              sequence (e.g. Application, Adc, Dma, Cdsp, SchM, Det)
          - name: "steps"
            data_type: "text"
            required: false
            description: >
              Ordered sequence of interaction steps extracted from
              the call sequence diagram, preserving caller → callee
              direction and any return values or conditions
          - name: "preconditions"
            data_type: "text"
            required: false
            description: >
              Preconditions or assumptions before the call sequence
              begins (e.g. "ADC module is initialized", "Group is idle")
          - name: "postconditions"
            data_type: "text"
            required: false
            description: >
              Postconditions or resulting state after the call sequence
              completes (e.g. "Group status = ADC_IDLE")
          - name: "related_functions"
            data_type: "list[string]"
            required: false
            description: >
              Names of SWA_Function nodes referenced in this call
              sequence (e.g. Adc_Init, Adc_StartGroupConversion,
              Adc_ReadGroup)
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWA document section number (e.g. 3.2.1, 3.2.8)"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement IDs from [req parentID=...] tags"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # =====================================================================
      #  SWA Section 3.1.10 — Memory Sections
      # =====================================================================
      # Memory section allocations from SWA section 3.1.10.  Each entry
      # maps a memory section name to its purpose and requirement tracing.
      # Note: This section often appears at the boundary of section 3.2
      # in the PDF and may bleed into the dynamic view raw extraction.
      # =====================================================================

      - name: "SWA_MemorySection"
        jama_item_type: null
        description: >
          Memory section allocation from SWA section 3.1.10.  Each entry
          defines a named memory section (e.g. ADC_SEC_CODE_ASIL_D) used
          by the module for code, data, or configuration placement, along
          with traceability to PRQ requirements.
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "section_name"
            data_type: "string"
            required: true
            unique: true
            description: "Memory section name (e.g. ADC_SEC_CODE_ASIL_D)"
          - name: "description"
            data_type: "text"
            required: false
            description: "Purpose / usage description of the memory section"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWA document section number (e.g. 3.1.10)"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement IDs from [req parentID=...] tags"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # =====================================================================
      #  SWA Section 3.3 — Safety View
      # =====================================================================
      # Safety measures and Assumptions of Use (AoU) from SWA section 3.3.
      # Section 3.3.1 contains safety measures categorised as:
      #   3.3.1.1 — against SW faults
      #   3.3.1.2 — against HW faults
      #   3.3.1.3 — review-based
      # Section 3.3.2 contains Assumptions of Use (AoU).
      # Each entry carries a feature GUID, stereotype (design_decision),
      # rationale, and traceability to PRQ requirements.
      # =====================================================================

      - name: "SWA_SafetyMeasure"
        jama_item_type: null
        description: >
          Safety measure from SWA section 3.3.1.  Each entry documents
          a specific safety mechanism implemented by the module to
          mitigate faults — covering error detection, error reporting
          (DET/DEM/safety errors), and recovery actions.  Categorised
          as SW fault mitigation (3.3.1.1), HW fault mitigation (3.3.1.2),
          or review-based measures (3.3.1.3).
          Examples: "ADC: No nominal functionality in error scenario",
          "ADC: CLC module enable check",
          "ADC: Interrupt handler plausibility check".
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "decision_id"
            data_type: "string"
            required: true
            unique: true
            description: "Feature GUID from the [req featureID=...] tag"
          - name: "title"
            data_type: "string"
            required: true
            description: "Short title of the safety measure"
          - name: "stereotype"
            data_type: "string"
            required: false
            description: "UML stereotype (typically design_decision)"
            validation_rules:
              allowed_values:
                - "design_decision"
                - "information"
          - name: "description"
            data_type: "text"
            required: false
            description: "Full description of the safety measure"
          - name: "rationale"
            data_type: "text"
            required: false
            description: "Rationale justifying the safety measure"
          - name: "measure_category"
            data_type: "string"
            required: true
            description: "Category of safety measure"
            validation_rules:
              allowed_values:
                - "sw_fault"        # 3.3.1.1 — against software faults
                - "hw_fault"        # 3.3.1.2 — against hardware faults
                - "review_based"    # 3.3.1.3 — review-based measures
          - name: "error_codes"
            data_type: "list[string]"
            required: false
            description: >
              Error codes reported by this measure
              (e.g. ADC_E_BUSY, ADC_E_INVALID_ISR)
          - name: "error_type"
            data_type: "string"
            required: false
            description: "Type of error: development, runtime, production, safety"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWA document section number (e.g. 3.3.1.1.5)"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement IDs from [req parentID=...] tags"
          - name: "feature_id_references"
            data_type: "list[string]"
            required: false
            description: "Feature GUID references from parentID (non-PRQ GUIDs)"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      - name: "SWA_SafetyAoU"
        jama_item_type: null
        description: >
          Assumption of Use from SWA section 3.3.2.  Each entry
          documents a safety-related constraint or obligation that
          the integrator / user of the module MUST observe for correct
          and safe operation.  Typically carries a design_decision
          stereotype with rationale and PRQ traceability.
          Examples: "ADC: Adequate sampling time for software-triggered
          continuous AdcGroups",
          "ADC: Clearing of ICCM and DCCM".
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "decision_id"
            data_type: "string"
            required: true
            unique: true
            description: "Feature GUID from the [req featureID=...] tag"
          - name: "title"
            data_type: "string"
            required: true
            description: "Short title of the assumption of use"
          - name: "stereotype"
            data_type: "string"
            required: false
            description: "UML stereotype (typically design_decision)"
          - name: "description"
            data_type: "text"
            required: false
            description: "Full description of the assumption / obligation"
          - name: "rationale"
            data_type: "text"
            required: false
            description: "Rationale explaining why this assumption must hold"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWA document section number (e.g. 3.3.2.1)"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement IDs from [req parentID=...] tags"
          - name: "feature_id_references"
            data_type: "list[string]"
            required: false
            description: "Feature GUID references from parentID (non-PRQ GUIDs)"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # =====================================================================
      #  SWA Section 3.4 — Trusted View
      # =====================================================================
      # Security / trust analysis from SWA section 3.4.  The trusted view
      # identifies untrusted attack surfaces (users of the IP, dependent
      # peripherals, external signals, application buffers), their
      # exploitation mechanisms, and potential impact.
      # Section 3.4.1 contains security measures (may be empty).
      # Section 3.4.2 contains security AoU (may be empty).
      # =====================================================================

      - name: "SWA_ThreatAnalysis"
        jama_item_type: null
        description: >
          Threat analysis entry from SWA section 3.4 (Trusted View).
          Each entry identifies an untrusted attack surface, the
          resource that could be exploited, the exploitation mechanism,
          and the potential impact on the module.  Derived from the
          trusted-view block diagram and accompanying text.
          Examples: "Global configuration tampering via Users of ADC IP",
          "DMA channel config via Dependent peripherals",
          "HW trigger event tampering via External signal".
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "threat_name"
            data_type: "string"
            required: true
            unique: true
            description: >
              Name of the threatened resource
              (e.g. "Global configuration", "DMA channel config")
          - name: "trust_category"
            data_type: "string"
            required: true
            description: "Untrusted domain category"
            validation_rules:
              allowed_values:
                - "users_of_ip"            # Users of the ADC IP
                - "dependent_peripherals"  # Dependent peripheral configs
                - "external_signal"        # External analog/trigger signals
                - "application_buffer"     # Application result buffers
          - name: "exploitation_mechanism"
            data_type: "text"
            required: false
            description: "How the attack surface could be exploited"
          - name: "potential_impact"
            data_type: "text"
            required: false
            description: >
              Potential impact if the threat materialises
              (e.g. undefined behavior, data corruption, data loss)
          - name: "description"
            data_type: "text"
            required: false
            description: "Full description of the threat entry"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWA document section number (e.g. 3.4)"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      - name: "SWA_SecurityMeasure"
        jama_item_type: null
        description: >
          Security measure from SWA section 3.4.1.  Each entry
          documents a cybersecurity mechanism implemented by the module.
          Categorised as: against SW faults (3.4.1.1), against HW faults
          (3.4.1.2), or review-based (3.4.1.3).  May be empty for
          modules with no identified security measures.
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "decision_id"
            data_type: "string"
            required: true
            unique: true
            description: "Feature GUID from the [req featureID=...] tag"
          - name: "title"
            data_type: "string"
            required: true
            description: "Short title of the security measure"
          - name: "measure_category"
            data_type: "string"
            required: true
            description: "Category of security measure"
            validation_rules:
              allowed_values:
                - "sw_fault"
                - "hw_fault"
                - "review_based"
          - name: "description"
            data_type: "text"
            required: false
            description: "Full description of the security measure"
          - name: "rationale"
            data_type: "text"
            required: false
            description: "Rationale justifying the security measure"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement IDs from [req parentID=...] tags"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWA document section number (e.g. 3.4.1.1)"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      - name: "SWA_SecurityAoU"
        jama_item_type: null
        description: >
          Security Assumption of Use from SWA section 3.4.2.  Each entry
          documents a cybersecurity-related constraint or obligation the
          integrator must observe.  May be empty for modules with no
          identified security AoUs.
        extraction_strategy: "swa_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "decision_id"
            data_type: "string"
            required: true
            unique: true
            description: "Feature GUID from the [req featureID=...] tag"
          - name: "title"
            data_type: "string"
            required: true
            description: "Short title of the security AoU"
          - name: "description"
            data_type: "text"
            required: false
            description: "Full description of the security assumption"
          - name: "rationale"
            data_type: "text"
            required: false
            description: "Rationale for the security assumption"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement IDs from [req parentID=...] tags"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWA document section number (e.g. 3.4.2)"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWA document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # =====================================================================
      #  SWUD (Software Design Specification) — Detailed Design Node Types
      # =====================================================================
      # Extracted from SWUD PDF/DOCX documents (e.g. TC4xx_SW_MCAL_SWUD_Adc).
      # The SWUD is the detailed design document in the ASPICE V-model,
      # generated from Enterprise Architect.  It captures implementation-level
      # design: design decisions, derived config parameters, configuration
      # structure variables, code-generation macros, internal type definitions,
      # API / local / callback / interrupt functions with activity-diagram
      # algorithms, runtime data variables, critical sections, and memory
      # section allocations.
      #
      # Each element carries traceability to PRQ requirements via
      # [req parentID=...] tags embedded in the source document, as well as
      # featureID GUIDs from Enterprise Architect.
      #
      # Prefix: SWUD_  (to distinguish from SWA_ architectural nodes)
      # Source: SWUD PDF → LLM-based Markdown → structured extraction
      # =====================================================================

      # -- SWUD_DesignDecision  —  Section 2: Design Decisions ---------------
      - name: "SWUD_DesignDecision"
        jama_item_type: null
        description: >
          Design decision documented in the SWUD (section 2).  Each decision
          captures a specific implementation-level design choice with its
          rationale, sequence of operations, and traceability to PRQ
          requirements.  These are distinct from SWA_ArchitecturalDecision
          nodes which capture architecture-level decisions.
        extraction_strategy: "swud_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "decision_id"
            data_type: "string"
            required: true
            unique: true
            description: "Feature ID GUID from Enterprise Architect"
          - name: "title"
            data_type: "string"
            required: true
            description: "Decision title (e.g. 'ADC: Sequence for starting/stopping…')"
          - name: "description"
            data_type: "text"
            required: false
            description: "Full description of the design decision"
          - name: "rationale"
            data_type: "text"
            required: false
            description: "Rationale / justification for the decision"
          - name: "decision_type"
            data_type: "string"
            required: false
            description: "Type: 'design_decision' or 'design_information'"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWUD section number (e.g. '2.1')"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "List of PRQ requirement IDs traced via [req parentID=...] tags"
          - name: "feature_id_references"
            data_type: "list[string]"
            required: false
            description: "List of featureID GUIDs from EA traceability tags"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWUD document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- SWUD_DerivedConfigParam  —  Section 3.2.1: Derived Config Params --
      - name: "SWUD_DerivedConfigParam"
        jama_item_type: null
        description: >
          Derived configuration parameter (preprocessor macro) generated by
          the code-generation tool.  Documented in SWUD section 3.2.1.
          Each parameter has a name, type (#define), file, description,
          value range, generation algorithm, and dependencies on ECUC
          configuration containers/parameters.
        extraction_strategy: "swud_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "param_name"
            data_type: "string"
            required: true
            unique: true
            description: "Macro name (e.g. 'ADC_VENDOR_ID', 'ADC_DEINIT_API')"
          - name: "param_type"
            data_type: "string"
            required: false
            description: "Type (typically '#define')"
          - name: "file"
            data_type: "string"
            required: false
            description: "Header file where the macro is generated (e.g. 'Adc_Cfg.h')"
          - name: "description"
            data_type: "text"
            required: false
            description: "Description of the parameter"
          - name: "range"
            data_type: "text"
            required: false
            description: "Value range or allowed values"
          - name: "algorithm"
            data_type: "text"
            required: false
            description: "Generation algorithm / logic"
          - name: "design_decisions"
            data_type: "text"
            required: false
            description: "Inline design decisions"
          - name: "dependencies"
            data_type: "list[string]"
            required: false
            description: "ECUC parameter/container dependencies"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWUD section number (e.g. '3.2.1.1')"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement references from [req parentID=...] tags"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWUD document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- SWUD_ConfigStructure  —  Section 3.2.2: Config Structure Vars -----
      - name: "SWUD_ConfigStructure"
        jama_item_type: null
        description: >
          Configuration structure variable documented in SWUD section 3.2.2.
          Each structure has a name pattern (often parameterised with
          <PartitionName>, <HwUnitId>, etc.), a C type, file location,
          memory section, generation algorithm (with activity diagrams),
          and dependencies on ECUC configuration.
        extraction_strategy: "swud_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "structure_name"
            data_type: "string"
            required: true
            unique: true
            description: "Structure variable name or name pattern"
          - name: "c_type"
            data_type: "string"
            required: false
            description: "C type (e.g. 'static const Adc_PartitionConfigType')"
          - name: "file"
            data_type: "string"
            required: false
            description: "Source file (e.g. 'Adc_PBcfg.c')"
          - name: "description"
            data_type: "text"
            required: false
            description: "Description of the structure variable"
          - name: "memory_section"
            data_type: "string"
            required: false
            description: "Memory section for allocation"
          - name: "algorithm"
            data_type: "text"
            required: false
            description: "Generation algorithm (activity diagram reference)"
          - name: "design_decisions"
            data_type: "text"
            required: false
            description: "Inline design decisions"
          - name: "dependencies"
            data_type: "list[string]"
            required: false
            description: "ECUC parameter/container dependencies"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWUD section number (e.g. '3.2.2.1')"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement references"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWUD document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- SWUD_CodeGenMacro  —  Section 3.2.3: Code Gen Macros -------------
      - name: "SWUD_CodeGenMacro"
        jama_item_type: null
        description: >
          Code generation macro documented in SWUD section 3.2.3.  These
          are x-path macros executed by the code generation tool (e.g. in
          .m template files) to produce derived configuration code.  Each
          macro has input/output parameters, an algorithm (with activity
          diagrams), and dependencies.
        extraction_strategy: "swud_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "macro_name"
            data_type: "string"
            required: true
            unique: true
            description: "Macro name (e.g. 'ADC_CGM_MemmapAlignment')"
          - name: "macro_type"
            data_type: "string"
            required: false
            description: "Type (e.g. 'Code generation x-path macro')"
          - name: "file"
            data_type: "string"
            required: false
            description: "Template file (e.g. 'Adc.m')"
          - name: "parameters_in"
            data_type: "list[object]"
            required: false
            description: "Input parameters with names and descriptions"
          - name: "parameters_out"
            data_type: "list[object]"
            required: false
            description: "Output parameters with names and descriptions"
          - name: "description"
            data_type: "text"
            required: false
            description: "Description of the macro"
          - name: "algorithm"
            data_type: "text"
            required: false
            description: "Algorithm / activity diagram reference"
          - name: "design_decisions"
            data_type: "text"
            required: false
            description: "Inline design decisions"
          - name: "dependencies"
            data_type: "list[string]"
            required: false
            description: "Configuration dependencies"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWUD section number (e.g. '3.2.3.1')"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement references"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWUD document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- SWUD_TypeDefinition  —  Section 4.2: Type Definitions -------------
      - name: "SWUD_TypeDefinition"
        jama_item_type: null
        description: >
          Internal type definition documented in SWUD section 4.2.
          These are the C struct/enum/typedef definitions used internally
          by the module.  Each type has a name, members/fields with their
          ranges and descriptions, the file where it's defined, and
          design decisions.  Distinct from SWA_DataType which captures
          the architectural (public API) types.
        extraction_strategy: "swud_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "type_name"
            data_type: "string"
            required: true
            unique: true
            description: "Type name (e.g. 'Adc_GrpInfoType', 'Adc_TransitionType')"
          - name: "type_category"
            data_type: "string"
            required: false
            description: "Category: 'structure', 'enumeration', 'typedef', 'function_pointer'"
          - name: "file"
            data_type: "string"
            required: false
            description: "Header file where the type is defined"
          - name: "members"
            data_type: "list[object]"
            required: false
            description: "List of struct members / enum values with name, type, range, description"
          - name: "description"
            data_type: "text"
            required: false
            description: "Description of the type"
          - name: "design_decisions"
            data_type: "text"
            required: false
            description: "Inline design decisions"
          - name: "source"
            data_type: "string"
            required: false
            description: "Origin: 'IFX' or 'AUTOSAR'"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWUD section number (e.g. '4.2.1')"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement references"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWUD document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- SWUD_Function  —  Sections 4.3-4.7: All Function Specifications --
      - name: "SWUD_Function"
        jama_item_type: null
        description: >
          Function specification in the SWUD covering API functions (4.3),
          notifications/callbacks (4.4), scheduled functions (4.5),
          interrupt handlers (4.6), and local/internal functions (4.7).
          Each function has a full AUTOSAR-style specification table
          (syntax, service ID, ASIL, sync/async, reentrancy, parameters,
          return type, error handling, algorithm with activity diagrams,
          memory section, HSI constituents).  The function_category
          distinguishes the function type.
        extraction_strategy: "swud_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "function_name"
            data_type: "string"
            required: true
            unique: true
            description: "Function name (e.g. 'Adc_Init', 'Adc_lGetPartitionIndex')"
          - name: "function_category"
            data_type: "string"
            required: true
            description: >
              Category: 'api' (4.3), 'callback' (4.4), 'scheduled' (4.5),
              'interrupt_handler' (4.6), 'local' (4.7)
          - name: "syntax"
            data_type: "text"
            required: false
            description: "Full function signature / prototype"
          - name: "return_type"
            data_type: "string"
            required: false
            description: "Return type (e.g. 'void', 'Std_ReturnType')"
          - name: "parameters_in"
            data_type: "list[object]"
            required: false
            description: "Input parameters with name, type, and description"
          - name: "parameters_out"
            data_type: "list[object]"
            required: false
            description: "Output parameters with name, type, and description"
          - name: "parameters_inout"
            data_type: "list[object]"
            required: false
            description: "In-out parameters with name, type, and description"
          - name: "service_id"
            data_type: "string"
            required: false
            description: "AUTOSAR Service ID (e.g. '0x00')"
          - name: "asil_level"
            data_type: "string"
            required: false
            description: "ASIL level: 'QM', 'A', 'B', 'C', 'D'"
          - name: "sync_async"
            data_type: "string"
            required: false
            description: "'Synchronous' or 'Asynchronous'"
          - name: "function_type"
            data_type: "string"
            required: false
            description: "'Standard' or 'Non-Standard'"
          - name: "reentrancy"
            data_type: "string"
            required: false
            description: "Reentrancy info (e.g. 'Reentrant', 'Non Reentrant', 'Conditionally Reentrant')"
          - name: "description"
            data_type: "text"
            required: false
            description: "Functional description"
          - name: "algorithm"
            data_type: "text"
            required: false
            description: "Algorithm description with [req] tags and activity diagram references"
          - name: "error_handling"
            data_type: "text"
            required: false
            description: "Error codes reported (DET, runtime, safety, DEM)"
          - name: "configuration_dependencies"
            data_type: "list[string]"
            required: false
            description: "Configuration parameters that gate this function"
          - name: "file"
            data_type: "string"
            required: false
            description: "Source file(s) (e.g. 'Adc.c, Adc.h')"
          - name: "memory_section"
            data_type: "string"
            required: false
            description: "Memory section (e.g. 'ADC_SEC_CODE_ASIL_D')"
          - name: "design_decisions"
            data_type: "text"
            required: false
            description: "Inline design decisions"
          - name: "feature_id"
            data_type: "string"
            required: false
            description: >
              Feature identifier (GUID) extracted from [feature]...[/feature]
              tags in the SWUD document.  Links this function to an external
              feature tracking system.
          - name: "source"
            data_type: "string"
            required: false
            description: "Origin: 'AUTOSAR' or 'IFX'"
          - name: "hsi_constituents"
            data_type: "text"
            required: false
            description: "HSI (Hardware-Software Interface) specification — SFRs, events, shared memory"
          - name: "comments"
            data_type: "text"
            required: false
            description: "Additional comments"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWUD section number (e.g. '4.3.1')"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement references from [req parentID=...] tags"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWUD document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- SWUD_DataVariable  —  Section 5: Data Description ----------------
      - name: "SWUD_DataVariable"
        jama_item_type: null
        description: >
          Runtime data variable documented in SWUD section 5.  These are
          the module's global/static RAM and ROM variables: TCS data arrays,
          group data, HW unit data, partition data, config pointers,
          active resource maps, and DMA channel maps.  Each variable has
          a name pattern, C type, dimensions, scope (partition-specific
          or global), memory section, and purpose.
        extraction_strategy: "swud_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "variable_name"
            data_type: "string"
            required: true
            unique: true
            description: "Variable name or name pattern"
          - name: "c_type"
            data_type: "string"
            required: false
            description: "C type (e.g. 'Adc_GrpDataType', 'const Adc_DmaChIdMapType')"
          - name: "scope"
            data_type: "string"
            required: false
            description: "Scope: 'partition', 'global', 'per_hw_unit', 'per_group'"
          - name: "memory_category"
            data_type: "string"
            required: false
            description: "Category: 'ram', 'rom', 'const'"
          - name: "dimensions"
            data_type: "text"
            required: false
            description: "Array dimensions / size description"
          - name: "description"
            data_type: "text"
            required: false
            description: "Purpose and content description"
          - name: "memory_section"
            data_type: "string"
            required: false
            description: "Memory section for allocation"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWUD section number (e.g. '5.1')"
          - name: "prq_references"
            data_type: "list[string]"
            required: false
            description: "PRQ requirement references"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWUD document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- SWUD_CriticalSection  —  Section 6: Critical Section Info ---------
      - name: "SWUD_CriticalSection"
        jama_item_type: null
        description: >
          Critical section information documented in SWUD section 6.
          Each critical section specifies the SchM (Scheduler Manager)
          Enter/Exit functions, the shared resources protected, which
          functions use the critical section, and the protection scope
          (partition-level or global).
        extraction_strategy: "swud_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "critical_section_name"
            data_type: "string"
            required: true
            unique: true
            description: "Critical section name (e.g. 'MutualData<PartitionName>', 'RuntimeProtWriteSeq')"
          - name: "enter_function"
            data_type: "string"
            required: false
            description: "SchM Enter function name"
          - name: "exit_function"
            data_type: "string"
            required: false
            description: "SchM Exit function name"
          - name: "protected_resources"
            data_type: "text"
            required: false
            description: "List of shared resources / variables protected"
          - name: "using_functions"
            data_type: "list[string]"
            required: false
            description: "Functions that use this critical section"
          - name: "protection_scope"
            data_type: "string"
            required: false
            description: "Scope: 'partition' or 'global'"
          - name: "description"
            data_type: "text"
            required: false
            description: "Description of the critical section purpose"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWUD section number (e.g. '6.1')"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWUD document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- SWUD_MemorySection  —  Section 7: Memory Sections -----------------
      - name: "SWUD_MemorySection"
        jama_item_type: null
        description: >
          Memory section allocation documented in SWUD section 7.
          Each entry maps a memory section name to an AUTOSAR MemMap
          category, ASIL classification, content description, and
          typical mapping (RAM, ROM, Flash, etc.).
        extraction_strategy: "swud_pdf_ingestion"
        source_formats: ["pdf", "docx", "md"]
        properties:
          - name: "section_name"
            data_type: "string"
            required: true
            unique: true
            description: "Memory section name (e.g. 'ADC_SEC_CODE_ASIL_D')"
          - name: "memmap_category"
            data_type: "string"
            required: false
            description: "MemMap category (e.g. 'CODE', 'VAR', 'CONST', 'CONFIG_DATA')"
          - name: "asil_level"
            data_type: "string"
            required: false
            description: "ASIL level: 'QM', 'A', 'B', 'C', 'D'"
          - name: "content_description"
            data_type: "text"
            required: false
            description: "What is allocated in this section"
          - name: "typical_mapping"
            data_type: "string"
            required: false
            description: "Target memory (e.g. 'Flash', 'RAM', 'DSPR')"
          - name: "section_number"
            data_type: "string"
            required: false
            description: "SWUD section number (e.g. '7')"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source SWUD document filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # ================================================================
      # TEST SPECIFICATION  (V-Model right side – Verification)
      # ================================================================
      # Source : Excel test spec workbook  (TC4xx_SW_MCAL_TS_<Module>.xlsx)
      # Sheets : "Test cases", "Configuration tests",
      #          "Static source code IF tests", "WCET analysis"
      # ================================================================

      # -- TS_FunctionalTestCase  —  Sheet "Test cases" ---------------------
      - name: "TS_FunctionalTestCase"
        jama_item_type: null
        description: >
          A functional / behavioural test case from the main "Test cases"
          sheet of the MCAL test specification.  Each row verifies one or
          more product requirements (PRQ) and/or SWA elements through a
          concrete test procedure that exercises the driver API on HW.
          Test categories include Unit, Integration, and Software-level
          tests as defined by ASPICE SWE.4 / SWE.5 / SWE.6.
        extraction_strategy: "testspec_excel_ingestion"
        source_formats: ["xlsx"]
        properties:
          - name: "test_case_id"
            data_type: "string"
            required: true
            unique: true
            description: "Unique test ID (e.g. 'Adc_Tc_Fn_001')"
          - name: "test_category"
            data_type: "list"
            required: true
            description: >
              Test level(s): subset of ['UnitTest', 'IntegrationTest',
              'SoftwareTest'].  A test may apply to more than one level.
          - name: "test_design_techniques"
            data_type: "text"
            required: false
            description: >
              Comma-separated test design techniques used (e.g.
              'Analysis of the requirements, Analysis of boundary values').
          - name: "test_objective"
            data_type: "text"
            required: true
            description: >
              What the test verifies – the functional behaviour under test.
              Maps to column 'Test functionality / Objective'.
          - name: "configuration_plan"
            data_type: "text"
            required: false
            description: >
              Description of the ADC / module configuration set(s) used by
              the test (groups, channels, DMA settings, DET flags, etc.).
              Maps to column 'Configuration Plan'.
          - name: "test_procedure"
            data_type: "text"
            required: true
            description: >
              Step-by-step procedure (P01, P02, …) describing API calls,
              waits, and verifications to execute on target HW.
          - name: "expected_results"
            data_type: "text"
            required: true
            description: >
              Expected behaviour / pass criteria (E01, E02, …) for each
              procedure step.
          - name: "automation_method"
            data_type: "string"
            required: false
            description: "'Manual' or 'Automation'"
            validation_rules:
              allowed_values: ["Manual", "Automation"]
          - name: "traceability_tags"
            data_type: "text"
            required: false
            description: >
              Raw traceability markup containing [req featureID=…
              parentID=…][/req] tags linking to PRQ / SWA IDs.
          - name: "prq_references"
            data_type: "list"
            required: false
            description: >
              Extracted AU3GM-PRQ-* identifiers from the traceability
              column.  Used to create VERIFIES edges to ProductRequirement.
          - name: "swa_references"
            data_type: "list"
            required: false
            description: >
              Extracted SWA feature IDs / GUIDs from the traceability
              column.  Used to create VALIDATES_SWA edges.
          - name: "status"
            data_type: "string"
            required: false
            description: "Test case status (e.g. 'Released', 'Draft')"
          - name: "comments"
            data_type: "text"
            required: false
            description: "Free-form reviewer / author comments"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source Excel filename (e.g. 'TC4xx_SW_MCAL_TS_Adc.xlsx')"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- TS_ConfigTestCase  —  Sheet "Configuration tests" -----------------
      - name: "TS_ConfigTestCase"
        jama_item_type: null
        description: >
          A configuration-validation test case from the "Configuration
          tests" sheet.  These verify that the AUTOSAR ECUC configuration
          tool (Tresos) correctly validates parameter ranges, multiplicity,
          default values, dependencies, and post-build variability for
          each configuration container / parameter in the module.
        extraction_strategy: "testspec_excel_ingestion"
        source_formats: ["xlsx"]
        properties:
          - name: "test_case_id"
            data_type: "string"
            required: true
            unique: true
            description: "Unique test ID (e.g. 'Adc_Tc_Conf_001')"
          - name: "test_category"
            data_type: "list"
            required: true
            description: >
              Test level(s): subset of ['UnitTest', 'IntegrationTest'].
          - name: "config_path"
            data_type: "string"
            required: true
            description: >
              AUTOSAR ECUC configuration path under test (e.g.
              '/Adc/AdcConfigSet/AdcHwUnit/AdcChannel/AdcChannelId').
          - name: "element_type"
            data_type: "string"
            required: false
            description: >
              ECUC element type (e.g. 'EcucIntegerParamDef',
              'EcucEnumerationParamDef', 'EcucParamConfContainerDef',
              'EcucBooleanParamDef', 'EcucReferenceDef').
          - name: "multiplicity_min"
            data_type: "string"
            required: false
            description: "Minimum multiplicity of the element"
          - name: "multiplicity_max"
            data_type: "string"
            required: false
            description: "Maximum multiplicity of the element"
          - name: "value_range"
            data_type: "text"
            required: false
            description: >
              Combined value range information: min, max, default, enum
              literals, reference target.
          - name: "is_editable"
            data_type: "string"
            required: false
            description: "Whether user can edit ('YES' / 'NO')"
          - name: "parameter_dependency"
            data_type: "text"
            required: false
            description: >
              Other config parameters this element depends on (e.g.
              'AdcEnableDiagnostics').
          - name: "test_procedure"
            data_type: "text"
            required: true
            description: >
              Step-by-step procedure using config-tool commands (SETVAL,
              CHKDEFVAL, ADD, DEL, CHKRANGE, etc.).
          - name: "expected_results"
            data_type: "text"
            required: true
            description: >
              Expected tool responses: NO_ERROR, ERROR with message,
              WARNING with message for each procedure step.
          - name: "automation_method"
            data_type: "string"
            required: false
            description: "'Manual' or 'Automation'"
            validation_rules:
              allowed_values: ["Manual", "Automation"]
          - name: "traceability_tags"
            data_type: "text"
            required: false
            description: >
              Raw traceability markup with [req featureID=… parentID=…]
              tags linking to PRQ and SWA configuration element IDs.
          - name: "prq_references"
            data_type: "list"
            required: false
            description: >
              Extracted AU3GM-PRQ-* identifiers from traceability column.
          - name: "swa_references"
            data_type: "list"
            required: false
            description: >
              Extracted SWA feature IDs / GUIDs from traceability column.
          - name: "status"
            data_type: "string"
            required: false
            description: "Test case status (e.g. 'Released', 'Draft')"
          - name: "comments"
            data_type: "text"
            required: false
            description: "Free-form reviewer / author comments"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source Excel filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- TS_StaticInterfaceTestCase  —  Sheet "Static source code IF tests"
      - name: "TS_StaticInterfaceTestCase"
        jama_item_type: null
        description: >
          A static-analysis test case from the "Static source code IF
          tests" sheet.  These verify that the compiled driver code matches
          the architectural specification: type definitions, file
          inclusions, error codes, function prototypes, property files,
          BSWMD templates, and const-correctness of pointer arguments.
          Typically automated via code-analysis tools.
        extraction_strategy: "testspec_excel_ingestion"
        source_formats: ["xlsx"]
        properties:
          - name: "test_case_id"
            data_type: "string"
            required: true
            unique: true
            description: "Unique test ID (e.g. 'Adc_Tc_SI_001')"
          - name: "test_category"
            data_type: "list"
            required: true
            description: >
              Test level(s): subset of ['UnitTest', 'IntegrationTest'].
          - name: "test_objective"
            data_type: "text"
            required: true
            description: >
              What the static analysis verifies (type defs, prototypes,
              error codes, file inclusions, property files, BSWMD, etc.).
          - name: "test_procedure"
            data_type: "text"
            required: true
            description: >
              Procedure – typically: run code-analysis tool, extract
              elements from architecture, compare against driver code.
          - name: "expected_results"
            data_type: "text"
            required: true
            description: >
              Expected outcome – typically: no difference between
              architecture specification and compiled code.
          - name: "automation_method"
            data_type: "string"
            required: false
            description: "'Manual' or 'Automation'"
            validation_rules:
              allowed_values: ["Manual", "Automation"]
          - name: "traceability_tags"
            data_type: "text"
            required: false
            description: >
              Raw traceability markup with [req featureID=… parentID=…]
              tags for PRQ and SWA IDs.
          - name: "prq_references"
            data_type: "list"
            required: false
            description: "Extracted AU3GM-PRQ-* identifiers"
          - name: "swa_references"
            data_type: "list"
            required: false
            description: "Extracted SWA feature IDs / GUIDs"
          - name: "status"
            data_type: "string"
            required: false
            description: "Test case status"
          - name: "comments"
            data_type: "text"
            required: false
            description: "Free-form comments"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source Excel filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- TS_WCETTestCase  —  Sheet "WCET analysis" -------------------------
      - name: "TS_WCETTestCase"
        jama_item_type: null
        description: >
          A Worst-Case Execution Time (WCET) analysis test case from the
          "WCET analysis" sheet.  Each row measures the execution time of
          a specific API under two data points: a nominal ET configuration
          and a worst-case (max kernels, max channels, max samples)
          configuration.  Used for timing budget verification per
          ASPICE SWE.4 and ISO 26262 timing constraints.
        extraction_strategy: "testspec_excel_ingestion"
        source_formats: ["xlsx"]
        properties:
          - name: "test_case_id"
            data_type: "string"
            required: true
            description: "Test case ID (e.g. 'Adc_Tc_RU_072')"
          - name: "api_name"
            data_type: "string"
            required: true
            description: >
              API / function under timing measurement (e.g. 'Adc_Init',
              'Adc_StartGroupConversion').
          - name: "configuration_description"
            data_type: "text"
            required: true
            description: >
              Full configuration description: DET/SE/RTE/DEM flags,
              frequencies, kernel count, channels, samples, etc.
          - name: "scenario"
            data_type: "text"
            required: true
            description: >
              How the API is executed for the measurement (e.g. 'Execute
              the Adc_Init API for the configuration mentioned').
          - name: "config_name"
            data_type: "string"
            required: false
            description: "Configuration file name (e.g. 'Adc_Config214')"
          - name: "data_point"
            data_type: "string"
            required: false
            description: >
              Which data point: 'Data Point 1 (ET)' for nominal,
              'Data Point 2 (WCET)' for worst-case.
          - name: "autosar_version"
            data_type: "string"
            required: false
            description: "Applicable AUTOSAR version (e.g. 'AS460')"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Source Excel filename"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- TS_TestSpecDocument  —  Overall test spec metadata -----------------
      - name: "TS_TestSpecDocument"
        jama_item_type: null
        description: >
          A test specification document node representing the overall
          Excel workbook for a module.  Acts as a grouping hub for all
          test cases extracted from the workbook, analogous to how
          MCALModule groups requirements.
        extraction_strategy: "testspec_excel_ingestion"
        source_formats: ["xlsx"]
        properties:
          - name: "document_name"
            data_type: "string"
            required: true
            unique: true
            description: >
              Document identifier (e.g.
              'TC4xx_SW_MCAL_TS_Adc').
          - name: "description"
            data_type: "text"
            required: false
            description: "Brief description of the test spec scope"
          - name: "total_functional_tests"
            data_type: "integer"
            required: false
            description: "Count of functional test cases in the workbook"
          - name: "total_config_tests"
            data_type: "integer"
            required: false
            description: "Count of configuration test cases"
          - name: "total_static_tests"
            data_type: "integer"
            required: false
            description: "Count of static interface test cases"
          - name: "total_wcet_tests"
            data_type: "integer"
            required: false
            description: "Count of WCET analysis entries"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"
          - name: "source_document"
            data_type: "string"
            required: false
            description: "Excel filename"

      # =====================================================================
      #  SOURCE CODE  –  C Implementation Artefacts
      # =====================================================================
      # These node types capture the actual C source code that implements
      # the MCAL driver.  They sit between SWUD (detailed design) and
      # Test Specification in the V-Model, representing the **implementation**
      # layer.  Extracted from .c/.h files in the module source repo using
      # the C parser (regex or clang backend).
      # =====================================================================

      # -- Source File -------------------------------------------------------
      - name: "SRC_SourceFile"
        jama_item_type: null
        description: >
          A C source or header file belonging to a MCAL module source repo.
          Represents the physical file container for functions, types, and
          macros.  Two sub-trees are expected per module: ssc/ (static
          source code) and Plugins/ (code-generation templates).
        extraction_strategy: "c_source_ingestion"
        source_formats: ["c", "h"]
        properties:
          - name: "file_id"
            data_type: "string"
            required: true
            unique: true
            description: >
              Unique identifier derived from the relative path within the
              module repo (e.g. 'ssc/src/Adc.c').
          - name: "file_name"
            data_type: "string"
            required: true
            description: "Base filename (e.g. Adc.c)"
          - name: "relative_path"
            data_type: "string"
            required: true
            description: >
              Path relative to module repo root
              (e.g. 'ssc/src/Adc.c' or 'Plugins/Adc_Aurix3G/generate/template/src/Adc_PBcfg.c')
          - name: "file_type"
            data_type: "string"
            required: true
            description: "File category: 'source' (.c) or 'header' (.h)"
          - name: "subtree"
            data_type: "string"
            required: true
            description: "Repository sub-tree: 'ssc' or 'plugins'"
          - name: "line_count"
            data_type: "integer"
            required: false
            description: "Total number of lines in the file"
          - name: "size_bytes"
            data_type: "integer"
            required: false
            description: "File size in bytes"
          - name: "version"
            data_type: "string"
            required: false
            description: "Software version extracted from file header (e.g. '22.0.0')"
          - name: "date"
            data_type: "string"
            required: false
            description: "Date from file header (e.g. '2025-09-03')"
          - name: "autosar_release"
            data_type: "string"
            required: false
            description: "AUTOSAR release version (e.g. '4.6.0')"
          - name: "includes"
            data_type: "list[string]"
            required: false
            description: "List of #include directives in this file"
          - name: "traceability_ids"
            data_type: "list[string]"
            required: false
            description: "GUIDs from [cover parentID={...}] tags in the file header"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"

      # -- Source Function ---------------------------------------------------
      - name: "SRC_Function"
        jama_item_type: null
        description: >
          A C function definition extracted from a MCAL module source file.
          Captures both public API functions (e.g. Adc_Init) and internal
          static helper functions (e.g. Adc_lInit).  Linked to SWA_Function
          nodes when name matches, and to ProductRequirement via traceability
          GUIDs embedded in the documentation block.
        extraction_strategy: "c_source_ingestion"
        source_formats: ["c", "h"]
        properties:
          - name: "function_id"
            data_type: "string"
            required: true
            unique: true
            description: >
              Unique identifier: '<relative_path>::<function_name>'
              (e.g. 'ssc/src/Adc.c::Adc_Init')
          - name: "name"
            data_type: "string"
            required: true
            description: "Function name (e.g. Adc_Init)"
          - name: "return_type"
            data_type: "string"
            required: false
            description: "Return type (e.g. 'void', 'Std_ReturnType')"
          - name: "parameters"
            data_type: "list[string]"
            required: false
            description: >
              List of parameter strings in 'type name' format
              (e.g. ['const Adc_ConfigType * ConfigPtr'])
          - name: "signature"
            data_type: "string"
            required: false
            description: "Full function signature as a single string"
          - name: "description"
            data_type: "text"
            required: false
            description: "Description from the Doxygen documentation block"
          - name: "service_id"
            data_type: "string"
            required: false
            description: "AUTOSAR service ID (e.g. '0x00' for Adc_Init)"
          - name: "sync_async"
            data_type: "string"
            required: false
            description: "Synchronous or Asynchronous"
          - name: "reentrancy"
            data_type: "string"
            required: false
            description: "Reentrancy classification (Reentrant, Non Reentrant, Conditionally Reentrant)"
          - name: "is_static"
            data_type: "boolean"
            required: false
            description: "Whether the function is declared static (internal)"
          - name: "is_inline"
            data_type: "boolean"
            required: false
            description: "Whether the function is declared inline"
          - name: "start_line"
            data_type: "integer"
            required: false
            description: "Starting line number in the source file"
          - name: "end_line"
            data_type: "integer"
            required: false
            description: "Ending line number in the source file"
          - name: "compile_condition"
            data_type: "string"
            required: false
            description: >
              Enclosing #if condition if the function is conditionally
              compiled (e.g. 'ADC_DEINIT_API == STD_ON')
          - name: "traceability_ids"
            data_type: "list[string]"
            required: false
            description: "GUIDs from [cover parentID={...}] tags in the doc block"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"

      # -- Source Struct / Union / Typedef -----------------------------------
      - name: "SRC_DataType"
        jama_item_type: null
        description: >
          A C struct, union, enum, or typedef definition extracted from a
          MCAL module source file.  Covers both public types (in .h files)
          and internal types (static in .c files).
        extraction_strategy: "c_source_ingestion"
        source_formats: ["c", "h"]
        properties:
          - name: "type_id"
            data_type: "string"
            required: true
            unique: true
            description: >
              Unique identifier: '<relative_path>::<type_name>'
              (e.g. 'ssc/inc/Adc.h::Adc_StatusType')
          - name: "name"
            data_type: "string"
            required: true
            description: "Type name (e.g. Adc_StatusType)"
          - name: "kind"
            data_type: "string"
            required: true
            description: "Type kind: 'struct', 'union', 'enum', or 'typedef'"
          - name: "members"
            data_type: "list[string]"
            required: false
            description: >
              List of member definitions for struct/union
              (e.g. ['uint16 GrpIndex', 'uint8 GrpHwUnitId'])
              or enumerator names for enums
          - name: "base_type"
            data_type: "string"
            required: false
            description: "For typedefs, the underlying type (e.g. 'uint32')"
          - name: "description"
            data_type: "text"
            required: false
            description: "Description from preceding Doxygen comment"
          - name: "traceability_ids"
            data_type: "list[string]"
            required: false
            description: "GUIDs from [cover parentID={...}] tags"
          - name: "start_line"
            data_type: "integer"
            required: false
            description: "Starting line number in the source file"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"

      # -- Source Macro ------------------------------------------------------
      - name: "SRC_Macro"
        jama_item_type: null
        description: >
          A C preprocessor #define macro extracted from a MCAL module source
          file.  Includes configuration switches (e.g. ADC_DEINIT_API),
          hardware register reset values, bit-field offsets, and service IDs.
        extraction_strategy: "c_source_ingestion"
        source_formats: ["c", "h"]
        properties:
          - name: "macro_id"
            data_type: "string"
            required: true
            unique: true
            description: >
              Unique identifier: '<relative_path>::<macro_name>'
              (e.g. 'ssc/inc/Adc.h::ADC_MODULE_ID')
          - name: "name"
            data_type: "string"
            required: true
            description: "Macro name (e.g. ADC_MODULE_ID)"
          - name: "value"
            data_type: "string"
            required: false
            description: "Macro value / replacement text"
          - name: "macro_category"
            data_type: "string"
            required: false
            description: >
              Categorisation: 'version', 'service_id', 'error_code',
              'config_switch', 'register_value', 'bit_offset', 'general'
          - name: "description"
            data_type: "text"
            required: false
            description: "Description from preceding comment"
          - name: "traceability_ids"
            data_type: "list[string]"
            required: false
            description: "GUIDs from [cover parentID={...}] tags"
          - name: "start_line"
            data_type: "integer"
            required: false
            description: "Line number of the #define"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"

      # -- Source Global Variable --------------------------------------------
      - name: "SRC_GlobalVariable"
        jama_item_type: null
        description: >
          A global (file-scope) variable declaration in a MCAL module source
          file.  Includes static module-level variables, extern declarations,
          and configuration data arrays.  Captures AUTOSAR memory section
          placement (ASIL level, alignment) from surrounding MemMap markers.
        extraction_strategy: "c_source_ingestion"
        source_formats: ["c", "h"]
        properties:
          - name: "variable_id"
            data_type: "string"
            required: true
            unique: true
            description: >
              Unique identifier: '<relative_path>::<variable_name>'
              (e.g. 'ssc/src/Adc_Data.c::Adc_kPartition0_ConfigPtr')
          - name: "name"
            data_type: "string"
            required: true
            description: "Variable name (e.g. Adc_kPartition0_ConfigPtr)"
          - name: "data_type"
            data_type: "string"
            required: false
            description: "C type of the variable (e.g. 'const Adc_ConfigType *')"
          - name: "is_static"
            data_type: "boolean"
            required: false
            description: "Whether declared static (file-internal linkage)"
          - name: "is_const"
            data_type: "boolean"
            required: false
            description: "Whether declared const"
          - name: "is_extern"
            data_type: "boolean"
            required: false
            description: "Whether this is an extern declaration"
          - name: "is_array"
            data_type: "boolean"
            required: false
            description: "Whether the variable is an array"
          - name: "array_size"
            data_type: "string"
            required: false
            description: "Array dimension expression if applicable"
          - name: "initializer"
            data_type: "string"
            required: false
            description: "Initializer expression (truncated to 500 chars)"
          - name: "memory_section"
            data_type: "string"
            required: false
            description: >
              AUTOSAR memory section from surrounding MemMap markers
              (e.g. 'VAR_CLEARED_ASIL_D_LOCAL_32')
          - name: "compile_condition"
            data_type: "string"
            required: false
            description: "Enclosing #if condition if conditionally compiled"
          - name: "description"
            data_type: "text"
            required: false
            description: "Comment text preceding the declaration"
          - name: "traceability_ids"
            data_type: "list[string]"
            required: false
            description: "GUIDs from [cover parentID={...}] tags"
          - name: "start_line"
            data_type: "integer"
            required: false
            description: "Line number of the declaration"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"

      # -- Source Local Variable (per-function) ------------------------------
      - name: "SRC_LocalVariable"
        jama_item_type: null
        description: >
          A local variable declared inside a C function body.  Captures
          parameter-like stack variables, loop counters, and configuration
          pointers local to function scope.
        extraction_strategy: "c_source_ingestion"
        source_formats: ["c"]
        properties:
          - name: "variable_id"
            data_type: "string"
            required: true
            unique: true
            description: >
              Unique identifier: '<function_id>::<variable_name>'
              (e.g. 'ssc/src/Adc.c::Adc_Init::ExecutionIndex')
          - name: "name"
            data_type: "string"
            required: true
            description: "Variable name (e.g. ExecutionIndex)"
          - name: "data_type"
            data_type: "string"
            required: false
            description: "C type (e.g. 'uint32', 'const Adc_ConfigType *')"
          - name: "initializer"
            data_type: "string"
            required: false
            description: "Initializer expression if present"
          - name: "is_const"
            data_type: "boolean"
            required: false
            description: "Whether declared const"
          - name: "is_pointer"
            data_type: "boolean"
            required: false
            description: "Whether the variable is a pointer"
          - name: "compile_condition"
            data_type: "string"
            required: false
            description: "Enclosing #if condition if conditionally compiled"
          - name: "start_line"
            data_type: "integer"
            required: false
            description: "Line number within the source file"
          - name: "module"
            data_type: "string"
            required: true
            description: "MCAL module name (e.g. ADC)"

      # =====================================================================
      # SFR (Special Function Register) Node Types
      # =====================================================================

      - name: "SFR_File"
        jama_item_type: null
        description: >
          An SFR header file from the AURIX TC4xx infrastructure SFR
          repository.  Each device/module combination produces up to three
          files: _regdef.h (struct bitfield definitions), _bf.h (mask/offset
          defines), and _reg.h (base addresses).
        extraction_strategy: "sfr_header_ingestion"
        source_formats: ["h"]
        properties:
          - name: "file_id"
            data_type: "string"
            required: true
            unique: true
            description: "Unique ID: 'SFR:<device>:<filename>'"
          - name: "file_name"
            data_type: "string"
            required: true
            description: "Header file name (e.g. IfxAdc_regdef.h)"
          - name: "file_type"
            data_type: "string"
            required: true
            description: "One of: regdef, bf, reg"
          - name: "device"
            data_type: "string"
            required: true
            description: "AURIX device variant (e.g. TC49xN)"
          - name: "module"
            data_type: "string"
            required: true
            description: "Peripheral module name (e.g. ADC)"
          - name: "version"
            data_type: "string"
            required: false
            description: "HSI version string from file header"

      - name: "SFR_Register"
        jama_item_type: null
        description: >
          A hardware register defined as a typedef struct of bitfields in
          the _regdef.h file.  Each register belongs to a device+module
          combination, e.g. ADC_ACCEN_PRS on TC49xN.
        extraction_strategy: "sfr_header_ingestion"
        source_formats: ["h"]
        properties:
          - name: "register_id"
            data_type: "string"
            required: true
            unique: true
            description: "Unique ID: 'SFR:<device>:<register_name>'"
          - name: "name"
            data_type: "string"
            required: true
            description: "Register name (e.g. ADC_ACCEN_PRS)"
          - name: "description"
            data_type: "string"
            required: false
            description: "Doxygen brief from the header comment"
          - name: "struct_name"
            data_type: "string"
            required: false
            description: "C typedef name (e.g. Ifx_ADC_ACCEN_PRS_Bits)"
          - name: "device"
            data_type: "string"
            required: true
            description: "AURIX device variant (e.g. TC49xN)"
          - name: "module"
            data_type: "string"
            required: true
            description: "Peripheral module name (e.g. ADC)"
          - name: "version"
            data_type: "string"
            required: false
            description: "HSI version string"

      - name: "SFR_BitField"
        jama_item_type: null
        description: >
          A single bitfield within a register struct.  Captures the field
          name, bit range, width, access mode (rw/rh/w), and optional
          mask/offset defines from the _bf.h companion file.
        extraction_strategy: "sfr_header_ingestion"
        source_formats: ["h"]
        properties:
          - name: "bitfield_id"
            data_type: "string"
            required: true
            unique: true
            description: "Unique ID: 'SFR:<device>:<register>:<field>'"
          - name: "name"
            data_type: "string"
            required: true
            description: "Bitfield name (e.g. RD00, DISR)"
          - name: "description"
            data_type: "string"
            required: false
            description: "Doxygen brief"
          - name: "bits"
            data_type: "string"
            required: true
            description: "Bit range string (e.g. '[0:0]', '[31:16]')"
          - name: "width"
            data_type: "integer"
            required: true
            description: "Number of bits"
          - name: "msb"
            data_type: "integer"
            required: true
            description: "Most significant bit position"
          - name: "lsb"
            data_type: "integer"
            required: true
            description: "Least significant bit position"
          - name: "access"
            data_type: "string"
            required: true
            description: "Access type (rw, rh, w, etc.)"
          - name: "mask"
            data_type: "string"
            required: false
            description: "Bitmask from _bf.h (e.g. 0x1u)"
          - name: "offset_define"
            data_type: "string"
            required: false
            description: "Bit offset define value from _bf.h"
          - name: "device"
            data_type: "string"
            required: true
            description: "AURIX device variant"
          - name: "module"
            data_type: "string"
            required: true
            description: "Peripheral module name"

      - name: "SFR_BaseAddress"
        jama_item_type: null
        description: >
          A base address or memory-mapped region defined in the _reg.h file.
          Captures the MODULE_ADC macro and peripheral memory region addresses.
        extraction_strategy: "sfr_header_ingestion"
        source_formats: ["h"]
        properties:
          - name: "base_address_id"
            data_type: "string"
            required: true
            unique: true
            description: "Unique ID: 'SFR:<device>:<macro_name>'"
          - name: "name"
            data_type: "string"
            required: true
            description: "Macro name (e.g. MODULE_ADC)"
          - name: "address"
            data_type: "string"
            required: true
            description: "Hex address (e.g. 0xF5000000)"
          - name: "address_type"
            data_type: "string"
            required: true
            description: "One of: module_base, memory_region"
          - name: "device"
            data_type: "string"
            required: true
            description: "AURIX device variant"
          - name: "module"
            data_type: "string"
            required: true
            description: "Peripheral module name"

    # -------------------------------------------------------------------------
    # RELATIONSHIP TYPES
    # -------------------------------------------------------------------------
    relationship_types:

      # ASPICE V-Model Traceability
      - name: "DERIVES_FROM"
        description: "PRQ is derived from / refines a SHRQ"
        from_types: ["ProductRequirement"]
        to_types: ["StakeholderRequirement"]
        extraction_source: "jama_relationships"
        properties:
          - name: "derivation_type"
            data_type: "string"
            validation_rules:
              allowed_values: ["Refinement", "Decomposition", "Derivation"]

      - name: "VERIFIED_BY"
        description: "PRQ is verified by a verification step"
        from_types: ["ProductRequirement"]
        to_types: ["VerificationStep"]
        extraction_source: "jama_relationships"
        properties: []

      - name: "HAS_RESULT"
        description: "Verification step has an execution report"
        from_types: ["VerificationStep"]
        to_types: ["VerificationReport"]
        extraction_source: "jama_relationships"
        properties: []

      - name: "ASSUMES"
        description: "Requirement depends on an architectural assumption"
        from_types: ["ProductRequirement", "StakeholderRequirement"]
        to_types: ["ArchitecturalAssumption"]
        extraction_source: "jama_relationships"
        properties: []

      # Stakeholder & Source Traceability
      - name: "RAISED_BY"
        description: "Requirement was raised / submitted by a stakeholder"
        from_types: ["StakeholderRequirement"]
        to_types: ["Stakeholder"]
        extraction_source: "jama_relationships"
        properties: []

      - name: "SOURCED_FROM"
        description: "Requirement sourced from an external document"
        from_types: ["StakeholderRequirement"]
        to_types: ["DocumentReference"]
        extraction_source: "jama_relationships"
        properties: []

      # Organisational / Structural
      - name: "BELONGS_TO_MODULE"
        description: "Entity belongs to a MCAL module"
        from_types: ["ProductRequirement", "StakeholderRequirement", "VerificationStep", "ArchitecturalAssumption"]
        to_types: ["MCALModule"]
        extraction_source: "derived_from_name_prefix"
        properties: []

      - name: "BELONGS_TO_FOLDER"
        description: >
          Links a requirement to its immediate parent folder in the Jama
          hierarchy.  Enables queries like 'all API PRQs for ADC' or
          'all Configuration PRQs for SPI'.
        from_types: ["ProductRequirement", "StakeholderRequirement", "VerificationStep", "TextItem"]
        to_types: ["Folder"]
        extraction_source: "jama_api_hierarchy"
        properties: []

      - name: "CHILD_OF"
        description: "Hierarchical parent-child relationship in the Jama tree"
        from_types: ["Folder", "StakeholderRequirement", "ProductRequirement", "TextItem", "VerificationStep", "Set"]
        to_types: ["Folder", "Set", "Component"]
        extraction_source: "jama_location"
        properties:
          - name: "sequence"
            data_type: "string"
            description: "Position within parent"

      - name: "GROUPED_IN"
        description: "Requirement is part of a logical group"
        from_types: ["ProductRequirement"]
        to_types: ["RequirementGroup"]
        extraction_source: "jama_relationships"
        properties: []

      - name: "TARGETED_FOR"
        description: "Requirement is targeted for a specific release"
        from_types: ["ProductRequirement", "StakeholderRequirement"]
        to_types: ["SoftwareRelease"]
        extraction_source: "release_field"
        properties: []

      # Verification Domain Assignment
      - name: "VERIFIED_IN_DOMAIN"
        description: "PRQ verification is assigned to a verification domain"
        from_types: ["ProductRequirement"]
        to_types: ["VerificationDomain"]
        extraction_source: "jama_relationships"
        properties:
          - name: "rationale"
            data_type: "text"

      # Context / Reference
      - name: "PROVIDES_CONTEXT"
        description: "Text item provides context/guidance for requirements"
        from_types: ["TextItem"]
        to_types: ["StakeholderRequirement", "ProductRequirement", "Folder"]
        extraction_source: "jama_location"
        properties: []

      - name: "DEFINES_TERM"
        description: "Glossary term provides definition used in requirements"
        from_types: ["GlossaryTerm"]
        to_types: ["ProductRequirement", "StakeholderRequirement"]
        extraction_source: "semantic_similarity"
        properties:
          - name: "confidence"
            data_type: "float"

      # SWA Exported SW Interface Traceability
      - name: "ARCHITECTURALLY_REALIZES"
        description: >
          SWA exported-interface element (function, data type, or macro)
          architecturally realizes a product requirement (PRQ).  Extracted
          from the [req parentID=AU3GM-PRQ-xxxxx] tags embedded in the SWA
          document specification tables.
        from_types: ["SWA_Function", "SWA_DataType", "SWA_Macro"]
        to_types: ["ProductRequirement"]
        extraction_source: "swa_req_tags"
        properties:
          - name: "feature_id"
            data_type: "string"
            description: "SWA feature GUID from [req featureID=...] tag"

      - name: "SWA_BELONGS_TO_MODULE"
        description: >
          SWA exported-interface element belongs to a MCAL module.
          Derived from the module context of the SWA document.
        from_types: ["SWA_Function", "SWA_DataType", "SWA_Macro"]
        to_types: ["MCALModule"]
        extraction_source: "swa_document_context"
        properties: []

      - name: "SWA_USES_TYPE"
        description: >
          SWA function uses an SWA data type as a parameter, return type,
          or in its internal logic — linking the function specification
          to the type specification within the same SWA document.
        from_types: ["SWA_Function"]
        to_types: ["SWA_DataType"]
        extraction_source: "swa_signature_analysis"
        properties:
          - name: "usage_context"
            data_type: "string"
            description: "How the type is used (parameter_in, parameter_out, return, internal)"
            validation_rules:
              allowed_values: ["parameter_in", "parameter_out", "parameter_inout", "return", "internal"]

      # SWA Enumeration Literals
      - name: "SWA_HAS_LITERAL"
        description: >
          SWA enumeration data type contains an enumeration literal.
          Links an SWA_DataType (of type_category "enumeration") to
          each of its defined SWA_EnumLiteral values.
        from_types: ["SWA_DataType"]
        to_types: ["SWA_EnumLiteral"]
        extraction_source: "swa_pdf_ingestion"
        properties:
          - name: "ordinal"
            data_type: "integer"
            description: "Position of the literal within the enum definition"

      # SWA Error Reporting
      - name: "SWA_REPORTS_ERROR"
        description: >
          SWA function reports a specific error code.  Extracted from the
          "Error Handling" section of each function's specification table.
          Enables cross-referencing which functions share error conditions.
        from_types: ["SWA_Function"]
        to_types: ["SWA_ErrorCode"]
        extraction_source: "swa_error_handling_section"
        properties: []

      # SWA Design Decision Traceability
      - name: "SWA_HAS_DESIGN_DECISION"
        description: >
          SWA exported-interface element has an associated inline design
          decision.  Links the element (function, data type, or macro)
          to a SWA_DesignDecision node.
        from_types: ["SWA_Function", "SWA_DataType", "SWA_Macro"]
        to_types: ["SWA_DesignDecision"]
        extraction_source: "swa_design_decision_tags"
        properties: []

      - name: "SWA_DESIGN_DECISION_TRACES_TO"
        description: >
          SWA design decision traces to one or more product requirements
          (PRQs) via [req parentID=AU3GM-PRQ-xxxxx] tags embedded in the
          design decision text.  This is a finer-grained traceability
          link than ARCHITECTURALLY_REALIZES, capturing the rationale and
          justification for specific architectural choices.
        from_types: ["SWA_DesignDecision"]
        to_types: ["ProductRequirement"]
        extraction_source: "swa_req_tags"
        properties:
          - name: "feature_id"
            data_type: "string"
            description: "SWA feature GUID from [req featureID=...] tag"

      # SWA Configuration Gating
      - name: "SWA_GATED_BY_CONFIG"
        description: >
          SWA function's availability is gated by a configuration parameter.
          When the parameter is configured as TRUE, the API is included;
          when FALSE, the API is excluded from the build.  Extracted from
          the "Configuration Dependencies" section of each function's
          specification table.
        from_types: ["SWA_Function"]
        to_types: ["SWA_ConfigParameter"]
        extraction_source: "swa_config_dependencies_section"
        properties: []

      # SWA Property Variable Traceability
      - name: "SWA_PROPERTY_BELONGS_TO_MODULE"
        description: >
          SWA property file variable belongs to a MCAL module.
          Derived from the module context of the SWA document.
        from_types: ["SWA_PropertyVariable"]
        to_types: ["MCALModule"]
        extraction_source: "swa_document_context"
        properties: []

      # =================================================================
      # SWA Section 3.1.3 — Architectural Decision Relationships
      # =================================================================

      - name: "SWA_ARCH_DECISION_TRACES_TO"
        description: >
          Architectural decision traces to one or more product
          requirements (PRQs) via [req parentID=AU3GM-PRQ-xxxxx] tags.
        from_types: ["SWA_ArchitecturalDecision"]
        to_types: ["ProductRequirement"]
        extraction_source: "swa_req_tags"
        properties:
          - name: "feature_id"
            data_type: "string"
            description: "Feature GUID from [req featureID=...] tag"

      - name: "SWA_ARCH_DECISION_BELONGS_TO_MODULE"
        description: >
          Architectural decision belongs to a MCAL module.
        from_types: ["SWA_ArchitecturalDecision"]
        to_types: ["MCALModule"]
        extraction_source: "swa_document_context"
        properties: []

      - name: "SWA_ARCH_DECISION_PARENT"
        description: >
          Hierarchical parent-child relationship between architectural
          decisions in section 3.1.3.  Sub-decisions refine or constrain
          a parent decision (e.g. 3.1.3.5 → 3.1.3.5.1 → 3.1.3.5.2).
        from_types: ["SWA_ArchitecturalDecision"]
        to_types: ["SWA_ArchitecturalDecision"]
        extraction_source: "swa_section_hierarchy"
        properties: []

      # =================================================================
      # SWA Section 3.1.5 — HW-SW Interface Relationships
      # =================================================================

      - name: "SWA_DEPENDS_ON_HW"
        description: >
          MCAL module depends on a hardware peripheral.  Links the
          module to each HW IP block it requires for its operation,
          as documented in SWA section 3.1.5.
        from_types: ["MCALModule"]
        to_types: ["SWA_HwPeripheral"]
        extraction_source: "swa_hw_sw_interface_section"
        properties:
          - name: "dependency_role"
            data_type: "string"
            description: "Role of the HW dependency (primary, trigger, result_transfer, clock, diagnostics)"

      - name: "SWA_HW_PERIPHERAL_CONFIGURED_BY"
        description: >
          Hardware peripheral is configured/accessed by another MCAL
          module.  E.g. CLOCK is configured by MCU, DMA channels are
          managed by DMA driver.
        from_types: ["SWA_HwPeripheral"]
        to_types: ["MCALModule"]
        extraction_source: "swa_hw_sw_interface_section"
        properties: []

      # =================================================================
      # SWA Section 3.1.6 — SW-SW Interface Relationships
      # =================================================================

      - name: "SWA_CALLS_EXTERNAL"
        description: >
          MCAL module calls an external API/macro from another module,
          as documented in SWA section 3.1.6 (SW-SW Interface).
        from_types: ["MCALModule"]
        to_types: ["SWA_SwDependency"]
        extraction_source: "swa_sw_sw_interface_section"
        properties: []

      - name: "SWA_DEPENDENCY_PROVIDED_BY"
        description: >
          External SW dependency (API/macro) is provided by another
          MCAL module.  Enables dependency-graph queries like
          "which modules does ADC depend on?" or "which modules
          call Cdsp_Setup?".
        from_types: ["SWA_SwDependency"]
        to_types: ["MCALModule"]
        extraction_source: "swa_sw_sw_interface_section"
        properties: []

      # =================================================================
      # SWA Section 3.1.7 — Configuration Relationships
      # =================================================================

      - name: "SWA_CONTAINS_CONTAINER"
        description: >
          Configuration container contains a sub-container.
          Models the ECUC container hierarchy from SWA section 3.1.7
          (e.g. Adc → AdcConfigSet → AdcHwUnit → AdcGroup).
        from_types: ["SWA_ConfigContainer"]
        to_types: ["SWA_ConfigContainer"]
        extraction_source: "swa_config_hierarchy"
        properties: []

      - name: "SWA_CONTAINS_PARAM"
        description: >
          Configuration container contains a configuration parameter.
          Links an SWA_ConfigContainer to each of its child
          SWA_ConfigParam nodes.
        from_types: ["SWA_ConfigContainer"]
        to_types: ["SWA_ConfigParam"]
        extraction_source: "swa_config_hierarchy"
        properties:
          - name: "ordinal"
            data_type: "integer"
            description: "Position of the parameter within the container"

      - name: "SWA_CONFIG_TRACES_TO"
        description: >
          Configuration container or parameter traces to one or more
          product requirements (PRQs) via [req parentID=...] tags.
        from_types: ["SWA_ConfigContainer", "SWA_ConfigParam"]
        to_types: ["ProductRequirement"]
        extraction_source: "swa_req_tags"
        properties:
          - name: "feature_id"
            data_type: "string"
            description: "Feature GUID from [req featureID=...] tag"

      - name: "SWA_CONFIG_BELONGS_TO_MODULE"
        description: >
          Configuration container belongs to a MCAL module.
        from_types: ["SWA_ConfigContainer"]
        to_types: ["MCALModule"]
        extraction_source: "swa_document_context"
        properties: []

      # =================================================================
      # SWA Section 3.1.9 — File Structure Relationships
      # =================================================================

      - name: "SWA_FILE_BELONGS_TO_MODULE"
        description: >
          Source file belongs to a MCAL module.
        from_types: ["SWA_SourceFile"]
        to_types: ["MCALModule"]
        extraction_source: "swa_document_context"
        properties: []

      - name: "SWA_FILE_TRACES_TO"
        description: >
          Source file traces to one or more product requirements
          (PRQs) via [req parentID=...] tags.
        from_types: ["SWA_SourceFile"]
        to_types: ["ProductRequirement"]
        extraction_source: "swa_req_tags"
        properties:
          - name: "feature_id"
            data_type: "string"
            description: "Feature GUID from [req featureID=...] tag"

      - name: "SWA_FUNCTION_DECLARED_IN"
        description: >
          SWA function is declared/defined in a source file.
          Links SWA_Function nodes to their SWA_SourceFile.
        from_types: ["SWA_Function"]
        to_types: ["SWA_SourceFile"]
        extraction_source: "swa_file_field"
        properties: []

      - name: "SWA_DATATYPE_DECLARED_IN"
        description: >
          SWA data type is declared in a source file.
          Links SWA_DataType nodes to their SWA_SourceFile.
        from_types: ["SWA_DataType"]
        to_types: ["SWA_SourceFile"]
        extraction_source: "swa_file_field"
        properties: []

      # =================================================================
      # SWA Section 3.2 — Call Sequence Relationships
      # =================================================================

      - name: "SWA_CALL_SEQUENCE_INVOLVES"
        description: >
          Call sequence diagram references an SWA function as one of
          the interaction participants.  Links an SWA_CallSequence to
          each SWA_Function that appears in the sequence flow.  Enables
          queries like "which call sequences involve Adc_Init?" or
          "show all interaction flows for Adc_StartGroupConversion".
        from_types: ["SWA_CallSequence"]
        to_types: ["SWA_Function"]
        extraction_source: "swa_call_sequence_extraction"
        properties:
          - name: "role"
            data_type: "string"
            description: "Role of the function in the sequence (caller, callee, callback, handler)"
            validation_rules:
              allowed_values: ["caller", "callee", "callback", "handler", "notification"]

      - name: "SWA_CALL_SEQUENCE_BELONGS_TO_MODULE"
        description: >
          Call sequence belongs to a MCAL module.  Derived from the
          module context of the SWA document.
        from_types: ["SWA_CallSequence"]
        to_types: ["MCALModule"]
        extraction_source: "swa_document_context"
        properties: []

      - name: "SWA_CALL_SEQUENCE_TRACES_TO"
        description: >
          Call sequence traces to one or more product requirements
          (PRQs) via [req parentID=AU3GM-PRQ-xxxxx] tags embedded
          in the call sequence section.
        from_types: ["SWA_CallSequence"]
        to_types: ["ProductRequirement"]
        extraction_source: "swa_req_tags"
        properties:
          - name: "feature_id"
            data_type: "string"
            description: "Feature GUID from [req featureID=...] tag"

      # =================================================================
      # SWA Safety & Security View Relationships
      # =================================================================
      # Relationships for SWA safety (3.3), trusted/security (3.4),
      # and memory section (3.1.10) node types — traceability to PRQ
      # and module membership.
      # =================================================================

      # -- SWA Memory Section --

      - name: "SWA_MEMORY_SECTION_TRACES_TO"
        description: >
          Memory section traces to one or more product requirements
          (PRQs) via [req parentID=AU3GM-PRQ-xxxxx] tags.
        from_types: ["SWA_MemorySection"]
        to_types: ["ProductRequirement"]
        extraction_source: "swa_req_tags"
        properties:
          - name: "feature_id"
            data_type: "string"
            description: "Feature GUID from [req featureID=...] tag"

      - name: "SWA_MEMORY_SECTION_BELONGS_TO_MODULE"
        description: >
          Memory section belongs to a MCAL module.
        from_types: ["SWA_MemorySection"]
        to_types: ["MCALModule"]
        extraction_source: "swa_document_context"
        properties: []

      # -- SWA Safety Measures (3.3.1) --

      - name: "SWA_SAFETY_MEASURE_TRACES_TO"
        description: >
          Safety measure traces to one or more product requirements
          (PRQs) via [req parentID=AU3GM-PRQ-xxxxx] tags embedded
          in the safety measures section (3.3.1).
        from_types: ["SWA_SafetyMeasure"]
        to_types: ["ProductRequirement"]
        extraction_source: "swa_req_tags"
        properties:
          - name: "feature_id"
            data_type: "string"
            description: "Feature GUID from [req featureID=...] tag"

      - name: "SWA_SAFETY_MEASURE_BELONGS_TO_MODULE"
        description: >
          Safety measure belongs to a MCAL module.
        from_types: ["SWA_SafetyMeasure"]
        to_types: ["MCALModule"]
        extraction_source: "swa_document_context"
        properties: []

      # -- SWA Safety AoU (3.3.2) --

      - name: "SWA_SAFETY_AOU_TRACES_TO"
        description: >
          Safety Assumption of Use traces to one or more product
          requirements (PRQs) via [req parentID=AU3GM-PRQ-xxxxx] tags
          embedded in the AoU section (3.3.2).
        from_types: ["SWA_SafetyAoU"]
        to_types: ["ProductRequirement"]
        extraction_source: "swa_req_tags"
        properties:
          - name: "feature_id"
            data_type: "string"
            description: "Feature GUID from [req featureID=...] tag"

      - name: "SWA_SAFETY_AOU_BELONGS_TO_MODULE"
        description: >
          Safety AoU belongs to a MCAL module.
        from_types: ["SWA_SafetyAoU"]
        to_types: ["MCALModule"]
        extraction_source: "swa_document_context"
        properties: []

      # -- SWA Trusted View / Security (3.4) --

      - name: "SWA_THREAT_BELONGS_TO_MODULE"
        description: >
          Threat analysis entry belongs to a MCAL module.
        from_types: ["SWA_ThreatAnalysis"]
        to_types: ["MCALModule"]
        extraction_source: "swa_document_context"
        properties: []

      - name: "SWA_SECURITY_MEASURE_TRACES_TO"
        description: >
          Security measure traces to one or more product requirements
          (PRQs) via [req parentID=AU3GM-PRQ-xxxxx] tags.
        from_types: ["SWA_SecurityMeasure"]
        to_types: ["ProductRequirement"]
        extraction_source: "swa_req_tags"
        properties:
          - name: "feature_id"
            data_type: "string"
            description: "Feature GUID from [req featureID=...] tag"

      - name: "SWA_SECURITY_MEASURE_BELONGS_TO_MODULE"
        description: >
          Security measure belongs to a MCAL module.
        from_types: ["SWA_SecurityMeasure"]
        to_types: ["MCALModule"]
        extraction_source: "swa_document_context"
        properties: []

      - name: "SWA_SECURITY_AOU_TRACES_TO"
        description: >
          Security AoU traces to one or more product requirements
          (PRQs) via [req parentID=AU3GM-PRQ-xxxxx] tags.
        from_types: ["SWA_SecurityAoU"]
        to_types: ["ProductRequirement"]
        extraction_source: "swa_req_tags"
        properties:
          - name: "feature_id"
            data_type: "string"
            description: "Feature GUID from [req featureID=...] tag"

      - name: "SWA_SECURITY_AOU_BELONGS_TO_MODULE"
        description: >
          Security AoU belongs to a MCAL module.
        from_types: ["SWA_SecurityAoU"]
        to_types: ["MCALModule"]
        extraction_source: "swa_document_context"
        properties: []

      # =================================================================
      # SWUD (Software Design Specification) Relationships
      # =================================================================
      # Relationships for SWUD nodes — traceability to PRQ, module
      # membership, cross-references between design elements, HSI
      # constituents, and memory allocation.
      # =================================================================

      # -- SWUD Traceability to PRQ --

      - name: "SWUD_TRACES_TO"
        description: >
          SWUD element traces to a Product Requirement (PRQ).
          Extracted from [req parentID=AU3GM-PRQ-xxxxx] tags embedded
          in the SWUD document.  Applies to all SWUD node types.
        from_types: [
          "SWUD_DesignDecision", "SWUD_DerivedConfigParam",
          "SWUD_ConfigStructure", "SWUD_CodeGenMacro",
          "SWUD_TypeDefinition", "SWUD_Function",
          "SWUD_DataVariable", "SWUD_CriticalSection",
          "SWUD_MemorySection"
        ]
        to_types: ["ProductRequirement"]
        extraction_source: "swud_req_tags"
        properties:
          - name: "feature_id"
            data_type: "string"
            description: "Enterprise Architect featureID GUID"

      # -- SWUD Module Membership --

      - name: "SWUD_BELONGS_TO_MODULE"
        description: >
          SWUD element belongs to a MCAL module.
          All SWUD nodes carry a module property; this relationship
          materialises that link in the graph.
        from_types: [
          "SWUD_DesignDecision", "SWUD_DerivedConfigParam",
          "SWUD_ConfigStructure", "SWUD_CodeGenMacro",
          "SWUD_TypeDefinition", "SWUD_Function",
          "SWUD_DataVariable", "SWUD_CriticalSection",
          "SWUD_MemorySection"
        ]
        to_types: ["MCALModule"]
        extraction_source: "swud_document_context"
        properties: []

      # -- SWUD Function uses Type --

      - name: "SWUD_USES_TYPE"
        description: >
          SWUD function uses a SWUD type definition as a parameter
          type, return type, or internal variable.  Also links
          configuration structures to their C types.
        from_types: ["SWUD_Function", "SWUD_ConfigStructure", "SWUD_DataVariable"]
        to_types: ["SWUD_TypeDefinition"]
        extraction_source: "swud_type_analysis"
        properties:
          - name: "usage_context"
            data_type: "string"
            description: "'parameter_in', 'parameter_out', 'parameter_inout', 'return', 'internal', 'declaration'"

      # -- SWUD Function calls Function --

      - name: "SWUD_CALLS"
        description: >
          One SWUD function calls another SWUD function.
          Extracted from algorithm descriptions and activity diagrams
          where function calls are explicitly named (e.g.
          'Adc_lReportError::Adc_lReportError' in activity diagrams).
        from_types: ["SWUD_Function"]
        to_types: ["SWUD_Function"]
        extraction_source: "swud_algorithm_analysis"
        properties: []

      # -- SWUD Function allocated in Memory Section --

      - name: "SWUD_ALLOCATED_IN"
        description: >
          SWUD function, data variable, or config structure is allocated
          in a specific memory section.  Extracted from the 'Memory
          Section' field of each SWUD element.
        from_types: ["SWUD_Function", "SWUD_DataVariable", "SWUD_ConfigStructure"]
        to_types: ["SWUD_MemorySection"]
        extraction_source: "swud_memory_field"
        properties: []

      # -- SWUD Function uses Critical Section --

      - name: "SWUD_USES_CRITICAL_SECTION"
        description: >
          SWUD function enters/exits a critical section.
          Extracted from algorithm descriptions and HSI specifications
          where SchM_Enter / SchM_Exit calls are documented.
        from_types: ["SWUD_Function"]
        to_types: ["SWUD_CriticalSection"]
        extraction_source: "swud_algorithm_analysis"
        properties: []

      # -- SWUD Function reports Error --

      - name: "SWUD_REPORTS_ERROR"
        description: >
          SWUD function reports a DET, runtime, safety, or DEM error.
          Links to SWA_ErrorCode nodes (reusing SWA error definitions)
          when the same error codes appear in both documents.
        from_types: ["SWUD_Function"]
        to_types: ["SWA_ErrorCode"]
        extraction_source: "swud_error_field"
        properties: []

      # -- SWUD Design Decision applies to Function --

      - name: "SWUD_DECISION_APPLIES_TO"
        description: >
          SWUD design decision applies to / governs the implementation
          of specific SWUD functions, config structures, or macros.
          Inferred from references in design decision descriptions.
        from_types: ["SWUD_DesignDecision"]
        to_types: ["SWUD_Function", "SWUD_ConfigStructure", "SWUD_CodeGenMacro"]
        extraction_source: "swud_cross_reference"
        properties: []

      # -- SWUD Config Param gates Function --

      - name: "SWUD_CONFIG_GATES"
        description: >
          A derived configuration parameter controls the availability
          or behaviour of a SWUD function.  Extracted from the
          'Configuration Dependencies' field of function specifications.
        from_types: ["SWUD_DerivedConfigParam"]
        to_types: ["SWUD_Function"]
        extraction_source: "swud_config_dep_field"
        properties: []

      # -- SWUD Critical Section protects Data Variable --

      - name: "SWUD_PROTECTS"
        description: >
          A critical section protects a data variable from concurrent
          access.  Extracted from the 'Protected Resources' field in
          the critical section specification.
        from_types: ["SWUD_CriticalSection"]
        to_types: ["SWUD_DataVariable"]
        extraction_source: "swud_critical_section_spec"
        properties: []

      # -- SWUD to SWA cross-link: DetailedDesign realizes Architecture --

      - name: "SWUD_REALIZES_SWA"
        description: >
          SWUD function provides the detailed design / implementation
          for an SWA function specification.  Linked by matching
          function names between SWA_Function and SWUD_Function nodes.
        from_types: ["SWUD_Function"]
        to_types: ["SWA_Function"]
        extraction_source: "swud_swa_name_matching"
        properties: []

      # -- SWUD CodeGenMacro generates ConfigStructure --

      - name: "SWUD_GENERATES"
        description: >
          A code generation macro produces a configuration structure
          variable or derived configuration parameter.  Inferred from
          algorithm descriptions and naming patterns.
        from_types: ["SWUD_CodeGenMacro"]
        to_types: ["SWUD_ConfigStructure", "SWUD_DerivedConfigParam"]
        extraction_source: "swud_codegen_analysis"
        properties: []

      # ================================================================
      # TEST SPECIFICATION  Relationships
      # ================================================================

      # -- Test Spec → PRQ traceability (V-Model right side) --

      - name: "TS_VERIFIES"
        description: >
          A test case verifies a product requirement (PRQ).  Extracted
          from the [req featureID=…_PRQ_… parentID=AU3GM-PRQ-*] tags
          in the Traceability column of the test spec Excel.  This is
          the primary V-Model traceability link from the test
          specification to the requirements baseline.
        from_types:
          - "TS_FunctionalTestCase"
          - "TS_ConfigTestCase"
          - "TS_StaticInterfaceTestCase"
        to_types: ["ProductRequirement"]
        extraction_source: "testspec_traceability_tags"
        properties:
          - name: "feature_id"
            data_type: "string"
            description: >
              The TS feature tag from the traceability markup (e.g.
              'TS_ADC_AS460_PRQ_FT_001').

      # -- Test Spec → SWA traceability --

      - name: "TS_VALIDATES_SWA"
        description: >
          A test case validates an SWA architectural element (function,
          data type, config param, etc.).  Extracted from the
          [req featureID=…_SWA_… parentID={GUID}] tags in the
          Traceability column.  Links the right side of the V-Model
          (test spec) to the left side (architecture).
        from_types:
          - "TS_FunctionalTestCase"
          - "TS_ConfigTestCase"
          - "TS_StaticInterfaceTestCase"
        to_types:
          - "SWA_Function"
          - "SWA_DataType"
          - "SWA_Macro"
          - "SWA_ConfigContainer"
          - "SWA_ConfigParam"
          - "SWA_SourceFile"
          - "SWA_HwPeripheral"
        extraction_source: "testspec_traceability_tags"
        properties:
          - name: "feature_id"
            data_type: "string"
            description: >
              The TS feature tag (e.g. 'TS_ADC_AS460_SWA_FT_001').

      # -- Config Test → SWA_ConfigParam / SWA_ConfigContainer --

      - name: "TS_TESTS_CONFIG_ELEMENT"
        description: >
          A configuration test case directly tests an SWA configuration
          parameter or container.  Derived by matching the config_path
          property of TS_ConfigTestCase against SWA_ConfigParam.param_name
          or SWA_ConfigContainer.container_name.
        from_types: ["TS_ConfigTestCase"]
        to_types: ["SWA_ConfigParam", "SWA_ConfigContainer"]
        extraction_source: "testspec_config_path_matching"
        properties: []

      # -- WCET Test → SWA_Function --

      - name: "TS_MEASURES_TIMING_OF"
        description: >
          A WCET test case measures the execution time of an SWA
          function / API.  Derived by matching TS_WCETTestCase.api_name
          against SWA_Function.function_name.
        from_types: ["TS_WCETTestCase"]
        to_types: ["SWA_Function"]
        extraction_source: "testspec_api_name_matching"
        properties:
          - name: "data_point"
            data_type: "string"
            description: >
              'ET' for nominal execution time or 'WCET' for worst-case.

      # -- Test Spec → MCALModule grouping --

      - name: "TS_BELONGS_TO_MODULE"
        description: >
          A test case or test spec document belongs to a MCAL module.
          Derived from the module property of the test case node.
        from_types:
          - "TS_FunctionalTestCase"
          - "TS_ConfigTestCase"
          - "TS_StaticInterfaceTestCase"
          - "TS_WCETTestCase"
          - "TS_TestSpecDocument"
        to_types: ["MCALModule"]
        extraction_source: "testspec_module_field"
        properties: []

      # -- Test Spec Document → individual test cases --

      - name: "TS_CONTAINS_TESTCASE"
        description: >
          A test specification document contains individual test cases.
          Groups all test cases from the same Excel workbook under one
          document node.
        from_types: ["TS_TestSpecDocument"]
        to_types:
          - "TS_FunctionalTestCase"
          - "TS_ConfigTestCase"
          - "TS_StaticInterfaceTestCase"
          - "TS_WCETTestCase"
        extraction_source: "testspec_document_grouping"
        properties: []

      # -- Test Spec cross-link to VerificationStep (Jama PVS) --

      - name: "TS_IMPLEMENTS_VERIFICATION"
        description: >
          A test case implements a Jama VerificationStep (PVS).  This
          bridges the Jama-authored verification plan with the detailed
          test spec in the Excel workbook.  Linked when a PVS references
          a test case ID or when both trace to the same PRQ.
        from_types:
          - "TS_FunctionalTestCase"
          - "TS_ConfigTestCase"
          - "TS_StaticInterfaceTestCase"
        to_types: ["VerificationStep"]
        extraction_source: "testspec_pvs_matching"
        properties: []

      # =====================================================================
      #  SOURCE CODE RELATIONSHIPS
      # =====================================================================

      # File containment
      - name: "SRC_DEFINED_IN"
        description: >
          A source function, data type, macro, or variable is defined in a source file.
        from_types:
          - "SRC_Function"
          - "SRC_DataType"
          - "SRC_Macro"
          - "SRC_GlobalVariable"
          - "SRC_LocalVariable"
        to_types: ["SRC_SourceFile"]
        extraction_source: "c_source_ingestion"
        properties: []

      # Function call graph
      - name: "SRC_CALLS"
        description: >
          A source function calls another source function.  Derived from
          the call-graph extraction of the C parser.
        from_types: ["SRC_Function"]
        to_types: ["SRC_Function"]
        extraction_source: "c_source_ingestion"
        properties:
          - name: "call_order"
            data_type: "integer"
            description: "Order of the call within the calling function"
          - name: "case_label"
            data_type: "string"
            description: "Switch-case label if the call is inside a case block"

      # Register access
      - name: "SRC_ACCESSES_REGISTER"
        description: >
          A source function accesses one or more hardware registers (AURIX
          SFR pattern).  Captures both READ and WRITE operations with the
          specific register field.
        from_types: ["SRC_Function"]
        to_types: ["SRC_Function"]
        extraction_source: "c_source_ingestion"
        properties:
          - name: "register_name"
            data_type: "string"
            description: "Register name (e.g. DMAC0, SUPLLEV)"
          - name: "field"
            data_type: "string"
            description: "Register field accessed"
          - name: "access_type"
            data_type: "string"
            description: "READ or WRITE"
          - name: "line"
            data_type: "integer"
            description: "Line number of the access"

      # Module membership
      - name: "SRC_BELONGS_TO_MODULE"
        description: >
          A source code node belongs to a MCAL module.
        from_types:
          - "SRC_SourceFile"
          - "SRC_Function"
          - "SRC_DataType"
          - "SRC_Macro"
          - "SRC_GlobalVariable"
        to_types: ["MCALModule"]
        extraction_source: "c_source_ingestion"
        properties: []

      # Function → local variable containment
      - name: "SRC_HAS_LOCAL_VAR"
        description: >
          A source function declares / contains a local variable.
        from_types: ["SRC_Function"]
        to_types: ["SRC_LocalVariable"]
        extraction_source: "c_source_ingestion"
        properties: []

      # File → global variable containment
      - name: "SRC_HAS_GLOBAL_VAR"
        description: >
          A source file declares a global (file-scope) variable.
        from_types: ["SRC_SourceFile"]
        to_types: ["SRC_GlobalVariable"]
        extraction_source: "c_source_ingestion"
        properties: []

      # Traceability: Source → SWA architecture
      - name: "SRC_IMPLEMENTS_SWA"
        description: >
          A source code function implements an SWA (Software Architecture)
          function specification.  Linked by matching function name (e.g.
          Adc_Init in source → Adc_Init SWA_Function node).
        from_types: ["SRC_Function"]
        to_types: ["SWA_Function"]
        extraction_source: "c_source_name_matching"
        properties: []

      # Traceability: Source → SWUD design
      - name: "SRC_IMPLEMENTS_SWUD"
        description: >
          A source code function implements an SWUD (Software Unit Design)
          function specification.  Linked by matching function name.
        from_types: ["SRC_Function"]
        to_types: ["SWUD_Function"]
        extraction_source: "c_source_name_matching"
        properties: []

      # Traceability: Source → PRQ requirement (via GUIDs)
      # Function uses global variable
      - name: "SRC_USES_GLOBAL"
        description: >
          A source function reads or writes a global variable.
          Derived from reference analysis inside function bodies.
        from_types: ["SRC_Function"]
        to_types: ["SRC_GlobalVariable"]
        extraction_source: "c_source_ingestion"
        properties: []

      # File includes
      - name: "SRC_INCLUDES"
        description: >
          A source file includes another header file via #include.
        from_types: ["SRC_SourceFile"]
        to_types: ["SRC_SourceFile"]
        extraction_source: "c_source_ingestion"
        properties: []

      - name: "SRC_TRACES_TO"
        description: >
          A source code artefact traces to a Jama requirement via a
          [cover parentID={GUID}] traceability tag embedded in the source
          code comments.  The GUID is matched against requirement global IDs.
        from_types:
          - "SRC_SourceFile"
          - "SRC_Function"
          - "SRC_DataType"
          - "SRC_Macro"
          - "SRC_GlobalVariable"
        to_types:
          - "ProductRequirement"
          - "StakeholderRequirement"
        extraction_source: "c_source_guid_matching"
        properties:
          - name: "guid"
            data_type: "string"
            description: "The traceability GUID linking source to requirement"

      # =====================================================================
      # SFR (Special Function Register) Relationships
      # =====================================================================

      - name: "SFR_DEFINED_IN"
        description: >
          A register or base address is defined in an SFR header file.
        from_types: ["SFR_Register", "SFR_BaseAddress"]
        to_types: ["SFR_File"]
        extraction_source: "sfr_header_ingestion"
        properties: []

      - name: "SFR_HAS_BITFIELD"
        description: >
          A register contains a bitfield member.
        from_types: ["SFR_Register"]
        to_types: ["SFR_BitField"]
        extraction_source: "sfr_header_ingestion"
        properties: []

      - name: "SFR_BELONGS_TO_MODULE"
        description: >
          An SFR node belongs to a MCAL module.
        from_types: ["SFR_File", "SFR_Register", "SFR_BitField", "SFR_BaseAddress"]
        to_types: ["MCALModule"]
        extraction_source: "sfr_header_ingestion"
        properties: []

      - name: "SRC_ACCESSES_SFR"
        description: >
          A source code function accesses a specific SFR register.
          Cross-links the implementation layer to the hardware register
          model.  Derived by matching register names found in source code
          against ingested SFR_Register nodes.
        from_types: ["SRC_Function"]
        to_types: ["SFR_Register"]
        extraction_source: "sfr_cross_reference"
        properties:
          - name: "access_type"
            data_type: "string"
            description: "READ or WRITE"

    # -------------------------------------------------------------------------
    # EXTRACTION RULES
    # -------------------------------------------------------------------------
    extraction_rules:

      module_prefix_from_name:
        description: >
          Extract the MCAL module prefix from the requirement name.
          Requirement names follow several naming conventions:
            SWS_<Module>_<nnnnn>       – Software Specification requirement
            ECUC_<Module>_<nnnnn>      – ECUC Configuration parameter
            SWS_<Module>_CONSTR_<nnnnn>– Constraint requirement
            TPS_ECUC_<nnnnn>           – ECUC Template requirement
          The legacy colon pattern ("Module: title") is also supported.
        patterns:
          sws:   "^SWS_(?P<module>[A-Za-z]+)_(?:CONSTR_)?\\d+"
          ecuc:  "^ECUC_(?P<module>[A-Za-z]+)_\\d+"
          tps:   "^TPS_ECUC_\\d+"
          colon: "^(?P<module>[A-Za-z]+):\\s+"
        known_prefixes:
          - "Adc"
          - "Bfx"
          - "Bmc"
          - "BSW"
          - "Can"
          - "COMPILER"
          - "Crc"
          - "Cybersecurity"
          - "Dio"
          - "DMA"
          - "DSADC"
          - "Eth"
          - "Fee"
          - "Fr"
          - "General"
          - "Gpt"
          - "Icu"
          - "Lin"
          - "Mcu"
          - "Mem"
          - "MemAcc"
          - "MemMap"
          - "Ocu"
          - "Platform"
          - "Port"
          - "Pwm"
          - "SMU"
          - "Spi"
          - "Std"
          - "Wdg"
        naming_categories:
          - prefix: "SWS"
            description: "Software Specification requirement"
            pattern_example: "SWS_Adc_00350"
          - prefix: "ECUC"
            description: "ECUC Configuration parameter requirement"
            pattern_example: "ECUC_Adc_00001"
          - prefix: "SWS_*_CONSTR"
            description: "Constraint requirement for a module"
            pattern_example: "SWS_Adc_CONSTR_00001"
          - prefix: "TPS_ECUC"
            description: "ECUC Template parameter specification"
            pattern_example: "TPS_ECUC_08011"

      html_to_text:
        description: "Strip HTML tags from Jama description fields"
        apply_to: ["description", "internal_remark", "rationale", "ifx_feedback"]

      jama_relationships:
        description: >
          Use the Jama REST API relationship endpoints
          (upstream/downstream) to extract edges between items.
        api_endpoints:
          - "/items/{id}/upstreamrelationships"
          - "/items/{id}/downstreamrelationships"

    # -------------------------------------------------------------------------
    # JAMA ITEM TYPE REFERENCE
    # -------------------------------------------------------------------------
    # Quick lookup for Jama numeric item type IDs used in this project:
    #
    #   22 → Attachment (not modelled as node – metadata only)
    #   30 → Component (CMP)
    #   31 → Set (SET)
    #   32 → Folder (FLD)
    #   33 → Text (TXT)
    #   42 → Stakeholder (SH)
    #   50 → Verification Domain (VD)
    #   57 → Product Requirement (PRQ)
    #   58 → Stakeholder Requirement (SHRQ)
    #   59 → Architectural Assumption (AA)
    #   60 → Product Assurance (PASC/HSI) – 6 items, template only
    #   62 → Product Verification Step (PVS)
    #   63 → Product Verification Report (PVR)
    #   71 → Software Variant (SW_VAR)
    #   78 → Document (DOC)
    #   82 → Glossary (GLS)
    #   95 → Group (GRP)

    # -------------------------------------------------------------------------
    # VALIDATION RULES
    # -------------------------------------------------------------------------
    validation_rules:
      requirement_completeness:
        required_fields: ["requirement_id", "name"]
        warning_if_missing: ["description", "status", "asil"]

      traceability:
        shrq_must_have_prq: true
        prq_must_have_pvs: true
        pvs_should_have_pvr: false

      status_consistency:
        approved_prq_needs_approved_shrq: true

    # -------------------------------------------------------------------------
    # QUERY TEMPLATES (Cypher for Neo4j)
    # -------------------------------------------------------------------------
    query_templates:

      full_traceability:
        description: "Complete V-model traceability for a SHRQ"
        cypher: |
          MATCH path = (shrq:StakeholderRequirement {requirement_id: $shrq_id})
            <-[:DERIVES_FROM]-(prq:ProductRequirement)
            -[:VERIFIED_BY]->(pvs:VerificationStep)
            -[:HAS_RESULT]->(pvr:VerificationReport)
          RETURN path

      prqs_for_shrq: |
        MATCH (prq:ProductRequirement)-[:DERIVES_FROM]->(shrq:StakeholderRequirement {requirement_id: $shrq_id})
        RETURN prq

      uncovered_prqs: |
        MATCH (prq:ProductRequirement)
        WHERE NOT EXISTS {
          MATCH (prq)-[:VERIFIED_BY]->(:VerificationStep)
        }
        RETURN prq

      module_requirements: |
        MATCH (n)-[:BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        RETURN n

      safety_requirements: |
        MATCH (r)
        WHERE (r:StakeholderRequirement OR r:ProductRequirement)
          AND r.asil IS NOT NULL
          AND r.asil <> 348
        RETURN r

      stakeholder_requirements: |
        MATCH (shrq:StakeholderRequirement)-[:RAISED_BY]->(sh:Stakeholder)
        WHERE sh.name CONTAINS $stakeholder_name
        RETURN shrq, sh

      release_scope: |
        MATCH (r)-[:TARGETED_FOR]->(rel:SoftwareRelease {name: $version})
        RETURN r

      # SWA Exported Interface Queries
      swa_functions_for_module: |
        MATCH (f:SWA_Function)-[:SWA_BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        RETURN f ORDER BY f.function_category, f.function_name

      swa_function_error_codes: |
        MATCH (f:SWA_Function {function_name: $func_name})-[:SWA_REPORTS_ERROR]->(e:SWA_ErrorCode)
        RETURN e.error_name AS error_code, e.description AS description

      swa_functions_sharing_error: |
        MATCH (f:SWA_Function)-[:SWA_REPORTS_ERROR]->(e:SWA_ErrorCode {error_name: $error_code})
        RETURN f.function_name AS function_name, f.function_category AS category

      swa_enum_literals: |
        MATCH (dt:SWA_DataType {type_name: $type_name})-[:SWA_HAS_LITERAL]->(lit:SWA_EnumLiteral)
        RETURN lit.literal_name AS name, lit.value AS value, lit.description AS description
        ORDER BY toInteger(lit.value)

      swa_design_decisions_for_function: |
        MATCH (f:SWA_Function {function_name: $func_name})-[:SWA_HAS_DESIGN_DECISION]->(dd:SWA_DesignDecision)
        OPTIONAL MATCH (dd)-[:SWA_DESIGN_DECISION_TRACES_TO]->(prq:ProductRequirement)
        RETURN dd.title AS decision, dd.rationale AS rationale, collect(prq.requirement_id) AS traced_prqs

      swa_function_config_dependencies: |
        MATCH (f:SWA_Function)-[:SWA_GATED_BY_CONFIG]->(cp:SWA_ConfigParameter {param_name: $config_param})
        RETURN f.function_name AS function_name, f.function_category AS category

      swa_full_traceability: |
        MATCH (f:SWA_Function {function_name: $func_name})
        OPTIONAL MATCH (f)-[:ARCHITECTURALLY_REALIZES]->(prq:ProductRequirement)
        OPTIONAL MATCH (f)-[:SWA_USES_TYPE]->(dt:SWA_DataType)
        OPTIONAL MATCH (f)-[:SWA_REPORTS_ERROR]->(err:SWA_ErrorCode)
        OPTIONAL MATCH (f)-[:SWA_GATED_BY_CONFIG]->(cfg:SWA_ConfigParameter)
        RETURN f, collect(DISTINCT prq.requirement_id) AS prqs,
               collect(DISTINCT dt.type_name) AS types_used,
               collect(DISTINCT err.error_name) AS errors,
               collect(DISTINCT cfg.param_name) AS config_deps

      # -- Section 3.1.3: Architectural Decisions Queries --

      swa_arch_decisions_for_module: |
        MATCH (ad:SWA_ArchitecturalDecision)-[:SWA_ARCH_DECISION_BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        RETURN ad.title AS decision, ad.stereotype AS type, ad.section_number AS section
        ORDER BY ad.section_number

      swa_arch_decision_traceability: |
        MATCH (ad:SWA_ArchitecturalDecision {title: $title})
        OPTIONAL MATCH (ad)-[:SWA_ARCH_DECISION_TRACES_TO]->(prq:ProductRequirement)
        OPTIONAL MATCH (child:SWA_ArchitecturalDecision)-[:SWA_ARCH_DECISION_PARENT]->(ad)
        RETURN ad, collect(DISTINCT prq.requirement_id) AS traced_prqs,
               collect(DISTINCT child.title) AS sub_decisions

      swa_arch_decision_hierarchy: |
        MATCH path = (child:SWA_ArchitecturalDecision)-[:SWA_ARCH_DECISION_PARENT*1..5]->(root:SWA_ArchitecturalDecision)
        WHERE root.module = $module AND NOT EXISTS {
          MATCH (root)-[:SWA_ARCH_DECISION_PARENT]->()
        }
        RETURN path

      # -- Section 3.1.5: HW-SW Interface Queries --

      swa_hw_peripherals_for_module: |
        MATCH (m:MCALModule {module_name: $module})-[:SWA_DEPENDS_ON_HW]->(hw:SWA_HwPeripheral)
        RETURN hw.peripheral_name AS peripheral, hw.peripheral_type AS type,
               hw.hw_events AS events, hw.diagnostic_features AS diagnostics
        ORDER BY hw.peripheral_type, hw.peripheral_name

      swa_hw_peripheral_users: |
        MATCH (hw:SWA_HwPeripheral {peripheral_name: $peripheral})
        OPTIONAL MATCH (m:MCALModule)-[:SWA_DEPENDS_ON_HW]->(hw)
        OPTIONAL MATCH (hw)-[:SWA_HW_PERIPHERAL_CONFIGURED_BY]->(cfg_module:MCALModule)
        RETURN hw, collect(DISTINCT m.module_name) AS dependent_modules,
               collect(DISTINCT cfg_module.module_name) AS configuring_modules

      # -- Section 3.1.6: SW-SW Interface Queries --

      swa_sw_dependencies_for_module: |
        MATCH (m:MCALModule {module_name: $module})-[:SWA_CALLS_EXTERNAL]->(dep:SWA_SwDependency)
        OPTIONAL MATCH (dep)-[:SWA_DEPENDENCY_PROVIDED_BY]->(provider:MCALModule)
        RETURN dep.api_name AS api, dep.dependency_type AS type,
               provider.module_name AS provider_module, dep.description AS description
        ORDER BY provider.module_name, dep.api_name

      swa_module_dependency_graph: |
        MATCH (caller:MCALModule)-[:SWA_CALLS_EXTERNAL]->(dep:SWA_SwDependency)-[:SWA_DEPENDENCY_PROVIDED_BY]->(provider:MCALModule)
        WHERE caller.module_name = $module
        RETURN caller.module_name AS caller, provider.module_name AS provider,
               collect(dep.api_name) AS apis
        ORDER BY provider

      # -- Section 3.1.7: Configuration Queries --

      swa_config_containers_for_module: |
        MATCH (cc:SWA_ConfigContainer)-[:SWA_CONFIG_BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        RETURN cc.container_name AS container, cc.container_type AS type,
               cc.multiplicity_min AS min_mult, cc.multiplicity_max AS max_mult,
               cc.sub_containers AS sub_containers
        ORDER BY cc.section_number

      swa_config_container_hierarchy: |
        MATCH path = (root:SWA_ConfigContainer {container_name: $container})-[:SWA_CONTAINS_CONTAINER*0..5]->(child:SWA_ConfigContainer)
        OPTIONAL MATCH (child)-[:SWA_CONTAINS_PARAM]->(p:SWA_ConfigParam)
        RETURN child.container_name AS container, child.container_type AS type,
               collect(p.param_name) AS parameters

      swa_config_params_in_container: |
        MATCH (cc:SWA_ConfigContainer {container_name: $container})-[:SWA_CONTAINS_PARAM]->(p:SWA_ConfigParam)
        RETURN p.param_name AS parameter, p.param_type AS type,
               p.default_value AS default_val, p.range_values AS range,
               p.origin AS origin, p.description AS description
        ORDER BY p.param_name

      swa_config_param_traceability: |
        MATCH (p:SWA_ConfigParam {param_name: $param_name})
        OPTIONAL MATCH (p)-[:SWA_CONFIG_TRACES_TO]->(prq:ProductRequirement)
        OPTIONAL MATCH (cc:SWA_ConfigContainer)-[:SWA_CONTAINS_PARAM]->(p)
        RETURN p, cc.container_name AS parent_container,
               collect(DISTINCT prq.requirement_id) AS traced_prqs

      # -- Section 3.1.9: File Structure Queries --

      swa_files_for_module: |
        MATCH (sf:SWA_SourceFile)-[:SWA_FILE_BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        RETURN sf.file_name AS file, sf.file_category AS category, sf.description AS description
        ORDER BY sf.file_category, sf.file_name

      swa_file_traceability: |
        MATCH (sf:SWA_SourceFile {file_name: $file_name})
        OPTIONAL MATCH (sf)-[:SWA_FILE_TRACES_TO]->(prq:ProductRequirement)
        OPTIONAL MATCH (f:SWA_Function)-[:SWA_FUNCTION_DECLARED_IN]->(sf)
        OPTIONAL MATCH (dt:SWA_DataType)-[:SWA_DATATYPE_DECLARED_IN]->(sf)
        RETURN sf, collect(DISTINCT prq.requirement_id) AS traced_prqs,
               collect(DISTINCT f.function_name) AS functions,
               collect(DISTINCT dt.type_name) AS data_types

      # -- Section 3.2: Call Sequence Queries --

      swa_call_sequences_for_module: |
        MATCH (cs:SWA_CallSequence)-[:SWA_CALL_SEQUENCE_BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        RETURN cs.sequence_name AS sequence, cs.scenario_category AS category,
               cs.section_number AS section, cs.related_functions AS functions
        ORDER BY cs.section_number

      swa_call_sequence_detail: |
        MATCH (cs:SWA_CallSequence {sequence_name: $sequence_name})
        OPTIONAL MATCH (cs)-[:SWA_CALL_SEQUENCE_INVOLVES]->(f:SWA_Function)
        OPTIONAL MATCH (cs)-[:SWA_CALL_SEQUENCE_TRACES_TO]->(prq:ProductRequirement)
        RETURN cs, collect(DISTINCT f.function_name) AS involved_functions,
               collect(DISTINCT prq.requirement_id) AS traced_prqs

      swa_call_sequences_for_function: |
        MATCH (cs:SWA_CallSequence)-[:SWA_CALL_SEQUENCE_INVOLVES]->(f:SWA_Function {function_name: $func_name})
        RETURN cs.sequence_name AS sequence, cs.scenario_category AS category,
               cs.description AS description, cs.section_number AS section
        ORDER BY cs.section_number

      swa_call_sequences_by_category: |
        MATCH (cs:SWA_CallSequence)-[:SWA_CALL_SEQUENCE_BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        WHERE cs.scenario_category = $category
        RETURN cs.sequence_name AS sequence, cs.description AS description,
               cs.actors AS actors, cs.section_number AS section
        ORDER BY cs.section_number

      # -- Cross-Section: Complete Module SWA Overview --

      swa_module_overview: |
        MATCH (m:MCALModule {module_name: $module})
        OPTIONAL MATCH (ad:SWA_ArchitecturalDecision)-[:SWA_ARCH_DECISION_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (m)-[:SWA_DEPENDS_ON_HW]->(hw:SWA_HwPeripheral)
        OPTIONAL MATCH (m)-[:SWA_CALLS_EXTERNAL]->(dep:SWA_SwDependency)
        OPTIONAL MATCH (cc:SWA_ConfigContainer)-[:SWA_CONFIG_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (f:SWA_Function)-[:SWA_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (sf:SWA_SourceFile)-[:SWA_FILE_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (cs:SWA_CallSequence)-[:SWA_CALL_SEQUENCE_BELONGS_TO_MODULE]->(m)
        RETURN m.module_name AS module,
               count(DISTINCT ad) AS arch_decisions,
               count(DISTINCT hw) AS hw_peripherals,
               count(DISTINCT dep) AS sw_dependencies,
               count(DISTINCT cc) AS config_containers,
               count(DISTINCT f) AS functions,
               count(DISTINCT sf) AS source_files,
               count(DISTINCT cs) AS call_sequences

      # -- SWUD Query Templates --

      # Section 2: Design Decisions
      swud_design_decisions_for_module: |
        MATCH (dd:SWUD_DesignDecision)-[:SWUD_BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        RETURN dd.decision_id AS id, dd.title AS title, dd.description AS description,
               dd.rationale AS rationale, dd.decision_type AS type
        ORDER BY dd.section_number

      # Section 3: Configuration — derived params
      swud_derived_config_params: |
        MATCH (p:SWUD_DerivedConfigParam)-[:SWUD_BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        RETURN p.param_name AS name, p.description AS description,
               p.range AS range, p.file AS file, p.dependencies AS deps
        ORDER BY p.section_number

      # Section 3: Configuration — config structures
      swud_config_structures: |
        MATCH (cs:SWUD_ConfigStructure)-[:SWUD_BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        RETURN cs.structure_name AS name, cs.c_type AS type,
               cs.description AS description, cs.file AS file,
               cs.memory_section AS mem_section
        ORDER BY cs.section_number

      # Section 3: Code gen macros
      swud_codegen_macros: |
        MATCH (cgm:SWUD_CodeGenMacro)-[:SWUD_BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        RETURN cgm.macro_name AS name, cgm.description AS description,
               cgm.file AS file
        ORDER BY cgm.section_number

      # Section 4: All functions by category
      swud_functions_by_category: |
        MATCH (f:SWUD_Function)-[:SWUD_BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        WHERE f.function_category = $category
        RETURN f.function_name AS name, f.description AS description,
               f.syntax AS syntax, f.asil_level AS asil,
               f.error_handling AS errors, f.memory_section AS mem_section
        ORDER BY f.section_number

      # Function detail with full traceability
      swud_function_detail: |
        MATCH (f:SWUD_Function {function_name: $function_name})
        OPTIONAL MATCH (f)-[:SWUD_TRACES_TO]->(prq:ProductRequirement)
        OPTIONAL MATCH (f)-[:SWUD_USES_TYPE]->(t:SWUD_TypeDefinition)
        OPTIONAL MATCH (f)-[:SWUD_CALLS]->(callee:SWUD_Function)
        OPTIONAL MATCH (f)-[:SWUD_ALLOCATED_IN]->(ms:SWUD_MemorySection)
        OPTIONAL MATCH (f)-[:SWUD_USES_CRITICAL_SECTION]->(cs:SWUD_CriticalSection)
        OPTIONAL MATCH (f)-[:SWUD_REALIZES_SWA]->(swa_f:SWA_Function)
        RETURN f, collect(DISTINCT prq.requirement_id) AS traced_prqs,
               collect(DISTINCT t.type_name) AS used_types,
               collect(DISTINCT callee.function_name) AS calls,
               collect(DISTINCT ms.section_name) AS memory_sections,
               collect(DISTINCT cs.critical_section_name) AS critical_sections,
               swa_f.function_name AS swa_counterpart

      # Function call graph for a module
      swud_call_graph: |
        MATCH (caller:SWUD_Function)-[:SWUD_CALLS]->(callee:SWUD_Function)
        WHERE caller.module = $module
        RETURN caller.function_name AS caller, callee.function_name AS callee,
               caller.function_category AS caller_cat, callee.function_category AS callee_cat

      # PRQ traceability through SWUD — which SWUD elements implement a PRQ
      swud_prq_traceability: |
        MATCH (n)-[:SWUD_TRACES_TO]->(prq:ProductRequirement {requirement_id: $prq_id})
        RETURN labels(n)[0] AS node_type, n.function_name AS function_name,
               coalesce(n.function_name, n.param_name, n.structure_name,
                        n.macro_name, n.type_name, n.variable_name,
                        n.critical_section_name, n.section_name,
                        n.title) AS element_name,
               n.section_number AS section

      # Cross-document: SWA → SWUD traceability for a function
      swud_swa_to_swud_function: |
        MATCH (swa_f:SWA_Function {function_name: $function_name})
        OPTIONAL MATCH (swud_f:SWUD_Function)-[:SWUD_REALIZES_SWA]->(swa_f)
        OPTIONAL MATCH (swud_f)-[:SWUD_CALLS]->(callee:SWUD_Function)
        RETURN swa_f.function_name AS swa_function,
               swud_f.function_name AS swud_function,
               swud_f.algorithm AS algorithm,
               collect(DISTINCT callee.function_name) AS internal_calls

      # Section 5: Data variables
      swud_data_variables: |
        MATCH (dv:SWUD_DataVariable)-[:SWUD_BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        RETURN dv.variable_name AS name, dv.c_type AS type,
               dv.scope AS scope, dv.description AS description,
               dv.memory_section AS mem_section
        ORDER BY dv.section_number

      # Section 6: Critical sections with protected resources
      swud_critical_sections: |
        MATCH (cs:SWUD_CriticalSection)-[:SWUD_BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        OPTIONAL MATCH (f:SWUD_Function)-[:SWUD_USES_CRITICAL_SECTION]->(cs)
        OPTIONAL MATCH (cs)-[:SWUD_PROTECTS]->(dv:SWUD_DataVariable)
        RETURN cs.critical_section_name AS name, cs.description AS description,
               cs.protection_scope AS scope,
               collect(DISTINCT f.function_name) AS using_functions,
               collect(DISTINCT dv.variable_name) AS protected_variables

      # Section 7: Memory section allocation map
      swud_memory_map: |
        MATCH (ms:SWUD_MemorySection)-[:SWUD_BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        OPTIONAL MATCH (f:SWUD_Function)-[:SWUD_ALLOCATED_IN]->(ms)
        OPTIONAL MATCH (dv:SWUD_DataVariable)-[:SWUD_ALLOCATED_IN]->(ms)
        RETURN ms.section_name AS section, ms.memmap_category AS category,
               ms.asil_level AS asil, ms.typical_mapping AS target,
               count(DISTINCT f) AS function_count,
               count(DISTINCT dv) AS variable_count

      # Complete SWUD module overview
      swud_module_overview: |
        MATCH (m:MCALModule {module_name: $module})
        OPTIONAL MATCH (dd:SWUD_DesignDecision)-[:SWUD_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (dp:SWUD_DerivedConfigParam)-[:SWUD_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (cs_struct:SWUD_ConfigStructure)-[:SWUD_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (cgm:SWUD_CodeGenMacro)-[:SWUD_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (td:SWUD_TypeDefinition)-[:SWUD_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (f:SWUD_Function)-[:SWUD_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (dv:SWUD_DataVariable)-[:SWUD_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (cs:SWUD_CriticalSection)-[:SWUD_BELONGS_TO_MODULE]->(m)
        OPTIONAL MATCH (ms:SWUD_MemorySection)-[:SWUD_BELONGS_TO_MODULE]->(m)
        RETURN m.module_name AS module,
               count(DISTINCT dd) AS design_decisions,
               count(DISTINCT dp) AS derived_config_params,
               count(DISTINCT cs_struct) AS config_structures,
               count(DISTINCT cgm) AS codegen_macros,
               count(DISTINCT td) AS type_definitions,
               count(DISTINCT f) AS functions,
               count(DISTINCT dv) AS data_variables,
               count(DISTINCT cs) AS critical_sections,
               count(DISTINCT ms) AS memory_sections

      # ================================================================
      # Test Specification Query Templates
      # ================================================================

      # All test cases for a module
      ts_all_tests_for_module: |
        MATCH (tc)-[:TS_BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        RETURN labels(tc)[0] AS test_type,
               tc.test_case_id AS test_id,
               tc.test_objective AS objective,
               tc.automation_method AS method,
               tc.status AS status
        ORDER BY tc.test_case_id

      # Functional test detail with full traceability
      ts_functional_test_detail: |
        MATCH (tc:TS_FunctionalTestCase {test_case_id: $test_id})
        OPTIONAL MATCH (tc)-[:TS_VERIFIES]->(prq:ProductRequirement)
        OPTIONAL MATCH (tc)-[:TS_VALIDATES_SWA]->(swa)
        RETURN tc, collect(DISTINCT prq.requirement_id) AS verified_prqs,
               collect(DISTINCT coalesce(swa.function_name, swa.type_name,
                       swa.macro_name, swa.container_name,
                       swa.param_name)) AS validated_swa_elements

      # Which test cases verify a given PRQ
      ts_tests_for_prq: |
        MATCH (tc)-[:TS_VERIFIES]->(prq:ProductRequirement {requirement_id: $prq_id})
        RETURN labels(tc)[0] AS test_type, tc.test_case_id AS test_id,
               tc.test_objective AS objective,
               tc.automation_method AS method
        ORDER BY tc.test_case_id

      # PRQs with no test coverage (untested requirements)
      ts_untested_prqs: |
        MATCH (prq:ProductRequirement)-[:BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        WHERE NOT EXISTS {
          MATCH (tc)-[:TS_VERIFIES]->(prq)
        }
        RETURN prq.requirement_id AS prq_id, prq.name AS name,
               prq.status AS status
        ORDER BY prq.requirement_id

      # Config test with linked SWA config element
      ts_config_test_traceability: |
        MATCH (tc:TS_ConfigTestCase {test_case_id: $test_id})
        OPTIONAL MATCH (tc)-[:TS_TESTS_CONFIG_ELEMENT]->(cfg)
        OPTIONAL MATCH (tc)-[:TS_VERIFIES]->(prq:ProductRequirement)
        RETURN tc.config_path AS config_path, tc.element_type AS element_type,
               collect(DISTINCT prq.requirement_id) AS verified_prqs,
               collect(DISTINCT coalesce(cfg.param_name, cfg.container_name)) AS tested_config

      # WCET measurements for a function
      ts_wcet_for_function: |
        MATCH (wc:TS_WCETTestCase)-[:TS_MEASURES_TIMING_OF]->(f:SWA_Function {function_name: $func_name})
        RETURN wc.test_case_id AS test_id, wc.config_name AS config,
               wc.data_point AS data_point,
               wc.configuration_description AS config_desc,
               wc.scenario AS scenario

      # Complete V-Model traceability: SHRQ → PRQ → Test
      ts_full_v_model_traceability: |
        MATCH (shrq:StakeholderRequirement {requirement_id: $shrq_id})
          <-[:DERIVES_FROM]-(prq:ProductRequirement)
        OPTIONAL MATCH (tc)-[:TS_VERIFIES]->(prq)
        RETURN shrq.requirement_id AS shrq_id,
               prq.requirement_id AS prq_id,
               prq.name AS prq_name,
               collect(DISTINCT {test_id: tc.test_case_id,
                       test_type: labels(tc)[0]}) AS test_cases
        ORDER BY prq.requirement_id

      # Test spec document overview
      ts_testspec_overview: |
        MATCH (doc:TS_TestSpecDocument {module: $module})
        OPTIONAL MATCH (doc)-[:TS_CONTAINS_TESTCASE]->(tc)
        RETURN doc.document_name AS document,
               doc.total_functional_tests AS functional,
               doc.total_config_tests AS config,
               doc.total_static_tests AS static,
               doc.total_wcet_tests AS wcet,
               count(tc) AS total_linked

      # Test coverage summary — how many PRQs are covered
      ts_coverage_summary: |
        MATCH (prq:ProductRequirement)-[:BELONGS_TO_MODULE]->(m:MCALModule {module_name: $module})
        OPTIONAL MATCH (tc)-[:TS_VERIFIES]->(prq)
        WITH prq, count(tc) AS test_count
        RETURN count(prq) AS total_prqs,
               sum(CASE WHEN test_count > 0 THEN 1 ELSE 0 END) AS covered_prqs,
               sum(CASE WHEN test_count = 0 THEN 1 ELSE 0 END) AS uncovered_prqs,
               toFloat(sum(CASE WHEN test_count > 0 THEN 1 ELSE 0 END)) /
                 count(prq) * 100 AS coverage_pct

  # ===========================================================================
  #  ILLD PROFILE  –  Reference Software (Low-Level Drivers)
  # ===========================================================================
  illd:
    metadata:
      name: "Automotive Embedded LLD Ontology"
      version: "2.0.0"
      domain: "automotive_embedded_lld"
      description: >
        Comprehensive ontology for low-level driver development lifecycle.
        Node labels and relationship types match the live ILLD Neo4j
        database (bolt-passthrough-neo4j-mcswai-legato).
      supported_modules:
        - "CXPI"
        - "CAN"
        - "LIN"
        - "SPI"
        - "I2C"
        - "UART"
        - "ADC"
        - "PWM"
        - "GPIO"
        - "Timer"
        - "DMA"
        - "Interrupt"

    # -------------------------------------------------------------------------
    # NODE TYPES
    # -------------------------------------------------------------------------
    # Label names match Neo4j exactly (case-sensitive).
    # -------------------------------------------------------------------------
    node_types:

      # -- Requirement -------------------------------------------------------
      - name: "Requirement"
        description: "Product/software requirement from Jama or requirements tool"
        extraction_strategy: "hybrid"
        source_formats: ["json", "csv", "xlsx"]
        properties:
          - name: "requirement_id"
            data_type: "string"
            required: true
            unique: true
            description: "Unique requirement identifier (e.g., AURC1-REQA-286)"
            extraction_pattern: "^[A-Z0-9]+-[A-Z]+-\\d+$"
          - name: "global_id"
            data_type: "string"
            required: false
            description: "Global identifier from requirements tool"
          - name: "name"
            data_type: "string"
            required: true
            description: "Short descriptive name"
          - name: "description"
            data_type: "text"
            required: true
            description: "Full requirement description"
          - name: "status"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["Draft", "Work", "Review", "Approved", "Rejected", "Obsolete"]
          - name: "release"
            data_type: "string"
            required: false
            description: "Target release version"
          - name: "item_path"
            data_type: "string"
            required: false
            description: "Hierarchical path in requirements tool"
          - name: "priority"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["Low", "Medium", "High", "Critical"]
          - name: "asil_level"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["QM", "ASIL_A", "ASIL_B", "ASIL_C", "ASIL_D"]
          - name: "verification_method"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["Test", "Review", "Analysis", "Inspection"]
          - name: "last_modified"
            data_type: "datetime"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- HardwareRegister --------------------------------------------------
      - name: "HardwareRegister"
        description: "Hardware register extracted from HW spec PDF/Markdown"
        extraction_strategy: "llm"
        source_formats: ["pdf", "md"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. HWREG_CLC)"
          - name: "name"
            data_type: "string"
            required: true
            description: "Register name (e.g. CLC, ID, KRST0)"
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false
            description: "Display label (same as name)"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- RegisterField -----------------------------------------------------
      - name: "RegisterField"
        description: "Individual field within a HardwareRegister (from HW spec)"
        extraction_strategy: "llm"
        source_formats: ["pdf", "md"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. REGFIELD_CLC_DISR)"
          - name: "name"
            data_type: "string"
            required: true
            description: "Field name (e.g. DISR, DISS, EDIS)"
          - name: "bits"
            data_type: "string"
            required: true
            description: "Bit position or range (e.g. '0', '1', '7:4')"
          - name: "access"
            data_type: "string"
            required: true
            description: "Access type (e.g. rw, rh, r, w)"
          - name: "reset_value"
            data_type: "string"
            required: false
          - name: "description"
            data_type: "text"
            required: false
          - name: "register"
            data_type: "string"
            required: true
            description: "Parent register name"
          - name: "label"
            data_type: "string"
            required: false

      # -- Register (SFR) ---------------------------------------------------
      - name: "Register"
        description: "SFR register definition from _regdef.h headers"
        extraction_strategy: "hybrid"
        source_formats: ["h"]
        properties:
          - name: "register_name"
            data_type: "string"
            required: true
            unique: true
          - name: "address"
            data_type: "string"
            required: false
            description: "Register address (hex)"
            extraction_pattern: "^0x[0-9A-Fa-f]+$"
          - name: "width"
            data_type: "integer"
            required: false
            description: "Register width in bits"
            validation_rules:
              allowed_values: [8, 16, 32, 64]
          - name: "access"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["R", "W", "RW", "RW1C", "RW1S", "RO", "WO"]
          - name: "reset_value"
            data_type: "string"
            required: false
            description: "Default reset value (hex)"
          - name: "description"
            data_type: "text"
            required: false
          - name: "module"
            data_type: "string"
            required: true

      # -- BitField ----------------------------------------------------------
      - name: "BitField"
        description: "SFR register bitfield from _regdef.h headers"
        extraction_strategy: "hybrid"
        source_formats: ["h"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. BITFIELD_Ifx_CXPI_CH_CMD_Bits_TX_HEADER)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "bit_range"
            data_type: "string"
            required: true
            description: "Bit range (e.g., '0:0', '7:4')"
          - name: "width"
            data_type: "string"
            required: false
            description: "Width in bits"
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false

      # -- SoftwareArchitecture ----------------------------------------------
      - name: "SoftwareArchitecture"
        description: "Software architecture document/component"
        extraction_strategy: "llm"
        source_formats: ["rst", "md", "docx", "puml"]
        properties:
          - name: "arch_id"
            data_type: "string"
            required: true
            unique: true
          - name: "module_name"
            data_type: "string"
            required: true
          - name: "title"
            data_type: "string"
            required: true
          - name: "description"
            data_type: "text"
            required: true
          - name: "version"
            data_type: "string"
            required: false
          - name: "architectural_decisions"
            data_type: "list[string]"
            required: false
          - name: "hw_sw_interfaces"
            data_type: "text"
            required: false
          - name: "sw_sw_interfaces"
            data_type: "text"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- Function ----------------------------------------------------------
      - name: "Function"
        description: "C function from driver API (with Doxygen documentation)"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. FUNC_IfxCxpi_Init)"
          - name: "name"
            data_type: "string"
            required: true
            description: "Function name"
            extraction_pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
          - name: "brief"
            data_type: "string"
            required: false
            description: "Brief description from Doxygen @brief"
          - name: "purpose"
            data_type: "text"
            required: false
            description: "Detailed purpose / description"
          - name: "return_type"
            data_type: "string"
            required: false
          - name: "source"
            data_type: "string"
            required: false
            description: "Source origin (e.g. SWA_Functions)"
          - name: "signature"
            data_type: "string"
            required: false
            description: "Full function signature"
          - name: "module"
            data_type: "string"
            required: false
          - name: "file_path"
            data_type: "string"
            required: false
          - name: "label"
            data_type: "string"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- Struct ------------------------------------------------------------
      - name: "Struct"
        description: "C struct data structure"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. STRUCT_IfxCxpi_Config_t)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "brief"
            data_type: "string"
            required: false
            description: "Brief description from Doxygen"
          - name: "purpose"
            data_type: "text"
            required: false
          - name: "source"
            data_type: "string"
            required: false
          - name: "label"
            data_type: "string"
            required: false
          - name: "module"
            data_type: "string"
            required: false
          - name: "file_path"
            data_type: "string"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- StructMember ------------------------------------------------------
      - name: "StructMember"
        description: "Individual member / field of a C struct"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. MEMBER_IfxCxpi_TxConfig_t_txInitMarker)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "type"
            data_type: "string"
            required: false
            description: "C data type of the member"
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false
            description: "Display label (e.g. 'txInitMarker: bool')"

      # -- Enum --------------------------------------------------------------
      - name: "Enum"
        description: "C enum type definition"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. ENUM_IfxCxpi_Status_t)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "brief"
            data_type: "string"
            required: false
          - name: "purpose"
            data_type: "text"
            required: false
          - name: "source"
            data_type: "string"
            required: false
          - name: "label"
            data_type: "string"
            required: false
          - name: "module"
            data_type: "string"
            required: false
          - name: "file_path"
            data_type: "string"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- Typedef -----------------------------------------------------------
      - name: "Typedef"
        description: "C typedef alias"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. TYPEDEF_IfxCxpi_DataLength_t)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "brief"
            data_type: "string"
            required: false
          - name: "purpose"
            data_type: "text"
            required: false
          - name: "underlying_type"
            data_type: "string"
            required: false
            description: "Underlying C type (e.g. uint8_t, uint16_t)"
          - name: "source"
            data_type: "string"
            required: false
          - name: "label"
            data_type: "string"
            required: false
          - name: "module"
            data_type: "string"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- PrimitiveType -----------------------------------------------------
      - name: "PrimitiveType"
        description: "Primitive C type (uint8_t, uint16_t, void, etc.)"
        extraction_strategy: "hybrid"
        source_formats: ["h"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. PRIMITIVE_uint8_t)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "label"
            data_type: "string"
            required: false

      # -- EnumValue ---------------------------------------------------------
      - name: "EnumValue"
        description: "Individual enumerator within a C enum"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
            description: "Enumerator constant name"
          - name: "value"
            data_type: "string"
            required: false
            description: "Numeric value if explicitly assigned"
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false

      # -- Parameter ---------------------------------------------------------
      - name: "Parameter"
        description: "Parameter of a C function"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
          - name: "type"
            data_type: "string"
            required: false
            description: "C data type (e.g., uint8, IfxCxpi_Config_t*)"
          - name: "direction"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["in", "out", "in_out"]
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false

      # -- ReturnType --------------------------------------------------------
      - name: "ReturnType"
        description: "Return type of a C function (primitive or typedef)"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
            description: "Type name (e.g., Std_ReturnType, void, uint32)"
          - name: "is_pointer"
            data_type: "boolean"
            required: false
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false

      # -- SequenceDiagram ---------------------------------------------------
      - name: "SequenceDiagram"
        description: "PlantUML sequence diagram for API call flows"
        extraction_strategy: "llm"
        source_formats: ["puml", "md"]
        properties:
          - name: "diagram_id"
            data_type: "string"
            required: true
            unique: true
          - name: "title"
            data_type: "string"
            required: true
          - name: "description"
            data_type: "text"
            required: false
          - name: "participants"
            data_type: "list[string]"
            required: true
            description: "List of participants/actors"
          - name: "sequence_steps"
            data_type: "list[object]"
            required: true
            description: "Ordered list of steps with from, to, message, type"
          - name: "puml_content"
            data_type: "text"
            required: true
            description: "Raw PlantUML content"
          - name: "module"
            data_type: "string"
            required: true
          - name: "test_case_id"
            data_type: "string"
            required: false
            description: "Associated test case ID"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- TestSpecification -------------------------------------------------
      - name: "TestSpecification"
        description: "Test specification document"
        extraction_strategy: "hybrid"
        source_formats: ["md", "docx", "json"]
        properties:
          - name: "test_id"
            data_type: "string"
            required: true
            unique: true
          - name: "test_name"
            data_type: "string"
            required: true
          - name: "objective"
            data_type: "text"
            required: true
          - name: "requirement_ids"
            data_type: "list[string]"
            required: true
            description: "List of covered requirement IDs"
          - name: "module"
            data_type: "string"
            required: true
          - name: "priority"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["Low", "Medium", "High", "Critical"]
          - name: "test_type"
            data_type: "string"
            required: true
            validation_rules:
              allowed_values: ["Unit", "Integration", "Functional", "Performance", "Safety"]
          - name: "preconditions"
            data_type: "list[string]"
            required: false
          - name: "test_steps"
            data_type: "list[object]"
            required: true
            description: "List of test steps with action, expected_result, validation"
          - name: "test_data"
            data_type: "text"
            required: false
            description: "Test data configuration"
          - name: "pass_criteria"
            data_type: "list[string]"
            required: true
          - name: "fail_criteria"
            data_type: "list[string]"
            required: false
          - name: "status"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["Draft", "Active", "Obsolete"]
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- TestCode ----------------------------------------------------------
      - name: "TestCode"
        description: "Test implementation code"
        extraction_strategy: "hybrid"
        source_formats: ["c", "h"]
        properties:
          - name: "test_code_id"
            data_type: "string"
            required: true
            unique: true
          - name: "test_function_name"
            data_type: "string"
            required: true
          - name: "file_path"
            data_type: "string"
            required: true
          - name: "source_code"
            data_type: "text"
            required: true
          - name: "module"
            data_type: "string"
            required: true
          - name: "trace_tags"
            data_type: "list[string]"
            required: false
            description: "List of \\trace{} requirement IDs from code"
          - name: "architecture_refs"
            data_type: "list[string]"
            required: false
            description: "List of \\architecture{} references"
          - name: "hwspec_refs"
            data_type: "list[string]"
            required: false
            description: "List of \\hwspec{} references"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- TestResult --------------------------------------------------------
      - name: "TestResult"
        description: "Test execution result"
        extraction_strategy: "hybrid"
        source_formats: ["json", "xml", "csv"]
        properties:
          - name: "result_id"
            data_type: "string"
            required: true
            unique: true
          - name: "test_id"
            data_type: "string"
            required: true
          - name: "execution_date"
            data_type: "datetime"
            required: true
          - name: "status"
            data_type: "string"
            required: true
            validation_rules:
              allowed_values: ["Pass", "Fail", "Blocked", "Skipped", "Error"]
          - name: "execution_time_ms"
            data_type: "integer"
            required: false
          - name: "coverage_percentage"
            data_type: "float"
            required: false
          - name: "failure_reason"
            data_type: "text"
            required: false
          - name: "log_output"
            data_type: "text"
            required: false
          - name: "environment"
            data_type: "object"
            required: false
            description: "Test environment details (HW, SW versions)"

      # -- Module (driver module container) ----------------------------------
      - name: "Module"
        description: "Driver module container"
        extraction_strategy: "regex"
        source_formats: ["h", "c", "rst"]
        properties:
          - name: "module_name"
            data_type: "string"
            required: true
            unique: true
          - name: "description"
            data_type: "text"
            required: false
          - name: "version"
            data_type: "string"
            required: false
          - name: "file_paths"
            data_type: "list[string]"
            required: false
          - name: "hw_peripheral"
            data_type: "string"
            required: false
            description: "Associated HW peripheral name"

      # -- Operation ---------------------------------------------------------
      - name: "Operation"
        description: "HW/SW operation controlled by a bitfield or triggered by an interrupt"
        extraction_strategy: "llm"
        source_formats: ["pdf", "md", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
          - name: "description"
            data_type: "text"
            required: false
          - name: "operation_type"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["Enable", "Disable", "Configure", "Transfer", "Convert", "Reset", "Trigger"]
          - name: "label"
            data_type: "string"
            required: false
          - name: "module"
            data_type: "string"
            required: false

      # -- AccessMode --------------------------------------------------------
      - name: "AccessMode"
        description: "Access mode / permission for a register field"
        extraction_strategy: "hybrid"
        source_formats: ["pdf", "xml", "h"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
            description: "Access type name (e.g. rw, rh, r, w, rwh)"
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false

      # -- MemoryLocation ----------------------------------------------------
      - name: "MemoryLocation"
        description: "Physical memory address where a HW register is mapped"
        extraction_strategy: "hybrid"
        source_formats: ["pdf", "h", "xml"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
            description: "Address label or hex address"
          - name: "address"
            data_type: "string"
            required: false
            description: "Base address in hex (e.g., 0xF0038000)"
            extraction_pattern: "^0x[0-9A-Fa-f]+$"
          - name: "size"
            data_type: "integer"
            required: false
            description: "Size of the memory region in bytes"
          - name: "memory_type"
            data_type: "string"
            required: false
            validation_rules:
              allowed_values: ["SFR", "RAM", "Flash", "MMIO"]
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false

      # -- Interrupt ---------------------------------------------------------
      - name: "Interrupt"
        description: "Hardware interrupt source (IRQ/service request node)"
        extraction_strategy: "hybrid"
        source_formats: ["pdf", "h", "xml"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
          - name: "bit"
            data_type: "string"
            required: false
            description: "Bit position in status register"
          - name: "register"
            data_type: "string"
            required: false
            description: "Associated status register name"
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false
          - name: "module"
            data_type: "string"
            required: false

      # -- Error -------------------------------------------------------------
      - name: "Error"
        description: "Error condition or fault detectable via hardware registers"
        extraction_strategy: "hybrid"
        source_formats: ["pdf", "h", "c"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
          - name: "name"
            data_type: "string"
            required: true
          - name: "type"
            data_type: "string"
            required: false
            description: "Error type (e.g. protocol, hardware, overflow)"
          - name: "register"
            data_type: "string"
            required: false
            description: "Register that reports this error"
          - name: "description"
            data_type: "text"
            required: false
          - name: "label"
            data_type: "string"
            required: false
          - name: "module"
            data_type: "string"
            required: false

      # -- Condition ---------------------------------------------------------
      - name: "Condition"
        description: "Status condition indicated by an enum value or register state"
        extraction_strategy: "hybrid"
        source_formats: ["h", "c", "pdf"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. CONDITION_OperationSuccess)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "category"
            data_type: "string"
            required: false
            description: "Category (e.g. status, error, guard)"
          - name: "label"
            data_type: "string"
            required: false

      # -- Event -------------------------------------------------------------
      - name: "Event"
        description: "Hardware event (transmit, receive, error event)"
        extraction_strategy: "hybrid"
        source_formats: ["pdf", "h"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. EVENT_TransmitEvent)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "category"
            data_type: "string"
            required: false
            description: "Category (e.g. hardware, software)"
          - name: "label"
            data_type: "string"
            required: false

      # -- Mechanism ---------------------------------------------------------
      - name: "Mechanism"
        description: "Error detection or handling mechanism"
        extraction_strategy: "hybrid"
        source_formats: ["pdf", "h"]
        properties:
          - name: "id"
            data_type: "string"
            required: true
            unique: true
            description: "Node ID (e.g. MECHANISM_AutomaticDetection)"
          - name: "name"
            data_type: "string"
            required: true
          - name: "category"
            data_type: "string"
            required: false
            description: "Category (e.g. error_detection)"
          - name: "label"
            data_type: "string"
            required: false

    # -------------------------------------------------------------------------
    # RELATIONSHIP TYPES
    # -------------------------------------------------------------------------
    # Names match Neo4j exactly (case-sensitive).
    # -------------------------------------------------------------------------
    relationship_types:

      # =================================================================
      # ASPICE V-Model Traceability
      # =================================================================

      - name: "IMPLEMENTS"
        description: "Function implements requirement"
        from_types: ["Function"]
        to_types: ["Requirement"]
        properties:
          - name: "implementation_coverage"
            data_type: "string"
            validation_rules:
              allowed_values: ["Full", "Partial", "None"]

      - name: "IMPLEMENTED_BY"
        description: "Requirement is implemented by function (reverse of IMPLEMENTS)"
        from_types: ["Requirement"]
        to_types: ["Function"]
        properties: []

      - name: "TRACES_TO"
        description: "Test traces to requirement (verification)"
        from_types: ["TestSpecification", "TestCode"]
        to_types: ["Requirement"]
        properties:
          - name: "trace_type"
            data_type: "string"
            validation_rules:
              allowed_values: ["Direct", "Indirect"]

      - name: "VERIFIES"
        description: "Test result verifies requirement"
        from_types: ["TestResult"]
        to_types: ["Requirement"]
        properties:
          - name: "result"
            data_type: "string"
            validation_rules:
              allowed_values: ["Pass", "Fail", "Partial"]
          - name: "coverage"
            data_type: "float"

      - name: "RELATES_TO"
        description: "Requirement relates to another requirement (cross-reference)"
        from_types: ["Requirement"]
        to_types: ["Requirement"]
        properties:
          - name: "relation_note"
            data_type: "text"

      - name: "PARENT_REQUIREMENT"
        description: "Requirement hierarchy"
        from_types: ["Requirement"]
        to_types: ["Requirement"]
        properties: []

      # =================================================================
      # Function-level Relationships
      # =================================================================

      - name: "DEPENDS_ON"
        description: "Function depends on another function"
        from_types: ["Function"]
        to_types: ["Function"]
        properties:
          - name: "dependency_type"
            data_type: "string"
            validation_rules:
              allowed_values: ["Calls", "Requires", "Uses"]

      - name: "CALLS_INTERNALLY"
        description: "Function/EnumValue calls another function within module"
        from_types: ["EnumValue", "Function"]
        to_types: ["Function"]
        properties:
          - name: "call_site_line"
            data_type: "integer"
            description: "Line number where the call occurs"
          - name: "confidence"
            data_type: "float"
            description: "Analysis confidence (0.0-1.0)"

      - name: "CALLS_EXTERNAL"
        description: "Function calls a function from a different module"
        from_types: ["Function"]
        to_types: ["Function"]
        properties:
          - name: "target_module"
            data_type: "string"
            description: "Name of the module containing the called function"
          - name: "confidence"
            data_type: "float"

      - name: "HAS_PARAMETER"
        description: "Function has a parameter"
        from_types: ["Function"]
        to_types: ["Parameter"]
        properties:
          - name: "position"
            data_type: "integer"
            description: "0-based ordinal position in the parameter list"

      - name: "RETURN_TYPE"
        description: "Function has this return type"
        from_types: ["Function"]
        to_types: ["ReturnType"]
        properties: []

      - name: "HAS_CASE"
        description: "Function contains a named switch-case branch (via EnumValue)"
        from_types: ["Function"]
        to_types: ["EnumValue"]
        properties:
          - name: "switch_variable"
            data_type: "string"
            description: "Variable used in the switch expression"

      - name: "USED_BY"
        description: "Struct is used by a function (as parameter, local variable, etc.)"
        from_types: ["Struct"]
        to_types: ["Function"]
        properties:
          - name: "usage_context"
            data_type: "string"
            validation_rules:
              allowed_values: ["Parameter", "LocalVariable", "ReturnValue", "Global"]

      # =================================================================
      # Type-system Relationships
      # =================================================================

      - name: "OF_TYPE"
        description: "Parameter or struct member is of a specific type"
        from_types: ["Parameter", "StructMember"]
        to_types: ["Struct", "Typedef", "Enum", "PrimitiveType"]
        properties: []

      - name: "ALIASES"
        description: "Typedef aliases a primitive or other type"
        from_types: ["Typedef"]
        to_types: ["PrimitiveType", "Struct", "Enum"]
        properties: []

      - name: "USED_IN"
        description: "Typedef is used inside a struct definition"
        from_types: ["Typedef"]
        to_types: ["Struct"]
        properties:
          - name: "member_name"
            data_type: "string"
            description: "Name of the struct member that uses this typedef"

      - name: "HAS_VALUE"
        description: "Enum has an individual enumerator value"
        from_types: ["Enum"]
        to_types: ["EnumValue"]
        properties: []

      - name: "HAS_MEMBER"
        description: "Struct has a struct member"
        from_types: ["Struct"]
        to_types: ["StructMember"]
        properties: []

      # =================================================================
      # HW Register Relationships (SFR from _regdef.h)
      # =================================================================

      - name: "HAS_BITFIELD"
        description: "SFR Register has bitfield"
        from_types: ["Register"]
        to_types: ["BitField"]
        properties: []

      - name: "BITFIELD_CONTROLS"
        description: "Bitfield controls a hardware or software operation"
        from_types: ["BitField"]
        to_types: ["Operation"]
        properties:
          - name: "control_semantics"
            data_type: "string"
            description: "How the bitfield value maps to the operation (e.g., 1=Enable)"

      # =================================================================
      # HW Register Relationships (from HW spec PDF)
      # =================================================================

      - name: "HAS_FIELD"
        description: "HardwareRegister has a register field"
        from_types: ["HardwareRegister"]
        to_types: ["RegisterField"]
        properties: []

      - name: "HAS_ACCESS_TYPE"
        description: "Register field has an access mode (rw, rh, r, w, etc.)"
        from_types: ["RegisterField"]
        to_types: ["AccessMode"]
        properties: []

      - name: "LOCATED_AT"
        description: "Hardware register is mapped at a memory location"
        from_types: ["HardwareRegister"]
        to_types: ["MemoryLocation"]
        properties:
          - name: "offset"
            data_type: "string"
            description: "Offset from module base address (hex)"

      # =================================================================
      # Interrupt / Error / Condition Relationships
      # =================================================================

      - name: "INTERRUPT_TRIGGERS"
        description: "Interrupt triggers a hardware event"
        from_types: ["Interrupt"]
        to_types: ["Event"]
        properties:
          - name: "trigger_condition"
            data_type: "string"
            description: "Condition under which the interrupt fires"

      - name: "DETECTED_BY"
        description: "Error is detected by a mechanism"
        from_types: ["Error"]
        to_types: ["Mechanism"]
        properties:
          - name: "detection_bitfield"
            data_type: "string"
            description: "Specific bitfield that signals this error"

      - name: "INDICATES"
        description: "EnumValue indicates a status condition"
        from_types: ["EnumValue"]
        to_types: ["Condition"]
        properties: []

      # =================================================================
      # Module & Architectural Relationships
      # =================================================================

      - name: "BELONGS_TO"
        description: "Entity belongs to module"
        from_types: ["Function", "Struct", "Enum", "Typedef", "TestSpecification", "TestCode"]
        to_types: ["Module"]
        properties: []

      - name: "DERIVED_FROM"
        description: "Requirement derived from HW spec or architecture"
        from_types: ["Requirement"]
        to_types: ["HardwareRegister", "SoftwareArchitecture"]
        properties:
          - name: "derivation_rationale"
            data_type: "text"

      - name: "FOLLOWS_SEQUENCE"
        description: "Test follows sequence diagram"
        from_types: ["TestSpecification", "TestCode"]
        to_types: ["SequenceDiagram"]
        properties:
          - name: "sequence_coverage"
            data_type: "string"
            validation_rules:
              allowed_values: ["Full", "Partial"]

      - name: "ACCESSES_REGISTER"
        description: "Function accesses hardware register"
        from_types: ["Function"]
        to_types: ["Register"]
        properties:
          - name: "access_type"
            data_type: "string"
            validation_rules:
              allowed_values: ["Read", "Write", "ReadWrite"]

      - name: "CONTROLS"
        description: "Function controls or writes to a hardware register"
        from_types: ["Function"]
        to_types: ["Register"]
        properties:
          - name: "control_type"
            data_type: "string"
            validation_rules:
              allowed_values: ["Enable", "Disable", "Configure", "Reset", "Set", "Clear"]
          - name: "bitfield"
            data_type: "string"
            description: "Specific bitfield being controlled"

      - name: "TRIGGERED_BY"
        description: "Function is triggered by an interrupt or hardware event"
        from_types: ["Function"]
        to_types: ["Register", "HardwareRegister"]
        properties:
          - name: "trigger_type"
            data_type: "string"
            validation_rules:
              allowed_values: ["Interrupt", "Event", "Timer", "DMA", "Hardware"]
          - name: "priority"
            data_type: "integer"

      # =================================================================
      # Verification (N-ary for ASPICE)
      # =================================================================

      - name: "VERIFICATION_EVENT"
        description: "N-ary relationship capturing complete verification chain"
        from_types: ["Function"]
        to_types: ["Requirement"]
        statement_node: true
        properties:
          - name: "tested_by"
            data_type: "string"
            description: "Test ID that tested this"
          - name: "test_result"
            data_type: "string"
            validation_rules:
              allowed_values: ["Pass", "Fail", "NotTested"]
          - name: "coverage"
            data_type: "float"
          - name: "reviewer"
            data_type: "string"
          - name: "review_date"
            data_type: "datetime"
          - name: "evidence_path"
            data_type: "string"

    # -------------------------------------------------------------------------
    # EXTRACTION PATTERNS
    # -------------------------------------------------------------------------
    extraction_patterns:
      c_function_signature: |
        (?P<return_type>[\w\s\*]+)\s+(?P<function_name>[A-Za-z_][A-Za-z0-9_]*)\s*\((?P<params>[^)]*)\)

      doxygen_brief: |
        \\brief\s+(.+?)(?=\\|$|\n\s*\n)

      doxygen_param: |
        \\param\s+(?:\[(?P<direction>in|out|in,out)\])?\s*(?P<name>\w+)\s+(?P<desc>.+?)(?=\\param|\\return|\\retval|$)

      doxygen_return: |
        \\return\s+(.+?)(?=\\|$|\n\s*\n)

      doxygen_retval: |
        \\retval\s+(\w+)\s+(.+?)(?=\\retval|\\|$|\n\s*\n)

      doxygen_trace: |
        \\trace\{([^}]+)\}

      c_enum: |
        typedef\s+enum\s*\{([^}]+)\}\s*(\w+);

      c_struct: |
        typedef\s+struct\s*\{([^}]+)\}\s*(\w+);

      requirement_id: |
        [A-Z0-9]+-[A-Z]+-\d+

    # -------------------------------------------------------------------------
    # VALIDATION RULES
    # -------------------------------------------------------------------------
    validation_rules:
      requirement_completeness:
        required_fields: ["requirement_id", "name", "description"]
        warning_if_missing: ["status", "priority", "asil_level"]

      test_coverage:
        minimum_coverage: 80
        require_test_for_asil: ["ASIL_A", "ASIL_B", "ASIL_C", "ASIL_D"]

      traceability:
        require_implementation: true
        require_verification: true
        require_test_result: false

    # -------------------------------------------------------------------------
    # QUERY TEMPLATES (Cypher for Neo4j)
    # -------------------------------------------------------------------------
    query_templates:

      functions_for_requirement: |
        MATCH (f:Function)-[:IMPLEMENTS]->(r:Requirement {requirement_id: $req_id})
        RETURN f

      uncovered_requirements: |
        MATCH (r:Requirement)
        WHERE NOT EXISTS {
          MATCH (t:TestSpecification)-[:TRACES_TO]->(r)
        }
        RETURN r

      traceability_chain: |
        MATCH path = (t:TestResult)-[:VERIFIES]->(:TestSpecification)-[:TRACES_TO]->(r:Requirement)<-[:IMPLEMENTS]-(f:Function)
        WHERE r.requirement_id = $req_id
        RETURN path

      function_dependencies: |
        MATCH (f:Function {name: $func_name})-[:DEPENDS_ON*1..3]->(dep:Function)
        RETURN DISTINCT dep

      test_sequence: |
        MATCH (t:TestSpecification {test_id: $test_id})-[:FOLLOWS_SEQUENCE]->(s:SequenceDiagram)
        RETURN s.sequence_steps as steps, s.participants as participants

      register_fields: |
        MATCH (hr:HardwareRegister {name: $reg_name})-[:HAS_FIELD]->(rf:RegisterField)-[:HAS_ACCESS_TYPE]->(am:AccessMode)
        RETURN rf.name AS field, rf.bits AS bits, am.name AS access, rf.description AS desc

      function_type_graph: |
        MATCH (f:Function)-[:HAS_PARAMETER]->(p:Parameter)-[:OF_TYPE]->(t)
        WHERE f.name = $func_name
        RETURN p.name AS param, labels(t)[0] AS type_kind, t.name AS type_name

      error_detection: |
        MATCH (e:Error)-[:DETECTED_BY]->(m:Mechanism)
        RETURN e.name AS error, m.name AS mechanism, e.description AS desc
