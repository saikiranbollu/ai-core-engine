# AICE Test Environment — Secrets
# ================================
# IMPORTANT: Replace placeholder values before applying.
# Never commit real credentials to version control.
#
# Production Neo4j uses Helm-managed secret `neo4j-legato-auth`
# with key NEO4J_AUTH = "neo4j/<password>".
# We create a dedicated test secret using the SAME password as prod.
---
apiVersion: v1
kind: Secret
metadata:
  name: test-aice-db-secrets
  namespace: mcswai
  labels:
    app: aice-mcp-server
    env: test
type: Opaque
stringData:
  # Must match the production Neo4j password (from neo4j-legato-auth)
  neo4j-password: "legato"
  # Local test Neo4j — plain bolt, no TLS
  neo4j-uri: "bolt://test-neo4j:7687"
---
apiVersion: v1
kind: Secret
metadata:
  name: test-aice-external-secrets
  namespace: mcswai
  labels:
    app: aice-mcp-server
    env: test
type: Opaque
stringData:
  # GPT4IFX — use real service account credentials
  ifx-username: "REPLACE_WITH_IFX_USERNAME"
  ifx-password: "REPLACE_WITH_IFX_PASSWORD"
  # Jama Connect API — use real credentials
  jama-api-key: "REPLACE_WITH_JAMA_API_KEY"
  jama-api-secret: "REPLACE_WITH_JAMA_API_SECRET"
