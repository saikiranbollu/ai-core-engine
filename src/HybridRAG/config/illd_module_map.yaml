# ============================================================================
# ILLD Module Map — Source File Registry
# ============================================================================
# Reference mapping of every ILLD module to its input source files.
# Used by the pipeline to locate and fetch the correct files from GitLab
# and Bitbucket.
#
# Fields
# ------
#   gitlab_prefix   : "peripheral" | "base"  (subfolder under lld/)
#   gitlab_path     : path relative to the GitLab repo root
#   swa             : SWA header filename(s)
#   swa_note        : naming quirk, if any
#   sfr             : SFR regdef header filename(s)
#   sfr_tokens      : search token(s) used in the shared SFR tree
#   sfr_note        : naming quirk, if any
#   src             : C source filename(s)
#   puml            : PlantUML diagram filename(s)
#   srs             : SRS .dox filename
#   bb_source       : "Baselined_Versions" | "Deviation_Versions"
#   bb_folder       : folder name inside bb_source
#   pdf             : PDF filename
#   submodules      : logical sub-blocks (where the module splits into named parts)
#
# Last updated: 2026-06-10
# ============================================================================

