# AICE Test Environment — Neo4j 4.4.48
# =======================================
# Local Neo4j instance for test environment.
# TLS enabled for bolt & HTTPS to support passthrough routes
# (same pattern as production Helm-deployed instance).
---
apiVersion: v1
kind: Service
metadata:
  name: test-neo4j
  namespace: ai-core-engine
  labels:
    app: test-neo4j
    env: test
spec:
  selector:
    app: test-neo4j
    env: test
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: https
      port: 7473
      targetPort: 7473
    - name: bolt
      port: 7687
      targetPort: 7687
  clusterIP: None   # headless for StatefulSet
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: test-neo4j
  namespace: ai-core-engine
  labels:
    app: test-neo4j
    env: test
spec:
  serviceName: test-neo4j
  replicas: 1
  selector:
    matchLabels:
      app: test-neo4j
      env: test
  template:
    metadata:
      labels:
        app: test-neo4j
        env: test
    spec:
      initContainers:
        # Generate self-signed TLS certs for bolt and HTTPS connectors
        # (mirrors production Helm init container)
        - name: generate-certs
          image: neo4j:4.4.48
          command:
            - /bin/bash
            - "-c"
            - |
              set -e
              echo "Generating self-signed TLS certificates..."

              mkdir -p /certificates/bolt/trusted /certificates/bolt/revoked
              mkdir -p /certificates/https/trusted /certificates/https/revoked

              # Bolt certificate
              cat > /tmp/bolt.conf << 'EOF'
              [req]
              default_bits = 2048
              prompt = no
              default_md = sha256
              distinguished_name = dn
              req_extensions = v3_req

              [dn]
              CN=bolt-passthrough-neo4j-ai-core-engine-test.icp.infineon.com

              [v3_req]
              subjectAltName = @alt_names

              [alt_names]
              DNS.1 = bolt-passthrough-neo4j-ai-core-engine-test.icp.infineon.com
              DNS.2 = bolt-edge-neo4j-ai-core-engine-test.icp.infineon.com
              DNS.3 = test-neo4j
              DNS.4 = localhost
              EOF

              openssl req -x509 -nodes -newkey rsa:2048 \
                -keyout /certificates/bolt/private.key \
                -out /certificates/bolt/public.crt \
                -config /tmp/bolt.conf \
                -extensions v3_req \
                -days 3650

              # HTTPS certificate
              cat > /tmp/https.conf << 'EOF'
              [req]
              default_bits = 2048
              prompt = no
              default_md = sha256
              distinguished_name = dn
              req_extensions = v3_req

              [dn]
              CN=neo4j-ui-ai-core-engine-test.icp.infineon.com

              [v3_req]
              subjectAltName = @alt_names

              [alt_names]
              DNS.1 = neo4j-ui-ai-core-engine-test.icp.infineon.com
              DNS.2 = test-neo4j
              DNS.3 = localhost
              EOF

              openssl req -x509 -nodes -newkey rsa:2048 \
                -keyout /certificates/https/private.key \
                -out /certificates/https/public.crt \
                -config /tmp/https.conf \
                -extensions v3_req \
                -days 3650

              cp /certificates/bolt/public.crt /certificates/bolt/trusted/ca.crt
              cp /certificates/https/public.crt /certificates/https/trusted/ca.crt
              echo "Certificates generated successfully"
          volumeMounts:
            - name: cert-data
              mountPath: /certificates
      containers:
        - name: neo4j
          image: neo4j:4.4.48
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
            - containerPort: 7473
              name: https
          env:
            # Use same password as production Neo4j
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: test-aice-db-secrets
                  key: neo4j-password
            - name: NEO4J_AUTH
              value: "neo4j/$(NEO4J_PASSWORD)"
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            - name: NEO4J_dbms_memory_heap_initial__size
              value: "256m"
            - name: NEO4J_dbms_memory_heap_max__size
              value: "256m"
            - name: NEO4J_dbms_memory_pagecache_size
              value: "256m"
            # Accept env vars that don't map to Neo4j config
            - name: NEO4J_dbms_config_strict__validation_enabled
              value: "false"
            # Allow prod password (< 8 chars)
            - name: NEO4J_dbms_security_auth__minimum__password__length
              value: "4"
            # --- TLS / SSL configuration (mirrors production) ---
            - name: NEO4J_dbms_default__advertised__address
              value: "bolt-passthrough-neo4j-ai-core-engine-test.icp.infineon.com"
            - name: NEO4J_dbms_connector_bolt_advertised__address
              value: "bolt-passthrough-neo4j-ai-core-engine-test.icp.infineon.com:443"
            - name: NEO4J_dbms_connector_bolt_tls__level
              value: "OPTIONAL"
            - name: NEO4J_dbms_connector_https_enabled
              value: "true"
            - name: NEO4J_dbms_connector_https_listen__address
              value: "0.0.0.0:7473"
            - name: NEO4J_dbms_connector_https_advertised__address
              value: "neo4j-ui-ai-core-engine-test.icp.infineon.com:443"
            - name: NEO4J_dbms_ssl_policy_bolt_enabled
              value: "true"
            - name: NEO4J_dbms_ssl_policy_bolt_base__directory
              value: "/certificates/bolt"
            - name: NEO4J_dbms_ssl_policy_bolt_private__key
              value: "private.key"
            - name: NEO4J_dbms_ssl_policy_bolt_public__certificate
              value: "public.crt"
            - name: NEO4J_dbms_ssl_policy_bolt_trusted__dir
              value: "trusted"
            - name: NEO4J_dbms_ssl_policy_bolt_revoked__dir
              value: "revoked"
            - name: NEO4J_dbms_ssl_policy_https_enabled
              value: "true"
            - name: NEO4J_dbms_ssl_policy_https_base__directory
              value: "/certificates/https"
            - name: NEO4J_dbms_ssl_policy_https_private__key
              value: "private.key"
            - name: NEO4J_dbms_ssl_policy_https_public__certificate
              value: "public.crt"
            - name: NEO4J_dbms_ssl_policy_https_trusted__dir
              value: "trusted"
            - name: NEO4J_dbms_ssl_policy_https_revoked__dir
              value: "revoked"
          livenessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: "200m"
              memory: "768Mi"
            limits:
              cpu: "500m"
              memory: "1536Mi"
          volumeMounts:
            - name: test-neo4j-data
              mountPath: /data
            - name: cert-data
              mountPath: /certificates
      volumes:
        - name: cert-data
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: test-neo4j-data
        labels:
          env: test
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
