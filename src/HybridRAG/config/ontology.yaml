            jama_field: "globalId"
          - name: "jama_id"
            data_type: "integer"
            required: true
            unique: true
            jama_field: "id"
          - name: "name"
            data_type: "string"
            required: true
            jama_field: "name"
          - name: "description"
            data_type: "text"
            required: false
            jama_field: "description"
          - name: "status"
            data_type: "integer"
            required: false
            jama_field: "status"
          - name: "visibility"
            data_type: "integer"
            required: false
            jama_field: "visibility$33"
          - name: "modified_date"
            data_type: "datetime"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- DOC – Document Reference  (Jama item_type 78) ---------------------
      - name: "DocumentReference"
        jama_item_type: 78
        jama_key_prefix: "AU3GM-DOC"
