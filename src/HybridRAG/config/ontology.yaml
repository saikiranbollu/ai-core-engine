# =============================================================================
# Unified Automotive Embedded Software Ontology
# =============================================================================
# Consolidated knowledge graph schema with profile-based activation.
# Two profiles are available:
#
#   mcal  – AURIX 3G MCAL Requirements lifecycle (Jama AU3GM project)
#   illd  – Low-Level Driver development lifecycle (code, HW specs, tests)
#
# The active profile is selected via `active_instance` in storage_config.yaml.
# Both profiles can be loaded simultaneously for cross-profile queries.
#
# Version : 2.0.0
# Domain  : Automotive Embedded Software
# Compliance: ASPICE V-Model, ISO 26262, AUTOSAR Classic, MISRA C
# =============================================================================

# -----------------------------------------------------------------------------
# Top-level metadata  (shared across all profiles)
# -----------------------------------------------------------------------------
metadata:
  name: "Automotive Embedded Software Ontology"
  version: "2.0.0"
  domain: "automotive_embedded_software"
  description: >
    Unified ontology covering both MCAL productive-software requirements
    (Jama-based) and ILLD reference-software artefacts (code, HW specs,
    architecture, tests).  Activate a profile via storage_config.yaml.
  compliance:
    - "ASPICE"
    - "ISO 26262"
    - "AUTOSAR Classic Platform"
    - "MISRA C"

# =============================================================================
# PROFILES
# =============================================================================
profiles:

  # ===========================================================================
  #  MCAL PROFILE  –  Productive Software (Jama AU3GM)
  # ===========================================================================
  mcal:
    metadata:
      name: "AURIX 3G MCAL Requirements Ontology"
      version: "1.0.0"
      domain: "automotive_mcal_aurix3g"
      description: >
        Ontology for the AURIX 3G MCAL (Microcontroller Abstraction Layer)
        requirements lifecycle.  Covers stakeholder requirements (SHRQ),
        product requirements (PRQ), verification steps & reports,
        architectural assumptions, and supporting artefacts as extracted
        from Jama Connect (project AU3GM).
      jama_project:
        project_id: 1074
        project_key: "AU3GM"
        project_name: "AURIX 3G MCAL"
      supported_modules:
        - "ADC"
        - "BFX"        # Bitfield extension functions
        - "BMC"
        - "BSW"        # BSW General (common SW specification)
        - "CAN"
        - "COMPILER"   # Compiler abstraction
        - "CRC"
        - "DIO"
        - "DMA"
        - "DSADC"
        - "ETH"
        - "FEE"
        - "FR"
        - "GPT"
        - "ICU"
        - "I2C"
        - "LIN"
        - "MCU"
        - "MEM"
        - "MEMACC"
        - "MEMMAP"     # Memory mapping
        - "OCU"
        - "PLATFORM"   # Platform types
        - "PORT"
        - "PWM"
        - "SMU"
        - "SPI"
        - "STD"        # Standard types
        - "WDG"

    # -------------------------------------------------------------------------
    # NODE TYPES
    # -------------------------------------------------------------------------
    node_types:

      # -- SHRQ – Stakeholder / Hardware Requirement  (Jama item_type 58) ----
      - name: "StakeholderRequirement"
        jama_item_type: 58
        jama_key_prefix: "AU3GM-SHRQ"
        description: >
          Customer / stakeholder-level requirement.  These are the top-level
          "what" requirements coming from OEM customers (Denso, Continental,
          ZF, etc.) and internal product management.  Includes safety
          mechanism requirements (SM[HW], ESM[SW]).
        count: 9036
        extraction_strategy: "direct_mapping"
        source_formats: ["json"]
        properties:
          - name: "requirement_id"
            data_type: "string"
            required: true
            unique: true
            description: "Jama document key (e.g. AU3GM-SHRQ-30234)"
            jama_field: "documentKey"
          - name: "global_id"
            data_type: "string"
            required: false
            description: "Jama global identifier (GID-xxxxxxx)"
            jama_field: "globalId"
          - name: "jama_id"
            data_type: "integer"
            required: true
            unique: true
            description: "Numeric Jama item ID"
            jama_field: "id"
          - name: "name"
            data_type: "string"
            required: true
            description: "Short requirement title"
            jama_field: "name"
          - name: "description"
            data_type: "text"
            required: false
            description: "Full requirement description (HTML)"
            jama_field: "description"
          - name: "status"
            data_type: "integer"
            required: false
            description: "Jama status ID"
            jama_field: "status"
            value_map:
              293: "Approved"
              292: "Draft"
              435: "Rejected"
              603: "Deferred"
              434: "Obsolete"
          - name: "asil"
            data_type: "integer"
            required: false
            description: "ASIL classification ID"
            jama_field: "asil$58"
            value_map:
              348: "QM"
              349: "ASIL_A"
              351: "ASIL_B"
              353: "ASIL_D"
          - name: "initial_asil"
            data_type: "integer"
            required: false
            description: "Initial ASIL classification before decomposition"
            jama_field: "initial_asil$58"
          - name: "importance"
            data_type: "integer"
            required: false
            description: "Requirement importance level"
            jama_field: "importance$58"
            value_map:
              319: "Mandatory"
              320: "Nice-to-have"
              321: "Low"
              322: "Optional"
          - name: "domain"
            data_type: "integer"
            required: false
            description: "Functional domain classification"
            jama_field: "domain$58"
            value_map:
              362: "General"
              365: "Safety"
              366: "Cybersecurity"
              817: "Module-Specific"
              818: "Tool"
          - name: "ifx_acceptance"
            data_type: "integer"
            required: false
            description: "Infineon acceptance status"
            jama_field: "ifx_acceptance$58"
            value_map:
              356: "Accepted"
              354: "Rejected"
              355: "Deferred"
              1261: "Under Evaluation"
          - name: "customer_req_id"
            data_type: "string"
            required: false
            description: "Original customer requirement reference ID"
            jama_field: "customer_req_id$58"
          - name: "external_id"
            data_type: "string"
            required: false
            description: "External traceability ID (e.g. AURIXPLUS_SW:xxx)"
            jama_field: "external_id$58"
          - name: "customer_special_characteristic"
            data_type: "integer"
            required: false
            description: "Customer special characteristic flag"
            jama_field: "customer_special_characteristic$58"
            value_map:
              1577: "No"
              1578: "Yes"
          - name: "internal_remark"
            data_type: "text"
            required: false
            description: "Internal remark / processing note"
            jama_field: "internal_remark$58"
          - name: "rationale"
            data_type: "text"
            required: false
            description: "Rationale for acceptance/rejection decisions"
            jama_field: "rationale$58"
          - name: "ifx_feedback"
            data_type: "text"
            required: false
            description: "Infineon technical feedback to stakeholder"
            jama_field: "ifx_feedback$58"
          - name: "conditions"
            data_type: "text"
            required: false
            description: "Pre-conditions or applicability conditions for the requirement"
            jama_field: "conditions$58"
          - name: "cybersecurity_risk_level"
            data_type: "text"
            required: false
            description: "Cybersecurity risk level classification"
            jama_field: "cybersecurity_risk_level$58"
          - name: "release"
            data_type: "string"
            required: false
            description: "Target release version"
            jama_field: "release"
          - name: "module_prefix"
            data_type: "string"
            required: false
            description: "MCAL module prefix extracted from name (e.g. Adc, Can, Spi)"
            extraction_rule: "derived_from_name_prefix"
          - name: "modified_date"
            data_type: "datetime"
            required: false
            jama_field: "modifiedDate"
          - name: "created_date"
            data_type: "datetime"
            required: false
            jama_field: "createdDate"
          - name: "version"
            data_type: "integer"
            required: false
            jama_field: "version"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- PRQ – Product Requirement  (Jama item_type 57) --------------------
      - name: "ProductRequirement"
        jama_item_type: 57
        jama_key_prefix: "AU3GM-PRQ"
        description: >
          Product-level (derived / refined) requirement.  PRQs are authored
          by the engineering team and trace back to one or more SHRQs.  They
          represent the "how" at the software requirement specification (SRS)
          level – the basis for architecture, design, and verification.
        count: 6055
        extraction_strategy: "direct_mapping"
        source_formats: ["json"]
        properties:
          - name: "requirement_id"
            data_type: "string"
            required: true
            unique: true
            description: "Jama document key (e.g. AU3GM-PRQ-29969)"
            jama_field: "documentKey"
          - name: "global_id"
            data_type: "string"
            required: false
            jama_field: "globalId"
          - name: "jama_id"
            data_type: "integer"
            required: true
            unique: true
            jama_field: "id"
          - name: "name"
            data_type: "string"
            required: true
            description: "Requirement title (typically prefixed with module name)"
            jama_field: "name"
          - name: "description"
            data_type: "text"
            required: false
            description: "Full requirement text (HTML)"
            jama_field: "description"
          - name: "status"
            data_type: "integer"
            required: false
            jama_field: "status"
            value_map:
              293: "Approved"
              292: "Draft"
              294: "Rejected"
          - name: "asil"
            data_type: "integer"
            required: false
            description: "ASIL classification"
            jama_field: "asil$57"
            value_map:
              348: "QM"
              349: "ASIL_A"
              351: "ASIL_B"
              353: "ASIL_D"
          - name: "initial_asil"
            data_type: "integer"
            required: false
            jama_field: "initial_asil$57"
          - name: "domain"
            data_type: "integer"
            required: false
            description: "Functional domain"
            jama_field: "domain$57"
            value_map:
              362: "General"
              363: "AUTOSAR"
              366: "Cybersecurity"
              816: "Tool"
              817: "Module-Specific"
              818: "Safety"
              819: "Platform"
              368: "Performance"
          - name: "external_id"
            data_type: "string"
            required: false
            description: "External traceability ID"
            jama_field: "external_id$57"
          - name: "internal_remark"
            data_type: "text"
            required: false
            jama_field: "internal_remark$57"
          - name: "feasibility"
            data_type: "integer"
            required: false
            description: "Feasibility assessment status"
            jama_field: "feasibility$57"
          - name: "verifiability"
            data_type: "integer"
            required: false
            description: "Verifiability assessment status"
            jama_field: "verifiability$57"
          - name: "visibility"
            data_type: "integer"
            required: false
            description: "Visibility flag (1702 = Customer-Visible)"
            jama_field: "visibility$57"
            value_map:
              1702: "Customer-Visible"
          - name: "customer_special_characteristic"
            data_type: "integer"
            required: false
            jama_field: "customer_special_characteristic$57"
          - name: "release"
            data_type: "string"
            required: false
            jama_field: "release"
          - name: "module_prefix"
            data_type: "string"
            required: false
            description: "MCAL module name extracted from requirement title prefix"
            extraction_rule: "derived_from_name_prefix"
          - name: "requirement_category"
            data_type: "string"
            required: false
            description: >
              Top-level PRQ folder category within the module.
              One of: General, Error, API, Configuration, Definitions,
              Performance, or the actual folder name.  Derived from the
              Jama folder hierarchy during build.
            extraction_rule: "derived_from_folder_hierarchy"
          - name: "modified_date"
            data_type: "datetime"
            required: false
          - name: "created_date"
            data_type: "datetime"
            required: false
          - name: "version"
            data_type: "integer"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- PVS – Product Verification Step  (Jama item_type 62) --------------
      - name: "VerificationStep"
        jama_item_type: 62
        jama_key_prefix: "AU3GM-PVS"
        description: >
          A verification step that describes how a product requirement (PRQ)
          shall be verified.  Contains prerequisites, verification
          procedures, and expected results.  Maps to ASPICE SWE.6.
        count: 2396
        extraction_strategy: "direct_mapping"
        source_formats: ["json"]
        properties:
          - name: "verification_id"
            data_type: "string"
            required: true
            unique: true
            description: "Jama document key (e.g. AU3GM-PVS-12758)"
            jama_field: "documentKey"
          - name: "global_id"
            data_type: "string"
            required: false
            jama_field: "globalId"
          - name: "jama_id"
            data_type: "integer"
            required: true
            unique: true
            jama_field: "id"
          - name: "name"
            data_type: "string"
            required: true
            description: "Verification step title"
            jama_field: "name"
          - name: "description"
            data_type: "text"
            required: false
            description: "Full verification procedure (HTML)"
            jama_field: "description"
          - name: "status"
            data_type: "integer"
            required: false
            jama_field: "status"
            value_map:
              293: "Approved"
              292: "Draft"
          - name: "external_id"
            data_type: "string"
            required: false
            jama_field: "external_id$62"
          - name: "module_prefix"
            data_type: "string"
            required: false
            extraction_rule: "derived_from_name_prefix"
          - name: "modified_date"
            data_type: "datetime"
            required: false
          - name: "created_date"
            data_type: "datetime"
            required: false
          - name: "version"
            data_type: "integer"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- PVR – Product Verification Report  (Jama item_type 63) ------------
      - name: "VerificationReport"
        jama_item_type: 63
        jama_key_prefix: "AU3GM-PVR"
        description: >
          Captures the result of executing a verification step.  Contains
          pass/fail result, verification environment, compliance statement,
          failure rationale, and justification for skipped steps.
        count: 3
        extraction_strategy: "direct_mapping"
        source_formats: ["json"]
        properties:
          - name: "report_id"
            data_type: "string"
            required: true
            unique: true
            jama_field: "documentKey"
          - name: "global_id"
            data_type: "string"
            required: false
            jama_field: "globalId"
          - name: "jama_id"
            data_type: "integer"
            required: true
            unique: true
            jama_field: "id"
          - name: "name"
            data_type: "string"
            required: true
            jama_field: "name"
          - name: "description"
            data_type: "text"
            required: false
            description: "Report body (result, environment, compliance, failure rationale)"
            jama_field: "description"
          - name: "status"
            data_type: "integer"
            required: false
            jama_field: "status"
          - name: "test_result"
            data_type: "integer"
            required: false
            description: "Overall test result classification"
            jama_field: "test_result$63"
          - name: "modified_date"
            data_type: "datetime"
            required: false
          - name: "created_date"
            data_type: "datetime"
            required: false

      # -- AA – Architectural Assumption  (Jama item_type 59) ----------------
      - name: "ArchitecturalAssumption"
        jama_item_type: 59
        jama_key_prefix: "AU3GM-AA"
        description: >
          Safety and architectural assumptions made about the integrated
          system or operating environment.  ISO 26262 SEooC assumptions
          that define boundaries and expectations on the integrator.
        count: 84
        extraction_strategy: "direct_mapping"
        source_formats: ["json"]
        properties:
          - name: "assumption_id"
            data_type: "string"
            required: true
            unique: true
            jama_field: "documentKey"
          - name: "global_id"
            data_type: "string"
            required: false
            jama_field: "globalId"
          - name: "jama_id"
            data_type: "integer"
            required: true
            unique: true
            jama_field: "id"
          - name: "name"
            data_type: "string"
            required: true
            jama_field: "name"
          - name: "description"
            data_type: "text"
            required: false
            description: "Full assumption text including affected modules"
            jama_field: "description"
          - name: "status"
            data_type: "integer"
            required: false
            jama_field: "status"
          - name: "asil"
            data_type: "integer"
            required: false
            jama_field: "asil$59"
            value_map:
              348: "QM"
              351: "ASIL_B"
              353: "ASIL_D"
          - name: "internal_remark"
            data_type: "text"
            required: false
            jama_field: "internal_remark$59"
          - name: "modified_date"
            data_type: "datetime"
            required: false
          - name: "created_date"
            data_type: "datetime"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- TXT – Text / Informational Item  (Jama item_type 33) --------------
      - name: "TextItem"
        jama_item_type: 33
        jama_key_prefix: "AU3GM-TXT"
        description: >
          Free-form text items used for strategy descriptions, context
