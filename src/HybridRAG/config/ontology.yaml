          - name: "modified_date"
            data_type: "datetime"
            required: false
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- DOC – Document Reference  (Jama item_type 78) ---------------------
      - name: "DocumentReference"
        jama_item_type: 78
        jama_key_prefix: "AU3GM-DOC"
        description: >
          References to external source documents – customer questionnaires,
