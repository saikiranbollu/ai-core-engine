# ===========================================================================
# Datasheet Pin Mux Configuration
# ===========================================================================
# Defines available datasheets, their source locations, and extraction
# parameters for the pin mux pipeline (step 10).
#
# Workflow:
#   1. Pipeline locates PDF (local path or fetches from Bitbucket)
#   2. table_parser.py extracts pin mux tables from specified page ranges
#   3. datasheet_kg_builder.py ingests CSVs into Neo4j
#
# Adding a new datasheet:
#   1. Add entry under `datasheets:` with a unique key
#   2. Specify pdf source (local_path or bitbucket repo + path)
#   3. Define each device with page_start/page_end
#   4. Run: python run_pipeline.py --module PORT --only 10 --profile test
# ===========================================================================

# Path to the table_parser.py tool (used to convert PDF → CSV)
table_parser_path: "C:/Users/NairSurajRet/Desktop/SampleMCP/table-extractor/table_parser.py"

# Root directory for output CSVs and cached PDFs
output_dir: "${HYBRIDRAG_ROOT}/../../temp/datasheet"

