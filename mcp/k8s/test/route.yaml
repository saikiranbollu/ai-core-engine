# AICE Test Environment — OpenShift Routes
# ==========================================
# Exposes test MCP server and Neo4j externally with TLS.

# --- MCP Server Route (edge TLS) ---
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: test-mcp
  namespace: ai-core-engine
  labels:
    app: aice-mcp-server
    env: test
spec:
  host: test-mcp-ai-core-engine.eu-de-7.icp.infineon.com
  to:
    kind: Service
    name: test-mcp
    weight: 100
  port:
    targetPort: mcp-http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

# --- Neo4j Browser UI Route (edge TLS, port 7474) ---
---
apiVersion: route.openshift.io/v1
