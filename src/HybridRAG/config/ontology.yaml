      # =====================================================================
      #  EA (Enterprise Architect) — QEAX-Extracted Node Types
      # =====================================================================
      # Extracted directly from the QEAX model file (EA SQLite repository)
      # via ea_graph_builder.py and ea_diagram_extractor.py.
      #
      # These capture the complete architectural and detailed design data
      # authored in Enterprise Architect — functions, data types, config
      # parameters, error codes, design decisions, requirements, registers,
      # memory sections, diagrams, and more.
      #
      # Each node carries an ea_id (unique EA Object_ID) and dynamic
      # tagged values (tv_*) and operation tags (op_*) from the EA model.
      #
      # COMMON PROVENANCE PROPERTIES (present on ALL EA_* nodes):
      #   ea_section        – "architecture", "design", or "user manual"
      #   ea_source_path    – full package ancestry (e.g. "Product/Adc/Architecture/Static view/...")
      #   swa_report_version – SWA doc version (architecture-section nodes only)
      #   swa_report_status  – SWA doc status (architecture-section nodes only)
      #   swud_report_version – SWUD doc version (design-section nodes only)
      #   swud_report_status  – SWUD doc status (design-section nodes only)
      #
      # Source: QEAX file → SQLite → ea_graph_builder.py / ea_diagram_extractor.py
      # Replaces: SWA_* and SWUD_* node types (PDF-parsed equivalents)
      # =====================================================================

      # -- EA_Function  —  API and local functions ---------------------------
      - name: "EA_Function"
        jama_item_type: null
        description: >
          Function element extracted from the QEAX model.  Covers both
          API-level functions (generic_interface stereotype, kind=api)
          and local/internal functions (local_function_interface, kind=local).
          Replaces SWA_Function and SWUD_Function from PDF-based extraction.
          Each function carries its full signature (return type, parameters),
          tagged values from EA, and operation-level tags.
        extraction_strategy: "qeax_extraction"
        source_formats: ["qeax"]
        properties:
          - name: "ea_id"
            data_type: "integer"
            required: true
            unique: true
            description: "Enterprise Architect Object_ID (unique within the QEAX model)"
          - name: "name"
            data_type: "string"
            required: true
            description: "Function name (e.g. Adc_Init, Adc_StartGroupConversion)"
          - name: "object_type"
            data_type: "string"
            required: false
            description: "EA Object_Type (e.g. Class, Interface)"
          - name: "stereotype"
            data_type: "string"
            required: false
            description: "EA stereotype (generic_interface or local_function_interface)"
          - name: "note"
            data_type: "text"
            required: false
            description: "HTML-stripped Note field from EA element"
          - name: "package_id"
            data_type: "integer"
            required: false
            description: "EA Package_ID for scoping"
          - name: "module"
            data_type: "string"
            required: false
            description: "MCAL module name (e.g. Adc, Can, Spi)"
          - name: "ea_section"
            data_type: "string"
            required: false
            description: "Top-level EA section: 'architecture', 'design', or 'user manual'"
          - name: "ea_source_path"
            data_type: "string"
            required: false
            description: "Full package ancestry path from QEAX (e.g. 'Product/Adc/Architecture/Static view/API functions')"
          - name: "swa_report_version"
            data_type: "string"
            required: false
            description: "SWA document version (architecture-section nodes only)"
          - name: "swa_report_status"
            data_type: "string"
            required: false
            description: "SWA document status (architecture-section nodes only)"
          - name: "swud_report_version"
            data_type: "string"
            required: false
            description: "SWUD document version (design-section nodes only)"
          - name: "swud_report_status"
            data_type: "string"
            required: false
            description: "SWUD document status (design-section nodes only)"
          - name: "kind"
            data_type: "string"
            required: false
            description: "Function kind: 'api' (generic_interface) or 'local' (local_function_interface)"
          - name: "classifier_id"
            data_type: "integer"
            required: false
            description: "EA Classifier field (links to parent type)"
          - name: "return_type"
            data_type: "string"
            required: false
            description: "Return type extracted from t_operation.Type"
          - name: "parameters"
            data_type: "string"
            required: false
            description: "Semicolon-joined 'name: type' parameter list from t_operationparams"
          - name: "embedding"
            data_type: "vector"
            dimensions: 1536
            required: false

      # -- EA_DataType  —  Structs, enums, typedefs, function pointers ------
      - name: "EA_DataType"
        jama_item_type: null
        description: >
          Data type element from the QEAX model.  Covers structures
          (kind=struct), enumerations (kind=enum), typedefs (kind=typedef),
          and function pointers (kind=function_pointer).  Replaces
          SWA_DataType, SWA_EnumLiteral, and SWUD_TypeDefinition.
          Enum literals and struct members are stored in the 'attributes'
          property as semicolon-delimited strings.
        extraction_strategy: "qeax_extraction"
        source_formats: ["qeax"]
        properties:
          - name: "ea_id"
            data_type: "integer"
            required: true
            unique: true
            description: "Enterprise Architect Object_ID"
          - name: "name"
            data_type: "string"
            required: true
            description: "Type name (e.g. Adc_ChannelType, Adc_ConfigType)"
          - name: "object_type"
            data_type: "string"
            required: false
          - name: "stereotype"
