# ═══════════════════════════════════════════════════════════════════════
#  AI Core Engine — Nginx Reverse Proxy for Multi-Replica MCP
# ═══════════════════════════════════════════════════════════════════════
#
#  Routes traffic to multiple MCP server replicas with:
#    - Least-connections load balancing
#    - Sticky sessions via X-Session-Id header (for sandbox state)
#    - Health checks at /health
#    - Rate limiting (backup to application-level slowapi)
#    - SSE / streaming support for MCP transport
#
# ═══════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    # ── Logging ──────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr '
                    'session=$http_x_session_id '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── Rate limiting (backup to application slowapi) ────────────────
    # 30 req/sec per IP — burst of 50 with delay
    limit_req_zone $binary_remote_addr zone=mcp_ratelimit:10m rate=30r/s;

    # ── Upstream: MCP server replicas ────────────────────────────────
    # Docker Compose DNS resolves "mcp-server" to all replica IPs.
    # least_conn distributes to the replica with fewest active connections.
    upstream mcp_backend {
        least_conn;
        server mcp-server:8000;
        # Additional replicas are auto-discovered via Docker DNS
        # when deploy.replicas > 1 in docker-compose.
    }

    # ── Sticky session mapping ───────────────────────────────────────
    # Routes requests with the same X-Session-Id header to the same
    # backend replica (required for ephemeral sandbox state).
    map $http_x_session_id $sticky_backend {
        default "";
        # Hash-based routing: same session → same replica
        ~.+     $http_x_session_id;
    }

    # ── Main server ──────────────────────────────────────────────────
    server {
        listen 8000;
        server_name _;

        # ── Health endpoint (no rate limit) ──────────────────────────
        location /health {
            proxy_pass http://mcp_backend/health;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # ── Prometheus metrics passthrough ───────────────────────────
        location /metrics {
            proxy_pass http://mcp_backend/metrics;
            proxy_set_header Host $host;
        }

        # ── MCP endpoint ─────────────────────────────────────────────
        location /mcp {
            # Rate limiting
            limit_req zone=mcp_ratelimit burst=50 delay=20;
            limit_req_status 429;

            # Proxy to upstream
            proxy_pass http://mcp_backend/mcp;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Session-Id $http_x_session_id;

            # SSE / streaming support for MCP streamable-http transport
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;

            # Timeouts — MCP tools can be slow (ingestion, RLM)
            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # Max request body (large file ingestion)
            client_max_body_size 100m;
        }

        # ── Catch-all → 404 ──────────────────────────────────────────
        location / {
            return 404 '{"error": "Not found. Use /mcp for MCP protocol."}';
            add_header Content-Type application/json;
        }
    }
}
